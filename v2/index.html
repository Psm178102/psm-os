          </table>
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// KPIsPage (dashboard consolidado de KPIs)
// ──────────────────────────────────────────────────────────────────────────
function KPIsPage({ user }) {
  const lvl = RLVL[user.role] || 0;
  const { value: vendas } = useShared('VENDAS_MANUAIS');
  const { value: metas } = useShared('METAS_INDIVIDUAIS');
  const { value: deals } = useShared('CRM_DEALS');
  const list = Array.isArray(vendas) ? vendas : [];
  const m = metas || {};
  const dealsList = Array.isArray(deals) ? deals : [];

  const [refMes, setRefMes] = useState(monthKey());

  const corretores = USERS.filter(u => ['corretor','lider'].includes(u.role));
  const visible = lvl >= 5 ? corretores : corretores.filter(c => c.id === user.id);

  const stats = useMemo(() => {
    return visible.map(c => {
      const myVendas = list.filter(v => v.corretorId === c.id && v.status === 'fechada' && v.dataVenda?.startsWith(refMes));
      const vgv = myVendas.reduce((s,v) => s + (v.vgv||0), 0);
      const meta = m[c.id]?.vgv || 0;
      const pctMeta = meta > 0 ? Math.round(vgv/meta*100) : 0;
      const myDeals = dealsList.filter(d => d.corretorId === c.id);
      const pipeline = myDeals.filter(d => !['fechado','perdido'].includes(d.status)).reduce((s,d) => s+(d.valor||0),0);
      return { corretor: c, vendas: myVendas.length, vgv, meta, pctMeta, pipeline };
    }).sort((a,b) => b.vgv - a.vgv);
  }, [visible, list, m, dealsList, refMes]);

  const totalVgv = stats.reduce((s,r) => s+r.vgv, 0);
  const totalMeta = stats.reduce((s,r) => s+r.meta, 0);
  const pctTotal = totalMeta > 0 ? Math.round(totalVgv/totalMeta*100) : 0;

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>📊 KPIs</h1>
          <p className="text-sm text-slate-400">Performance consolidada do mês</p>
        </div>
        <input type="month" className="input max-w-xs" value={refMes} onChange={e => setRefMes(e.target.value)} />
      </div>

      <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-6">
        <div className="card p-4"><div className="text-xs text-slate-400">VGV mês</div><div className="text-2xl font-bold" style={{color:'#d4a843'}}>{fmtMoney(totalVgv)}</div></div>
        <div className="card p-4"><div className="text-xs text-slate-400">Meta mês</div><div className="text-2xl font-bold">{fmtMoney(totalMeta)}</div></div>
        <div className="card p-4" style={{borderColor: pctTotal >= 100 ? '#16a34a' : pctTotal >= 70 ? '#d4a843' : '#dc2626'}}>
          <div className="text-xs text-slate-400">% atingimento</div>
          <div className="text-2xl font-bold" style={{color: pctTotal >= 100 ? '#22c55e' : pctTotal >= 70 ? '#d4a843' : '#ef4444'}}>{pctTotal}%</div>
        </div>
        <div className="card p-4"><div className="text-xs text-slate-400">Vendas fechadas</div><div className="text-2xl font-bold text-green-400">{stats.reduce((s,r)=>s+r.vendas,0)}</div></div>
      </div>

      <div className="card overflow-hidden">
        <table className="w-full">
          <thead><tr className="bg-slate-900 text-xs text-slate-400 uppercase">
            <th className="text-left p-3">Corretor</th>
            <th className="text-left p-3">Frente</th>
            <th className="text-right p-3">Vendas</th>
            <th className="text-right p-3">VGV</th>
            <th className="text-right p-3">Meta</th>
            <th className="text-right p-3">% Meta</th>
            <th className="text-right p-3">Pipeline (CRM)</th>
          </tr></thead>
          <tbody>
            {stats.map(r => (
              <tr key={r.corretor.id} className="border-t border-slate-700">
                <td className="p-3 font-medium">{r.corretor.name}</td>
                <td className="p-3 text-xs">{r.corretor.frente ? FRENTES[r.corretor.frente]?.label : '—'}</td>
                <td className="text-right p-3">{r.vendas}</td>
                <td className="text-right p-3 font-bold" style={{color:'#d4a843'}}>{fmtMoney(r.vgv)}</td>
                <td className="text-right p-3 text-slate-400">{fmtMoney(r.meta)}</td>
                <td className="text-right p-3 font-bold" style={{color: r.pctMeta >= 100 ? '#22c55e' : r.pctMeta >= 70 ? '#d4a843' : '#ef4444'}}>
                  <div className="flex items-center justify-end gap-2">
                    <div className="w-16 h-2 bg-slate-700 rounded overflow-hidden">
                      <div style={{width: Math.min(100, r.pctMeta)+'%', height:'100%', background: r.pctMeta >= 100 ? '#22c55e' : r.pctMeta >= 70 ? '#d4a843' : '#ef4444'}}></div>
                    </div>
                    {r.pctMeta}%
                  </div>
                </td>
                <td className="text-right p-3 text-blue-400">{fmtMoney(r.pipeline)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// TabelaImoveisPage (catalogo simples)
// ──────────────────────────────────────────────────────────────────────────
function TabelaImoveisPage({ user }) {
  const { value: imoveis, save } = useShared('TABELA_IMOVEIS');
  const list = Array.isArray(imoveis) ? imoveis : [];
  const isStaff = user.role === 'socio' || user.role === 'lider';
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ titulo: '', empreendimento: '', tipo: 'apartamento', dorms: '2', area: '', valor: '', regiao: '', status: 'disponivel', obs: '' });
  const [filter, setFilter] = useState({ regiao: '', tipo: '', status: '' });

  async function add() {
    if (!form.titulo) return;
    const item = {
      id: 'i' + Date.now(),
      ...form,
      dorms: parseInt(form.dorms) || 0,
      area: parseFloat(form.area) || 0,
      valor: parseFloat(form.valor) || 0,
      createdBy: user.id,
      ts: Date.now()
    };
    await save([item, ...list].slice(0, 1000));
    setForm({ titulo: '', empreendimento: '', tipo: 'apartamento', dorms: '2', area: '', valor: '', regiao: '', status: 'disponivel', obs: '' });
    setShowForm(false);
  }
  async function setStatus(id, status) {
    await save(list.map(i => i.id === id ? { ...i, status } : i));
  }
  async function remove(id) {
    if (!confirm('Apagar imóvel?')) return;
    await save(list.filter(i => i.id !== id));
  }

  const filtered = list.filter(i =>
    (!filter.regiao || (i.regiao||'').toLowerCase().includes(filter.regiao.toLowerCase())) &&
    (!filter.tipo || i.tipo === filter.tipo) &&
    (!filter.status || i.status === filter.status)
  );

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>🏠 Tabela de Imóveis</h1>
          <p className="text-sm text-slate-400">{list.length} imóveis no catálogo</p>
        </div>
        {isStaff && <button className="btn" onClick={() => setShowForm(s => !s)}>{showForm ? '× Cancelar' : '+ Novo imóvel'}</button>}
      </div>

      <div className="card p-3 mb-4 flex gap-2 flex-wrap">
        <input className="input max-w-xs" placeholder="Filtrar região..." value={filter.regiao} onChange={e => setFilter({...filter, regiao: e.target.value})} />
        <select className="input max-w-xs" value={filter.tipo} onChange={e => setFilter({...filter, tipo: e.target.value})}>
          <option value="">Todos tipos</option>
          <option value="apartamento">Apartamento</option>
          <option value="casa">Casa</option>
          <option value="terreno">Terreno</option>
          <option value="comercial">Comercial</option>
        </select>
        <select className="input max-w-xs" value={filter.status} onChange={e => setFilter({...filter, status: e.target.value})}>
          <option value="">Todos status</option>
          <option value="disponivel">Disponível</option>
          <option value="reservado">Reservado</option>
          <option value="vendido">Vendido</option>
        </select>
      </div>

      {showForm && (
        <div className="card p-4 mb-4">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
            <input className="input" placeholder="Título" value={form.titulo} onChange={e => setForm({...form, titulo: e.target.value})} />
            <input className="input" placeholder="Empreendimento" value={form.empreendimento} onChange={e => setForm({...form, empreendimento: e.target.value})} />
            <select className="input" value={form.tipo} onChange={e => setForm({...form, tipo: e.target.value})}>
              <option value="apartamento">Apartamento</option><option value="casa">Casa</option><option value="terreno">Terreno</option><option value="comercial">Comercial</option>
            </select>
            <input type="number" className="input" placeholder="Dorms" value={form.dorms} onChange={e => setForm({...form, dorms: e.target.value})} />
            <input type="number" className="input" placeholder="Área (m²)" value={form.area} onChange={e => setForm({...form, area: e.target.value})} />
            <input type="number" className="input" placeholder="Valor (R$)" value={form.valor} onChange={e => setForm({...form, valor: e.target.value})} />
            <input className="input" placeholder="Região" value={form.regiao} onChange={e => setForm({...form, regiao: e.target.value})} />
            <select className="input" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
              <option value="disponivel">Disponível</option><option value="reservado">Reservado</option><option value="vendido">Vendido</option>
            </select>
          </div>
          <textarea className="input mb-3" rows="2" placeholder="Observações" value={form.obs} onChange={e => setForm({...form, obs: e.target.value})} />
          <button className="btn" onClick={add} disabled={!form.titulo}>💾 Cadastrar imóvel</button>
        </div>
      )}

      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
        {filtered.map(i => {
          const stColor = i.status==='disponivel' ? '#16a34a' : i.status==='reservado' ? '#d4a843' : '#64748b';
          return (
            <div key={i.id} className="card p-4">
              <div className="flex items-start justify-between mb-2">
                <span className="badge" style={{background: stColor+'30', color: stColor}}>{i.status}</span>
                <span className="badge" style={{background:'#3b82f630', color:'#93c5fd'}}>{i.tipo}</span>
              </div>
              <div className="font-bold mb-1">{i.titulo}</div>
              <div className="text-sm text-slate-400 mb-2">{i.empreendimento}</div>
              <div className="text-xs text-slate-500 mb-3">
                {i.dorms} dorms • {i.area}m² • {i.regiao}
              </div>
              <div className="text-xl font-bold mb-3" style={{color:'#d4a843'}}>{fmtMoney(i.valor)}</div>
              {i.obs && <div className="text-xs text-slate-400 italic mb-2">{i.obs}</div>}
              {isStaff && (
                <div className="flex gap-1 flex-wrap mt-2">
                  {i.status !== 'disponivel' && <button className="btn btn-sm btn-out" onClick={() => setStatus(i.id, 'disponivel')}>Disponibilizar</button>}
                  {i.status !== 'reservado' && <button className="btn btn-sm btn-out" onClick={() => setStatus(i.id, 'reservado')}>Reservar</button>}
                  {i.status !== 'vendido' && <button className="btn btn-sm btn-out" onClick={() => setStatus(i.id, 'vendido')}>Marcar vendido</button>}
                  <button className="text-red-400 text-xs ml-2" onClick={() => remove(i.id)}>×</button>
                </div>
              )}
            </div>
          );
        })}
        {filtered.length === 0 && <div className="text-center text-slate-500 py-8 col-span-3">Nenhum imóvel cadastrado.</div>}
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// FichasPage (lista de fichas/propostas geradas)
// ──────────────────────────────────────────────────────────────────────────
function FichasPage({ user }) {
  const targetUid = useMemo(() => legacyUid(user.id), [user.id]);
  const { value: fichas, save } = useUserKv(targetUid, 'FICHAS_PROPOSTAS');
  const list = Array.isArray(fichas) ? fichas : [];
  const [showForm, setShowForm] = useState(false);
  const [tipo, setTipo] = useState('proposta');
  const [form, setForm] = useState({
    cliente: '', cpf: '', telefone: '', email: '',
    empreendimento: '', unidade: '', valor: '', entrada: '',
    formaPagamento: 'financiamento', condicoes: '', validade: '', obs: ''
  });

  async function add() {
    if (!form.cliente) return;
    const item = {
      id: 'f' + Date.now(),
      tipo,
      ...form,
      valor: parseFloat(form.valor) || 0,
      entrada: parseFloat(form.entrada) || 0,
      createdAt: Date.now(),
      corretorId: user.id,
      corretorName: user.name
    };
    await save([item, ...list].slice(0, 500));
    setForm({ cliente: '', cpf: '', telefone: '', email: '', empreendimento: '', unidade: '', valor: '', entrada: '', formaPagamento: 'financiamento', condicoes: '', validade: '', obs: '' });
    setShowForm(false);
  }
  async function remove(id) {
    if (!confirm('Apagar?')) return;
    await save(list.filter(f => f.id !== id));
  }
  function downloadAsText(f) {
    const txt = [
      f.tipo === 'proposta' ? 'PROPOSTA DE COMPRA E VENDA' : 'FICHA DE CADASTRO',
      '=====================================',
      'Cliente: ' + f.cliente,
      'CPF: ' + f.cpf,
      'Telefone: ' + f.telefone,
      'E-mail: ' + f.email,
      '',
      'Empreendimento: ' + f.empreendimento,
      'Unidade: ' + f.unidade,
      'Valor total: ' + fmtMoney(f.valor),
      'Entrada: ' + fmtMoney(f.entrada),
      'Forma de pagamento: ' + f.formaPagamento,
      'Validade: ' + f.validade,
      '',
      'Condições:',
      f.condicoes,
      '',
      'Observações:',
      f.obs,
      '',
      'Corretor: ' + f.corretorName,
      'Gerado em: ' + new Date(f.createdAt).toLocaleString('pt-BR')
    ].join('\n');
    const blob = new Blob([txt], { type:'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = (f.tipo) + '_' + f.cliente.replace(/\s/g,'_') + '_' + new Date(f.createdAt).toISOString().slice(0,10) + '.txt';
    a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>📋 Fichas e Propostas</h1>
          <p className="text-sm text-slate-400">Suas fichas pessoais</p>
        </div>
        <button className="btn" onClick={() => setShowForm(s => !s)}>{showForm ? '× Cancelar' : '+ Nova ficha/proposta'}</button>
      </div>

      {showForm && (
        <div className="card p-4 mb-4">
          <div className="flex gap-2 mb-3">
            <button className={'btn btn-sm ' + (tipo==='proposta' ? '' : 'btn-out')} onClick={() => setTipo('proposta')}>Proposta</button>
            <button className={'btn btn-sm ' + (tipo==='ficha' ? '' : 'btn-out')} onClick={() => setTipo('ficha')}>Ficha cadastro</button>
            <button className={'btn btn-sm ' + (tipo==='cessao' ? '' : 'btn-out')} onClick={() => setTipo('cessao')}>Cessão de direitos</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
            <input className="input" placeholder="Cliente" value={form.cliente} onChange={e => setForm({...form, cliente: e.target.value})} />
            <input className="input" placeholder="CPF" value={form.cpf} onChange={e => setForm({...form, cpf: e.target.value})} />
            <input className="input" placeholder="Telefone" value={form.telefone} onChange={e => setForm({...form, telefone: e.target.value})} />
            <input className="input" placeholder="E-mail" value={form.email} onChange={e => setForm({...form, email: e.target.value})} />
            <input className="input" placeholder="Empreendimento" value={form.empreendimento} onChange={e => setForm({...form, empreendimento: e.target.value})} />
            <input className="input" placeholder="Unidade" value={form.unidade} onChange={e => setForm({...form, unidade: e.target.value})} />
            <input type="number" className="input" placeholder="Valor (R$)" value={form.valor} onChange={e => setForm({...form, valor: e.target.value})} />
            <input type="number" className="input" placeholder="Entrada (R$)" value={form.entrada} onChange={e => setForm({...form, entrada: e.target.value})} />
            <select className="input" value={form.formaPagamento} onChange={e => setForm({...form, formaPagamento: e.target.value})}>
              <option value="financiamento">Financiamento</option><option value="a_vista">À vista</option><option value="parcelado">Parcelado direto</option>
            </select>
            <input type="date" className="input" placeholder="Validade" value={form.validade} onChange={e => setForm({...form, validade: e.target.value})} />
          </div>
          <textarea className="input mb-3" rows="3" placeholder="Condições de pagamento" value={form.condicoes} onChange={e => setForm({...form, condicoes: e.target.value})} />
          <textarea className="input mb-3" rows="2" placeholder="Observações" value={form.obs} onChange={e => setForm({...form, obs: e.target.value})} />
          <button className="btn" onClick={add} disabled={!form.cliente}>💾 Salvar {tipo}</button>
        </div>
      )}

      <div className="space-y-3">
        {list.map(f => (
          <div key={f.id} className="card p-4">
            <div className="flex items-start justify-between mb-2 flex-wrap gap-2">
              <div>
                <div className="flex gap-2 items-center mb-1">
                  <span className="badge" style={{background:'#d4a84330', color:'#fde68a'}}>{f.tipo}</span>
                  <span className="font-bold">{f.cliente}</span>
                </div>
                <div className="text-xs text-slate-400">{f.empreendimento} {f.unidade && '· '+f.unidade} · {fmtMoney(f.valor)}</div>
                <div className="text-xs text-slate-500 mt-1">Gerado {fmtDate(f.createdAt)}</div>
              </div>
              <div className="flex gap-2">
                <button className="btn btn-sm btn-out" onClick={() => downloadAsText(f)}>↓ Baixar TXT</button>
                <button className="text-red-400 text-xs hover:text-red-300" onClick={() => remove(f.id)}>×</button>
              </div>
            </div>
          </div>
        ))}
        {list.length === 0 && <div className="text-center text-slate-500 py-8">Nenhuma ficha gerada ainda.</div>}
      </div>
    </div>
  );
}


// ──────────────────────────────────────────────────────────────────────────
// MapaLancamentosPage (lista de pins/lançamentos com regiões)
// ──────────────────────────────────────────────────────────────────────────
function MapaLancamentosPage({ user }) {
  const { value: pins, save } = useShared('MAPA_LANCAMENTOS');
  const list = Array.isArray(pins) ? pins : [];
  const isStaff = user.role === 'socio' || user.role === 'lider';
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ nome:'', incorporadora:'', regiao:'', endereco:'', tipo:'apartamento', vgv:'', unidades:'', lancamento:'', status:'pre_lancamento', obs:'' });
  const [filterStatus, setFilterStatus] = useState('todos');

  async function add() {
    if (!form.nome) return;
    const item = { id:'mp'+Date.now(), ...form, vgv:parseFloat(form.vgv)||0, unidades:parseInt(form.unidades)||0, ts:Date.now(), addedBy:user.id };
    await save([item, ...list].slice(0,500));
    setForm({ nome:'', incorporadora:'', regiao:'', endereco:'', tipo:'apartamento', vgv:'', unidades:'', lancamento:'', status:'pre_lancamento', obs:'' });
    setShowForm(false);
  }
  async function setStatus(id, status) { await save(list.map(p => p.id===id ? {...p, status} : p)); }
  async function remove(id) { if (!confirm('Apagar?')) return; await save(list.filter(p => p.id !== id)); }

  const STATUS_LABELS = { pre_lancamento:'🟡 Pré-lançamento', lancamento:'🟢 Lançamento', em_obras:'🟠 Em obras', entregue:'⚪ Entregue', vendido:'🔴 Vendido' };
  const filtered = filterStatus === 'todos' ? list : list.filter(p => p.status === filterStatus);
  const byRegiao = {};
  filtered.forEach(p => { const k = p.regiao || 'Sem região'; if(!byRegiao[k]) byRegiao[k]=[]; byRegiao[k].push(p); });

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>🗺️ Mapa de Lançamentos</h1>
          <p className="text-sm text-slate-400">{list.length} empreendimentos catalogados</p>
        </div>
        {isStaff && <button className="btn" onClick={() => setShowForm(s => !s)}>{showForm ? '× Cancelar' : '+ Novo lançamento'}</button>}
      </div>

      <div className="flex gap-2 mb-4 flex-wrap">
        <button className={'btn btn-sm ' + (filterStatus==='todos'?'':'btn-out')} onClick={() => setFilterStatus('todos')}>Todos ({list.length})</button>
        {Object.entries(STATUS_LABELS).map(([k, lbl]) => {
          const cnt = list.filter(p => p.status===k).length;
          return <button key={k} className={'btn btn-sm ' + (filterStatus===k?'':'btn-out')} onClick={() => setFilterStatus(k)}>{lbl} ({cnt})</button>;
        })}
      </div>

      {showForm && (
        <div className="card p-4 mb-4">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
            <input className="input" placeholder="Nome do empreendimento" value={form.nome} onChange={e => setForm({...form, nome:e.target.value})} />
            <input className="input" placeholder="Incorporadora" value={form.incorporadora} onChange={e => setForm({...form, incorporadora:e.target.value})} />
            <input className="input" placeholder="Região (Sul/Norte/...)" value={form.regiao} onChange={e => setForm({...form, regiao:e.target.value})} />
            <input className="input" placeholder="Endereço" value={form.endereco} onChange={e => setForm({...form, endereco:e.target.value})} />
            <select className="input" value={form.tipo} onChange={e => setForm({...form, tipo:e.target.value})}>
              <option value="apartamento">Apartamento</option><option value="casa">Casa</option><option value="loteamento">Loteamento</option><option value="comercial">Comercial</option>
            </select>
            <select className="input" value={form.status} onChange={e => setForm({...form, status:e.target.value})}>
              {Object.entries(STATUS_LABELS).map(([k, lbl]) => <option key={k} value={k}>{lbl}</option>)}
            </select>
            <input type="number" className="input" placeholder="VGV total (R$)" value={form.vgv} onChange={e => setForm({...form, vgv:e.target.value})} />
            <input type="number" className="input" placeholder="Unidades" value={form.unidades} onChange={e => setForm({...form, unidades:e.target.value})} />
            <input type="date" className="input" placeholder="Data lançamento" value={form.lancamento} onChange={e => setForm({...form, lancamento:e.target.value})} />
          </div>
          <textarea className="input mb-3" rows="2" placeholder="Observações" value={form.obs} onChange={e => setForm({...form, obs:e.target.value})} />
          <button className="btn" onClick={add} disabled={!form.nome}>💾 Salvar lançamento</button>
        </div>
      )}

      {Object.keys(byRegiao).length === 0 ? <div className="text-center text-slate-500 py-8">Nenhum empreendimento.</div> : (
        Object.entries(byRegiao).sort((a,b) => a[0].localeCompare(b[0])).map(([reg, items]) => (
          <div key={reg} className="mb-6">
            <h2 className="text-sm font-bold uppercase tracking-wider text-slate-400 mb-3">📍 {reg} ({items.length})</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
              {items.map(p => (
                <div key={p.id} className="card p-4">
                  <div className="flex items-start justify-between mb-2">
                    <span className="badge" style={{background:'#d4a84330', color:'#fde68a'}}>{p.tipo}</span>
                    <span className="text-xs">{STATUS_LABELS[p.status] || p.status}</span>
                  </div>
                  <div className="font-bold mb-1">{p.nome}</div>
                  <div className="text-sm text-slate-400 mb-2">{p.incorporadora}</div>
                  <div className="text-xs text-slate-500 mb-2">{p.endereco}</div>
                  <div className="grid grid-cols-2 gap-2 text-sm mb-3">
                    <div><div className="text-xs text-slate-500">VGV</div><div className="font-bold" style={{color:'#d4a843'}}>{fmtMoney(p.vgv)}</div></div>
                    <div><div className="text-xs text-slate-500">Unidades</div><div className="font-bold">{p.unidades||'—'}</div></div>
                  </div>
                  {p.lancamento && <div className="text-xs text-slate-400">Lançamento: {p.lancamento}</div>}
                  {p.obs && <div className="text-xs text-slate-400 mt-2 italic">{p.obs}</div>}
                  {isStaff && (
                    <div className="flex gap-1 mt-3 flex-wrap">
                      {Object.entries(STATUS_LABELS).filter(([k]) => k !== p.status).map(([k, lbl]) => (
                        <button key={k} className="btn btn-sm btn-out" style={{padding:'2px 6px',fontSize:'9px'}} onClick={() => setStatus(p.id, k)}>→ {lbl}</button>
                      ))}
                      <button className="text-red-400 text-xs hover:text-red-300" onClick={() => remove(p.id)}>×</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// CanalAnonimoPage (denuncias/sugestoes anonimas para a diretoria)
// ──────────────────────────────────────────────────────────────────────────
function CanalAnonimoPage({ user }) {
  const { value: msgs, save } = useShared('CANAL_ANONIMO');
  const list = Array.isArray(msgs) ? msgs : [];
  const isSocio = user.role === 'socio';
  const [text, setText] = useState('');
  const [tipo, setTipo] = useState('sugestao');
  const [posting, setPosting] = useState(false);

  async function post() {
    if (!text.trim()) return;
    setPosting(true);
    // anonymous: NAO grava user.id
    const item = { id:'an'+Date.now(), tipo, text:text.trim(), ts:Date.now(), status:'aberta', resposta:null };
    await save([item, ...list].slice(0,500));
    setText('');
    setPosting(false);
    alert('Mensagem anônima enviada para a diretoria.');
  }
  async function responder(id) {
    if (!isSocio) return;
    const r = prompt('Resposta da diretoria (será visível apenas pra socios):');
    if (!r) return;
    await save(list.map(m => m.id===id ? {...m, status:'respondida', resposta:r, respondedBy:user.id, respondedAt:Date.now()} : m));
  }
  async function arquivar(id) {
    if (!isSocio) return;
    await save(list.map(m => m.id===id ? {...m, status:'arquivada'} : m));
  }

  const TIPOS = { sugestao:'💡 Sugestão', critica:'⚠️ Crítica', denuncia:'🚨 Denúncia', elogio:'🌟 Elogio' };

  if (!isSocio) {
    return (
      <div className="p-6 max-w-2xl">
        <h1 className="text-2xl font-bold mb-1" style={{color:'#d4a843'}}>🔇 Canal Anônimo</h1>
        <p className="text-sm text-slate-400 mb-4">Envie sugestões, críticas ou denúncias anonimamente para a diretoria. Sua identidade NÃO é registrada.</p>
        <div className="card p-4">
          <select className="input mb-3" value={tipo} onChange={e => setTipo(e.target.value)}>
            {Object.entries(TIPOS).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
          </select>
          <textarea className="input mb-3" rows="6" placeholder="Escreva sua mensagem..." value={text} onChange={e => setText(e.target.value)} />
          <button className="btn" onClick={post} disabled={posting || !text.trim()}>{posting ? 'Enviando…' : '📤 Enviar anonimamente'}</button>
        </div>
      </div>
    );
  }

  // Socio view: lista mensagens recebidas
  return (
    <div className="p-6 max-w-3xl">
      <h1 className="text-2xl font-bold mb-1" style={{color:'#d4a843'}}>🔇 Canal Anônimo — Diretoria</h1>
      <p className="text-sm text-slate-400 mb-6">Mensagens anônimas recebidas. Apenas sócios veem.</p>

      <div className="space-y-3">
        {list.map(m => (
          <div key={m.id} className="card p-4">
            <div className="flex items-start justify-between mb-2">
              <span className="badge" style={{background:'#d4a84330', color:'#fde68a'}}>{TIPOS[m.tipo] || m.tipo}</span>
              <div className="text-xs text-slate-500">{fmtDate(m.ts)}</div>
            </div>
            <div className="text-slate-200 whitespace-pre-wrap mb-3">{m.text}</div>
            {m.resposta && (
              <div className="bg-slate-900/50 p-3 rounded mb-3">
                <div className="text-xs text-yellow-400 font-bold mb-1">↳ Resposta da diretoria</div>
                <div className="text-sm text-slate-300">{m.resposta}</div>
              </div>
            )}
            <div className="flex gap-2">
              {m.status === 'aberta' && <button className="btn btn-sm btn-out" onClick={() => responder(m.id)}>Responder</button>}
              {m.status !== 'arquivada' && <button className="btn btn-sm btn-out" onClick={() => arquivar(m.id)}>Arquivar</button>}
            </div>
          </div>
        ))}
        {list.length === 0 && <div className="text-center text-slate-500 py-8">Nenhuma mensagem recebida.</div>}
      </div>
    </div>
  );
}


// ──────────────────────────────────────────────────────────────────────────
// FormacaoPage (treinamentos/cursos da equipe)
// ──────────────────────────────────────────────────────────────────────────
function FormacaoPage({ user }) {
  const { value: cursos, save } = useShared('FORMACAO_CURSOS');
  const list = Array.isArray(cursos) ? cursos : [];
  const isStaff = user.role === 'socio' || user.role === 'lider';
  const targetUid = useMemo(() => legacyUid(user.id), [user.id]);
  const { value: progresso, save: saveProgresso } = useUserKv(targetUid, 'FORMACAO_PROGRESSO');
  const meu = progresso || {};

  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ titulo:'', categoria:'vendas', descricao:'', url:'', duracao:'', obrigatorio:false });

  async function add() {
    if (!form.titulo) return;
    const item = { id:'cu'+Date.now(), ...form, ts:Date.now(), createdBy:user.id };
    await save([item, ...list].slice(0,500));
    setForm({ titulo:'', categoria:'vendas', descricao:'', url:'', duracao:'', obrigatorio:false });
    setShowForm(false);
  }
  async function remove(id) { if (!confirm('Apagar?')) return; await save(list.filter(c => c.id !== id)); }

  async function marcarConcluido(id) {
    const next = { ...meu, [id]: { concluido: true, concluidoEm: Date.now() } };
    await saveProgresso(next);
  }
  async function marcarPendente(id) {
    const next = { ...meu };
    delete next[id];
    await saveProgresso(next);
  }

  const CATS = { vendas:'💼 Vendas', juridico:'⚖️ Jurídico', produto:'🏗️ Produto', marketing:'📣 Marketing', tecnologia:'💻 Tecnologia', soft:'🧠 Soft skills' };
  const grouped = {};
  list.forEach(c => { if(!grouped[c.categoria]) grouped[c.categoria]=[]; grouped[c.categoria].push(c); });
  const totalConcluidos = list.filter(c => meu[c.id]?.concluido).length;

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>🎓 Formação</h1>
          <p className="text-sm text-slate-400">{totalConcluidos}/{list.length} concluídos por você</p>
        </div>
        {isStaff && <button className="btn" onClick={() => setShowForm(s => !s)}>{showForm ? '× Cancelar' : '+ Novo curso'}</button>}
      </div>

      {showForm && isStaff && (
        <div className="card p-4 mb-4">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
            <input className="input" placeholder="Título do curso" value={form.titulo} onChange={e => setForm({...form, titulo:e.target.value})} />
            <select className="input" value={form.categoria} onChange={e => setForm({...form, categoria:e.target.value})}>
              {Object.entries(CATS).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
            </select>
            <input className="input" placeholder="Link/URL (YouTube, Drive, plataforma)" value={form.url} onChange={e => setForm({...form, url:e.target.value})} />
            <input className="input" placeholder="Duração (ex: 1h30)" value={form.duracao} onChange={e => setForm({...form, duracao:e.target.value})} />
            <label className="flex items-center gap-2 text-sm md:col-span-2"><input type="checkbox" checked={form.obrigatorio} onChange={e => setForm({...form, obrigatorio:e.target.checked})} className="w-5 h-5" style={{accentColor:'#d4a843'}} /> Curso obrigatório</label>
          </div>
          <textarea className="input mb-3" rows="2" placeholder="Descrição" value={form.descricao} onChange={e => setForm({...form, descricao:e.target.value})} />
          <button className="btn" onClick={add} disabled={!form.titulo}>💾 Cadastrar curso</button>
        </div>
      )}

      {Object.keys(grouped).length === 0 ? <div className="text-center text-slate-500 py-8">Nenhum curso cadastrado.</div> : (
        Object.entries(grouped).map(([cat, items]) => (
          <div key={cat} className="mb-6">
            <h2 className="text-sm font-bold uppercase tracking-wider text-slate-400 mb-3">{CATS[cat] || cat}</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              {items.map(c => {
                const done = !!meu[c.id]?.concluido;
                return (
                  <div key={c.id} className="card p-4" style={{borderColor: done ? '#16a34a' : '#334155'}}>
                    <div className="flex items-start justify-between mb-2">
                      <div className="flex gap-2 items-center">
                        {c.obrigatorio && <span className="badge" style={{background:'#dc262630',color:'#fca5a5'}}>obrigatório</span>}
                        {done && <span className="badge" style={{background:'#16a34a30',color:'#86efac'}}>✓ concluído</span>}
                      </div>
                      <span className="text-xs text-slate-500">{c.duracao}</span>
                    </div>
                    <div className="font-bold mb-2">{c.titulo}</div>
                    {c.descricao && <div className="text-sm text-slate-400 mb-3">{c.descricao}</div>}
                    <div className="flex gap-2 flex-wrap">
                      {c.url && <a href={c.url} target="_blank" rel="noopener noreferrer" className="btn btn-sm">↗ Acessar</a>}
                      {!done ? <button className="btn btn-sm btn-success" onClick={() => marcarConcluido(c.id)}>Marcar concluído</button>
                              : <button className="btn btn-sm btn-out" onClick={() => marcarPendente(c.id)}>Reverter</button>}
                      {isStaff && <button className="text-red-400 text-xs ml-1 hover:text-red-300" onClick={() => remove(c.id)}>Apagar</button>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        ))
      )}
    </div>
  );
}

              {fCorr.map(c => <CardUser key={c.id} u={c} color="#3b82f6" />)}

          </div>
        );
      })}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// ManualPage (manual interno editavel)
// ──────────────────────────────────────────────────────────────────────────
function ManualPage({ user }) {
  const { value: secs, save } = useShared('MANUAL_INTERNO');
  const list = Array.isArray(secs) ? secs : [];
  const isStaff = user.role === 'socio';
  const [openId, setOpenId] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState({ titulo:'', conteudo:'', categoria:'geral' });
  const [showForm, setShowForm] = useState(false);

  async function add() {
    if (!editForm.titulo) return;
    const item = { id:'mn'+Date.now(), ...editForm, ts:Date.now() };
    await save([...list, item]);
    setEditForm({ titulo:'', conteudo:'', categoria:'geral' });
    setShowForm(false);
  }
  async function update(id) {
    const next = list.map(s => s.id===id ? {...s, ...editForm, updatedAt:Date.now()} : s);
    await save(next);
    setEditingId(null);
    setEditForm({ titulo:'', conteudo:'', categoria:'geral' });
  }
  async function remove(id) { if (!confirm('Apagar seção?')) return; await save(list.filter(s => s.id !== id)); setOpenId(null); }
  function startEdit(s) { setEditingId(s.id); setEditForm({ titulo:s.titulo, conteudo:s.conteudo, categoria:s.categoria }); }

  const CATS = { geral:'📖 Geral', vendas:'💼 Vendas', juridico:'⚖️ Jurídico', operacional:'⚙️ Operacional', rh:'👥 RH' };
  const grouped = {};
  list.forEach(s => { if(!grouped[s.categoria]) grouped[s.categoria]=[]; grouped[s.categoria].push(s); });

  return (
    <div className="p-6 max-w-4xl">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>📚 Manual Interno</h1>
          <p className="text-sm text-slate-400">{list.length} seções no manual</p>
        </div>
        {isStaff && <button className="btn" onClick={() => { setShowForm(s => !s); setEditingId(null); }}>{showForm ? '× Cancelar' : '+ Nova seção'}</button>}
      </div>

      {showForm && isStaff && (
        <div className="card p-4 mb-4">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
            <input className="input" placeholder="Título" value={editForm.titulo} onChange={e => setEditForm({...editForm, titulo:e.target.value})} />
            <select className="input" value={editForm.categoria} onChange={e => setEditForm({...editForm, categoria:e.target.value})}>
              {Object.entries(CATS).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
            </select>
          </div>
          <textarea className="input mb-3" rows="6" placeholder="Conteúdo (markdown simples suportado)" value={editForm.conteudo} onChange={e => setEditForm({...editForm, conteudo:e.target.value})} />
          <button className="btn" onClick={add} disabled={!editForm.titulo}>💾 Adicionar seção</button>
        </div>
      )}

      {Object.entries(grouped).map(([cat, items]) => (
        <div key={cat} className="mb-6">
          <h2 className="text-sm uppercase tracking-wider text-slate-400 font-bold mb-3">{CATS[cat] || cat}</h2>
          <div className="space-y-2">
            {items.map(s => (
              <div key={s.id} className="card p-4">
                {editingId === s.id ? (
                  <>
                    <input className="input mb-3" value={editForm.titulo} onChange={e => setEditForm({...editForm, titulo:e.target.value})} />
                    <textarea className="input mb-3" rows="6" value={editForm.conteudo} onChange={e => setEditForm({...editForm, conteudo:e.target.value})} />
                    <div className="flex gap-2">
                      <button className="btn btn-sm btn-success" onClick={() => update(s.id)}>Salvar</button>
                      <button className="btn btn-sm btn-out" onClick={() => setEditingId(null)}>Cancelar</button>
                    </div>
                  </>
                ) : (
                  <>
                    <div className="flex items-start justify-between cursor-pointer" onClick={() => setOpenId(openId === s.id ? null : s.id)}>
                      <div className="font-bold">{s.titulo}</div>
                      <div className="text-slate-400">{openId === s.id ? '▲' : '▼'}</div>
                    </div>
                    {openId === s.id && (
                      <>
                        <div className="text-slate-300 whitespace-pre-wrap mt-3 text-sm leading-relaxed">{s.conteudo}</div>
                        {isStaff && (
                          <div className="flex gap-2 mt-3">
                            <button className="btn btn-sm btn-out" onClick={() => startEdit(s)}>Editar</button>
                            <button className="text-red-400 text-xs ml-1 hover:text-red-300" onClick={() => remove(s.id)}>Apagar</button>
                          </div>
                        )}
                      </>
                    )}
                  </>
                )}
              </div>
            ))}
          </div>
        </div>
      ))}
      {list.length === 0 && <div className="text-center text-slate-500 py-8">Manual vazio. {isStaff && 'Adicione a primeira seção.'}</div>}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// EticaPage (codigo de etica/compliance)
// ──────────────────────────────────────────────────────────────────────────
function EticaPage({ user }) {
  const { value: codigo, save } = useShared('ETICA_CODIGO');
  const isSocio = user.role === 'socio';
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState('');
  const targetUid = useMemo(() => legacyUid(user.id), [user.id]);
  const { value: aceite, save: saveAceite } = useUserKv(targetUid, 'ETICA_ACEITE');

  useEffect(() => { if (codigo?.texto) setText(codigo.texto); }, [codigo]);

  async function salvar() {
    await save({ texto: text, atualizadoEm: Date.now(), atualizadoPor: user.id });
    setEditing(false);
  }
  async function aceitar() {
    if (!confirm('Confirmar aceite do código de ética?\nEste registro fica gravado com seu nome e data.')) return;
    await saveAceite({ aceitouEm: Date.now(), versaoTexto: codigo?.texto?.substring(0,200) });
  }

  const TEXTO_PADRAO = `CÓDIGO DE ÉTICA E COMPLIANCE — PSM IMOBILIÁRIA

1. INTEGRIDADE
Toda comunicação com clientes, parceiros e colegas deve ser honesta, transparente e respeitosa.

2. CONFIDENCIALIDADE
Informações de clientes, valores de venda, comissões e estratégias internas são confidenciais.

3. ANTI-CORRUPÇÃO
Não é permitido oferecer, receber ou intermediar pagamentos indevidos a/de funcionários públicos ou agentes privados.

4. CONFLITO DE INTERESSE
Comunicar à direção qualquer relação pessoal ou financeira que possa influenciar decisões profissionais.

5. ASSÉDIO E DISCRIMINAÇÃO
Tolerância zero a qualquer forma de assédio moral, sexual ou discriminação por raça, gênero, idade, orientação sexual, religião ou condição.

6. USO DE DADOS PESSOAIS (LGPD)
Dados de clientes só podem ser usados para os fins acordados. Não compartilhar listas de leads externamente.

7. CONCORRÊNCIA LEAL
Não falar mal da concorrência publicamente. Competir com qualidade e profissionalismo.

8. CANAL DE DENÚNCIAS
Toda violação deste código deve ser reportada via Canal Anônimo do sistema, ou diretamente à direção.`;

  const conteudo = codigo?.texto || TEXTO_PADRAO;
  const meuAceite = aceite?.aceitouEm;

  return (
    <div className="p-6 max-w-3xl">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>⚖️ Código de Ética</h1>
          <p className="text-sm text-slate-400">Compliance e conduta profissional</p>
        </div>
        {isSocio && !editing && <button className="btn" onClick={() => { setText(conteudo); setEditing(true); }}>Editar</button>}
      </div>

      {meuAceite && (
        <div className="card p-3 mb-4" style={{background:'#16a34a20', borderColor:'#16a34a'}}>
          <div className="text-sm text-green-400">✓ Você aceitou em {fmtDate(meuAceite)}</div>
        </div>
      )}

      {editing ? (
        <div className="card p-4">
          <textarea className="input mb-3" rows="20" value={text} onChange={e => setText(e.target.value)} />
          <div className="flex gap-2">
            <button className="btn btn-success" onClick={salvar}>Salvar</button>
            <button className="btn btn-out" onClick={() => setEditing(false)}>Cancelar</button>
          </div>
        </div>
      ) : (
        <>
          <div className="card p-6 mb-4">
            <div className="text-slate-200 whitespace-pre-wrap leading-relaxed text-sm">{conteudo}</div>
            {codigo?.atualizadoEm && <div className="text-xs text-slate-500 mt-4 pt-4 border-t border-slate-700">Última atualização: {fmtDate(codigo.atualizadoEm)}</div>}
          </div>
          {!meuAceite && (
            <button className="btn btn-success w-full" onClick={aceitar}>✓ Eu li e aceito o Código de Ética</button>
          )}
        </>
      )}
    </div>
  );
}


// ──────────────────────────────────────────────────────────────────────────
// DREPage (Demonstrativo de Resultados)
// ──────────────────────────────────────────────────────────────────────────
function DREPage({ user }) {
  const lvl = RLVL[user.role] || 0;
  if (lvl < 5) return <div className="p-6 text-slate-500">Acesso restrito a líder+ e sócios.</div>;

  const [refMes, setRefMes] = useState(monthKey());
  const { value: vendas } = useShared('VENDAS_MANUAIS');
  const { value: comissoes } = useShared('COMISSOES_PAGAMENTOS');
  const { value: fluxo } = useShared('FLUXO_CAIXA_' + refMes);
  const { value: custos } = useShared('CUSTOS_FIXOS_' + refMes);

  const vendasMes = (Array.isArray(vendas) ? vendas : []).filter(v => v.status === 'fechada' && v.dataVenda?.startsWith(refMes));
  const vgvBruto = vendasMes.reduce((s,v) => s + (v.vgv||0), 0);
  const comissoesMes = (Array.isArray(comissoes) ? comissoes : []).filter(c => c.refMes === refMes);
  const totalComissoes = comissoesMes.reduce((s,c) => s+(c.valor||0), 0);
  const fluxoList = Array.isArray(fluxo) ? fluxo : [];
  const totalDespesas = fluxoList.filter(f => f.tipo === 'saida').reduce((s,f) => s+(f.valor||0), 0);
  const custosList = Array.isArray(custos) ? custos : [];
  const totalCustosFixos = custosList.reduce((s,c) => s + (c.valor||0), 0);

  // Estimativa receita imobiliária: assumindo 6% comissão direta + 1% gerência sobre VGV
  const receitaEstimada = vgvBruto * 0.07;
  const lucroBruto = receitaEstimada - totalComissoes;
  const lucroOperacional = lucroBruto - totalDespesas - totalCustosFixos;
  const margem = receitaEstimada > 0 ? (lucroOperacional / receitaEstimada * 100) : 0;

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>📈 DRE</h1>
          <p className="text-sm text-slate-400">Demonstrativo de Resultados — {refMes}</p>
        </div>
        <input type="month" className="input max-w-xs" value={refMes} onChange={e => setRefMes(e.target.value)} />
      </div>

      <div className="card overflow-hidden mb-4">
        <table className="w-full text-sm">
          <tbody>
            <tr className="border-b border-slate-700"><td className="p-3 font-bold">VGV vendido (bruto)</td><td className="text-right p-3 font-bold" style={{color:'#d4a843'}}>{fmtMoney(vgvBruto)}</td></tr>
            <tr className="border-b border-slate-700"><td className="p-3 text-slate-400">Receita estimada (7% sobre VGV)</td><td className="text-right p-3 text-slate-400">+ {fmtMoney(receitaEstimada)}</td></tr>
            <tr className="border-b border-slate-700"><td className="p-3 text-slate-400">(−) Comissões a pagar</td><td className="text-right p-3 text-red-400">− {fmtMoney(totalComissoes)}</td></tr>
            <tr className="border-b border-slate-700 bg-slate-900"><td className="p-3 font-bold">= Lucro Bruto</td><td className="text-right p-3 font-bold" style={{color: lucroBruto >= 0 ? '#22c55e' : '#ef4444'}}>{fmtMoney(lucroBruto)}</td></tr>
            <tr className="border-b border-slate-700"><td className="p-3 text-slate-400">(−) Despesas operacionais (fluxo de caixa)</td><td className="text-right p-3 text-red-400">− {fmtMoney(totalDespesas)}</td></tr>
            <tr className="border-b border-slate-700"><td className="p-3 text-slate-400">(−) Custos fixos do mês</td><td className="text-right p-3 text-red-400">− {fmtMoney(totalCustosFixos)}</td></tr>
            <tr className="bg-slate-900"><td className="p-3 font-bold text-lg">= Lucro Operacional</td><td className="text-right p-3 font-bold text-lg" style={{color: lucroOperacional >= 0 ? '#22c55e' : '#ef4444'}}>{fmtMoney(lucroOperacional)}</td></tr>
          </tbody>
        </table>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
        <div className="card p-4"><div className="text-xs text-slate-400">Vendas no mês</div><div className="text-2xl font-bold">{vendasMes.length}</div></div>
        <div className="card p-4"><div className="text-xs text-slate-400">Margem operacional</div><div className="text-2xl font-bold" style={{color: margem >= 20 ? '#22c55e' : margem >= 0 ? '#d4a843' : '#ef4444'}}>{margem.toFixed(1)}%</div></div>
        <div className="card p-4"><div className="text-xs text-slate-400">Comissão média / venda</div><div className="text-2xl font-bold">{fmtMoney(vendasMes.length > 0 ? totalComissoes / vendasMes.length : 0)}</div></div>
      </div>

      <div className="card p-4">
        <div className="text-sm text-slate-400 mb-2">⚠️ Observações</div>
        <ul className="text-xs text-slate-500 space-y-1 list-disc list-inside">
          <li>Receita estimada = 7% sobre VGV (assumindo média histórica). Ajuste manual via Fluxo de Caixa.</li>
          <li>Despesas operacionais = lançamentos do tipo "saída" no Fluxo de Caixa do mês.</li>
          <li>Custos fixos = lançados separadamente em Custos Fixos & Variáveis.</li>
          <li>Comissões consideram TODAS do mês (pendentes + pagas).</li>
        </ul>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// RepassesPage (controle de repasses para incorporadoras/parceiros)
// ──────────────────────────────────────────────────────────────────────────
function RepassesPage({ user }) {
  const lvl = RLVL[user.role] || 0;
  if (lvl < 5) return <div className="p-6 text-slate-500">Acesso restrito a líder+ e sócios.</div>;

  const { value: repasses, save } = useShared('REPASSES');
  const list = Array.isArray(repasses) ? repasses : [];
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ destinatario:'', referencia:'', valor:'', vencimento:todayKey(), status:'a_pagar', comprovante:'', obs:'' });

  async function add() {
    if (!form.destinatario || !form.valor) return;
    const item = { id:'rp'+Date.now(), ...form, valor:parseFloat(form.valor)||0, ts:Date.now(), createdBy:user.id };
    await save([item, ...list].slice(0,1000));
    setForm({ destinatario:'', referencia:'', valor:'', vencimento:todayKey(), status:'a_pagar', comprovante:'', obs:'' });
    setShowForm(false);
  }
  async function setStatus(id, status) { await save(list.map(r => r.id===id ? {...r, status, statusAt:Date.now()} : r)); }
  async function remove(id) { if (!confirm('Apagar?')) return; await save(list.filter(r => r.id !== id)); }

  const totalAPagar = list.filter(r => r.status === 'a_pagar').reduce((s,r) => s+(r.valor||0), 0);
  const totalPago = list.filter(r => r.status === 'pago').reduce((s,r) => s+(r.valor||0), 0);
  const atrasados = list.filter(r => r.status === 'a_pagar' && r.vencimento && r.vencimento < todayKey()).length;

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>🔄 Repasses</h1>
          <p className="text-sm text-slate-400">Pagamentos para incorporadoras e parceiros</p>
        </div>
        <button className="btn" onClick={() => setShowForm(s => !s)}>{showForm ? '× Cancelar' : '+ Novo repasse'}</button>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
        <div className="card p-4"><div className="text-xs text-slate-400">A pagar</div><div className="text-2xl font-bold text-yellow-400">{fmtMoney(totalAPagar)}</div></div>
        <div className="card p-4"><div className="text-xs text-slate-400">Pago</div><div className="text-2xl font-bold text-green-400">{fmtMoney(totalPago)}</div></div>
        <div className="card p-4" style={{borderColor: atrasados > 0 ? '#dc2626' : '#334155'}}><div className="text-xs text-slate-400">Atrasados</div><div className="text-2xl font-bold" style={{color: atrasados > 0 ? '#ef4444' : '#94a3b8'}}>{atrasados}</div></div>
      </div>

      {showForm && (
        <div className="card p-4 mb-4">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
            <input className="input" placeholder="Destinatário (incorporadora/parceiro)" value={form.destinatario} onChange={e => setForm({...form, destinatario:e.target.value})} />
            <input className="input" placeholder="Referência (cliente/empreendimento)" value={form.referencia} onChange={e => setForm({...form, referencia:e.target.value})} />
            <input type="number" step="0.01" className="input" placeholder="Valor (R$)" value={form.valor} onChange={e => setForm({...form, valor:e.target.value})} />
            <input type="date" className="input" value={form.vencimento} onChange={e => setForm({...form, vencimento:e.target.value})} />
            <input className="input" placeholder="Comprovante/NF (URL)" value={form.comprovante} onChange={e => setForm({...form, comprovante:e.target.value})} />
            <select className="input" value={form.status} onChange={e => setForm({...form, status:e.target.value})}>
              <option value="a_pagar">A pagar</option><option value="pago">Pago</option><option value="cancelado">Cancelado</option>
            </select>
          </div>
          <textarea className="input mb-3" rows="2" placeholder="Observações" value={form.obs} onChange={e => setForm({...form, obs:e.target.value})} />
          <button className="btn" onClick={add} disabled={!form.destinatario || !form.valor}>💾 Salvar repasse</button>
        </div>
      )}

      <div className="card overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr className="bg-slate-900 text-xs text-slate-400 uppercase">
            <th className="text-left p-3">Vencimento</th>
            <th className="text-left p-3">Destinatário</th>
            <th className="text-left p-3">Referência</th>
            <th className="text-right p-3">Valor</th>
            <th className="text-center p-3">Status</th>
            <th></th>
          </tr></thead>
          <tbody>
            {list.sort((a,b) => (a.vencimento||'').localeCompare(b.vencimento||'')).map(r => {
              const atrasado = r.status === 'a_pagar' && r.vencimento && r.vencimento < todayKey();
              const stColor = r.status === 'pago' ? '#16a34a' : r.status === 'cancelado' ? '#64748b' : (atrasado ? '#dc2626' : '#d4a843');
              const stLbl = atrasado ? '🔴 Atrasado' : r.status === 'pago' ? '✓ Pago' : r.status === 'cancelado' ? '× Cancelado' : '⏳ A pagar';
              return (
                <tr key={r.id} className="border-t border-slate-700">
                  <td className="p-3 text-xs">{r.vencimento}</td>
                  <td className="p-3 font-medium">{r.destinatario}</td>
                  <td className="p-3 text-xs">{r.referencia}</td>
                  <td className="text-right p-3 font-bold" style={{color:'#d4a843'}}>{fmtMoney(r.valor)}</td>
                  <td className="text-center p-3"><span className="badge" style={{background:stColor+'30',color:stColor}}>{stLbl}</span></td>
                  <td className="p-3 whitespace-nowrap">
                    {r.status === 'a_pagar' && <button className="btn btn-sm btn-success" onClick={() => setStatus(r.id, 'pago')}>Marcar pago</button>}
                    {r.comprovante && <a href={r.comprovante} target="_blank" rel="noopener noreferrer" className="btn btn-sm btn-out ml-1">↗ NF</a>}
                    <button className="text-red-400 text-xs ml-2" onClick={() => remove(r.id)}>×</button>
                  </td>
                </tr>
              );
            })}
            {list.length === 0 && <tr><td colSpan="6" className="text-center text-slate-500 p-8">Nenhum repasse.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// ForecastPage (projecao 6 meses)
// ──────────────────────────────────────────────────────────────────────────
function ForecastPage({ user }) {
  const lvl = RLVL[user.role] || 0;
  if (lvl < 5) return <div className="p-6 text-slate-500">Acesso restrito a líder+ e sócios.</div>;

  const { value: vendas } = useShared('VENDAS_MANUAIS');
  const { value: deals } = useShared('CRM_DEALS');
  const { value: metas } = useShared('METAS_INDIVIDUAIS');

  const list = Array.isArray(vendas) ? vendas : [];
  const dealsList = Array.isArray(deals) ? deals : [];
  const m = metas || {};

  const corretores = USERS.filter(u => ['corretor','lider'].includes(u.role));
  const totalMetaMes = corretores.reduce((s,c) => s + (m[c.id]?.vgv || 0), 0);

  // Calcula media historica (ultimos 3 meses fechados)
  const meses = [];
  const now = new Date();
  for (let i = 0; i < 6; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const mk = d.toISOString().slice(0,7);
    const lbl = d.toLocaleDateString('pt-BR', { month:'short', year:'2-digit' });
    const vendasMes = list.filter(v => v.status==='fechada' && v.dataVenda?.startsWith(mk));
    const vgvReal = vendasMes.reduce((s,v) => s+(v.vgv||0), 0);
    const isFuturo = mk > monthKey();
    const isPassado = mk < monthKey();
    const dealsAtivos = dealsList.filter(d => !['fechado','perdido'].includes(d.status));
    const pipelineFuturo = isFuturo ? dealsAtivos.reduce((s,d) => s+(d.valor||0), 0) * 0.3 : 0; // assume 30% de conversão
    const projecao = isPassado ? vgvReal : (isFuturo ? Math.max(totalMetaMes * 0.85, pipelineFuturo) : (vgvReal + (totalMetaMes * 0.5)));
    meses.push({ mk, lbl, vgvReal, projecao, meta: totalMetaMes, isFuturo, isPassado, vendas: vendasMes.length });
  }

  const totalProjecao6m = meses.reduce((s,m) => s + m.projecao, 0);
  const totalReal3mPassado = meses.slice(0,3).filter(x => x.isPassado).reduce((s,m) => s + m.vgvReal, 0);
  const mediaReal = totalReal3mPassado / 3;

  return (
    <div className="p-6">
      <h1 className="text-2xl font-bold mb-1" style={{color:'#d4a843'}}>🔮 Forecast 6 meses</h1>
      <p className="text-sm text-slate-400 mb-6">Projeção baseada em metas + pipeline + histórico</p>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
        <div className="card p-4"><div className="text-xs text-slate-400">Projeção 6 meses</div><div className="text-2xl font-bold" style={{color:'#d4a843'}}>{fmtMoney(totalProjecao6m)}</div></div>
        <div className="card p-4"><div className="text-xs text-slate-400">Média real (3m passados)</div><div className="text-2xl font-bold">{fmtMoney(mediaReal)}</div></div>
        <div className="card p-4"><div className="text-xs text-slate-400">Meta mensal soma</div><div className="text-2xl font-bold">{fmtMoney(totalMetaMes)}</div></div>
      </div>

      <div className="card overflow-hidden mb-4">
        <table className="w-full text-sm">
          <thead><tr className="bg-slate-900 text-xs text-slate-400 uppercase">
            <th className="text-left p-3">Mês</th>
            <th className="text-right p-3">Projeção / Real</th>
            <th className="text-right p-3">Meta</th>
            <th className="text-right p-3">% Meta</th>
            <th className="text-right p-3">Vendas</th>
            <th className="text-center p-3">Status</th>
          </tr></thead>
          <tbody>
            {meses.map(mes => {
              const pct = mes.meta > 0 ? (mes.projecao / mes.meta * 100) : 0;
              return (
                <tr key={mes.mk} className="border-t border-slate-700">
                  <td className="p-3 font-medium uppercase">{mes.lbl}</td>
                  <td className="text-right p-3 font-bold" style={{color:'#d4a843'}}>{fmtMoney(mes.projecao)}</td>
                  <td className="text-right p-3 text-slate-400">{fmtMoney(mes.meta)}</td>
                  <td className="text-right p-3 font-bold" style={{color: pct >= 100 ? '#22c55e' : pct >= 70 ? '#d4a843' : '#ef4444'}}>{pct.toFixed(0)}%</td>
                  <td className="text-right p-3">{mes.vendas || '—'}</td>
                  <td className="text-center p-3">
                    {mes.isPassado ? <span className="badge" style={{background:'#16a34a30', color:'#86efac'}}>real</span>
                      : mes.isFuturo ? <span className="badge" style={{background:'#3b82f630', color:'#93c5fd'}}>projeção</span>
                      : <span className="badge" style={{background:'#d4a84330', color:'#fde68a'}}>em curso</span>}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      <div className="card p-4">
        <div className="text-xs text-slate-500 leading-relaxed">
          <strong>Metodologia:</strong> Meses passados usam VGV real (vendas fechadas). Mês corrente combina real + 50% da meta restante. Meses futuros usam o maior valor entre 85% da meta ou 30% do pipeline ativo (CRM).
        </div>
      </div>
    </div>
  );
}

                <div className="text-xs text-slate-400">Taxa: {fmtMoney(c.valorAluguel * c.taxa / 100)} ({c.taxa}%)</div>
              </div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-sm mt-2">

              <div><strong className="text-slate-400">🏠 Inquilino:</strong> {c.inquilino} {c.telInquilino && '· '+c.telInquilino}</div>

        ))}
        {filtered.length === 0 && <div className="text-center text-slate-500 py-8">Nenhum contrato.</div>}
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// GovernancePage (audit log via Supabase)
// ──────────────────────────────────────────────────────────────────────────
function GovernancePage({ user }) {
  const lvl = RLVL[user.role] || 0;
  if (lvl < 7) return <div className="p-6 text-slate-500">Acesso restrito a sócios e gerentes.</div>;

  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');
  const [filterTable, setFilterTable] = useState('');
  const [filterOp, setFilterOp] = useState('');

  async function load() {
    if (!sb) { setErr('Supabase não disponível'); setLoading(false); return; }
    setLoading(true); setErr('');
    try {
      let q = sb.from('audit_log').select('*').order('created_at', { ascending: false }).limit(200);
      if (filterTable) q = q.eq('table_name', filterTable);
      if (filterOp) q = q.eq('operation', filterOp);
      const { data, error } = await q;
      if (error) setErr(error.message);
      else setLogs(data || []);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  }
  useEffect(() => { load(); }, [filterTable, filterOp]);

  function decodeUid(uid) {
    if (!uid) return 'anônimo';
    try {
      const hex = uid.replace(/-/g,'').toLowerCase();
      if (/0{16,}$/.test(hex)) {
        const prefix = hex.replace(/0+$/,'');
        let name = '';
        for (let i = 0; i < prefix.length; i += 2) {
          const c = parseInt(prefix.substr(i,2), 16);
          if (c >= 32 && c < 127) name += String.fromCharCode(c);
        }
        if (name) return name;
      }
    } catch(_){}
    return uid.substring(0,8);
  }

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>📜 Governance — Audit Log</h1>
          <p className="text-sm text-slate-400">Histórico de mudanças no banco (auditoria automática)</p>
        </div>
        <button className="btn btn-sm btn-out" onClick={load}>↻ Atualizar</button>
      </div>

      <div className="flex gap-2 mb-4">
        <select className="input max-w-xs" value={filterTable} onChange={e => setFilterTable(e.target.value)}>
          <option value="">Todas tabelas</option>
          <option value="shared_kv">shared_kv</option>
          <option value="user_kv">user_kv</option>
        </select>
        <select className="input max-w-xs" value={filterOp} onChange={e => setFilterOp(e.target.value)}>
          <option value="">Todas operações</option>
          <option value="insert">Insert</option>
          <option value="update">Update</option>
          <option value="delete">Delete</option>
        </select>
      </div>

      {err && <div className="card p-4 mb-4 text-red-400">⚠ {err}</div>}
      {loading ? <div className="text-slate-500">Carregando…</div> : (
        <div className="card overflow-hidden">
          <table className="w-full text-sm">
            <thead><tr className="bg-slate-900 text-xs text-slate-400 uppercase">
              <th className="text-left p-3">Quando</th>
              <th className="text-left p-3">Usuário</th>
              <th className="text-left p-3">Tabela</th>
              <th className="text-left p-3">Op</th>
              <th className="text-left p-3">Chave</th>
            </tr></thead>
            <tbody>
              {logs.map(l => {
                const opColor = l.operation==='insert' ? '#16a34a' : l.operation==='update' ? '#3b82f6' : '#dc2626';
                return (
                  <tr key={l.id} className="border-t border-slate-700 hover:bg-slate-900/50">
                    <td className="p-3 text-xs">{fmtDate(l.created_at)}</td>
                    <td className="p-3 font-medium">{decodeUid(l.user_id)}</td>
                    <td className="p-3 text-xs">{l.table_name}</td>
                    <td className="p-3"><span className="badge" style={{background:opColor+'30',color:opColor}}>{l.operation}</span></td>
                    <td className="p-3 text-xs font-mono">{l.key || '—'}</td>
                  </tr>
                );
              })}
              {logs.length === 0 && <tr><td colSpan="5" className="text-center text-slate-500 p-8">Sem eventos.</td></tr>}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function ConfiguracoesPage({ user }) {
  const targetUid = useMemo(() => legacyUid(user.id), [user.id]);

  const p = pref || {};

  const [form, setForm] = useState({
    nomeExibicao: p.nomeExibicao || user.name,
    notifEmail: p.notifEmail !== false,
    notifSistema: p.notifSistema !== false,
    tema: p.tema || 'dark',
    emailContato: p.emailContato || user.email,
    telefone: p.telefone || '',
    bio: p.bio || ''
  });
  const [saving, setSaving] = useState(false);
  const [savedAt, setSavedAt] = useState(null);

  useEffect(() => {
    if (p && Object.keys(p).length > 0) {
      setForm({
        nomeExibicao: p.nomeExibicao || user.name,
        notifEmail: p.notifEmail !== false,
        notifSistema: p.notifSistema !== false,
        tema: p.tema || 'dark',
        emailContato: p.emailContato || user.email,
        telefone: p.telefone || '',
