function legacyUid(psmId) {
  if (!psmId) return null;
  let hex = '';
  for (let i = 0; i < psmId.length; i++) hex += psmId.charCodeAt(i).toString(16).padStart(2,'0');
  hex = (hex + '00000000000000000000000000000000').substring(0,32);
  return hex.substring(0,8) + '-' + hex.substring(8,12) + '-' + hex.substring(12,16) + '-' + hex.substring(16,20) + '-' + hex.substring(20,32);
}

// ──────────────────────────────────────────────────────────────────────────
// Hooks de leitura/escrita Supabase
// ──────────────────────────────────────────────────────────────────────────
function useShared(key) {
  const [value, setValue] = useState(null);
  const [loading, setLoading] = useState(true);
  const reload = useCallback(() => {
    if (!sb || !key) return;
    setLoading(true);
    sb.from('shared_kv').select('value,updated_at').eq('key', key).maybeSingle()
      .then(({ data }) => {
        setValue(data ? data.value : null);
        setLoading(false);
      });
  }, [key]);
  useEffect(() => { reload(); }, [reload]);
  const save = useCallback(async (newVal) => {
    if (!sb || !key) return { error: 'no sb' };
    const r = await sb.from('shared_kv').upsert({ key, value: newVal }, { onConflict: 'key' });
    if (!r.error) setValue(newVal);
    return r;
  }, [key]);
  return { value, loading, save, reload };
}

function useUserKv(uid, key) {
  const [value, setValue] = useState(null);
  const [loading, setLoading] = useState(true);
  const reload = useCallback(() => {
    if (!sb || !uid || !key) return;
    setLoading(true);
    sb.from('user_kv').select('value,updated_at').eq('user_id', uid).eq('key', key).maybeSingle()
      .then(({ data }) => {
        setValue(data ? data.value : null);
        setLoading(false);
      });
  }, [uid, key]);
  useEffect(() => { reload(); }, [reload]);
  const save = useCallback(async (newVal) => {
    if (!sb || !uid || !key) return { error: 'no sb' };
    const r = await sb.from('user_kv').upsert({ user_id: uid, key, value: newVal }, { onConflict: 'user_id,key' });
    if (!r.error) setValue(newVal);
    return r;
  }, [uid, key]);
  return { value, loading, save, reload };
}

function LoginPage({ onLogin }) {
  const [selectedId, setSelectedId] = useState('');
  const [err, setErr] = useState('');
  function doLogin() {
    if (!selectedId) { setErr('Selecione seu nome'); return; }
    const u = USERS.find(x => x.id === selectedId);
    if (!u) { setErr('Usuário não encontrado'); return; }
    localStorage.setItem('psm_v2_user', JSON.stringify(u));
    onLogin(u);
  }
  return (
    <div className="min-h-screen flex items-center justify-center p-4">
      <div className="card p-8 w-full max-w-md">
        <h1 className="text-2xl font-bold mb-1" style={{color:'#d4a843'}}>PSM /v2</h1>
        <p className="text-sm text-slate-400 mb-6">Sistema reescrito • Versão paralela</p>
        <label className="block text-xs text-slate-400 mb-2">Quem é você?</label>
        <select className="input mb-4" value={selectedId} onChange={e => { setSelectedId(e.target.value); setErr(''); }}>
          <option value="">— selecionar —</option>
          {USERS.map(u => <option key={u.id} value={u.id}>{u.name} ({u.role})</option>)}

          Auth simplificada (sem senha). Sprint próxima traz auth real Supabase.

  );
}

// ──────────────────────────────────────────────────────────────────────────
// OOPage (módulo Olho-no-Olho)
// ──────────────────────────────────────────────────────────────────────────
function OOPage({ user }) {
  const lvl = RLVL[user.role] || 0;
  const canViewOthers = lvl >= 5;
  const [selectedBid, setSelectedBid] = useState(user.id);
  const [data, setData] = useState({});
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [savedAt, setSavedAt] = useState(null);
  const [err, setErr] = useState('');
  const [date, setDate] = useState(todayKey());
  const targetUid = useMemo(() => legacyUid(selectedBid), [selectedBid]);
  const mk = useMemo(() => date.slice(0,7), [date]);

  useEffect(() => {
    if (!sb || !selectedBid) return;
    setLoading(true); setErr('');
    sb.from('user_kv').select('value').eq('user_id', targetUid).eq('key', 'OO_DAILY_' + selectedBid).maybeSingle()
      .then(({ data: row, error }) => {
        if (error) setErr(error.message);
        const all = (row && row.value) || {};
        const today = (all[mk] && all[mk][date]) || {};
        setData(OO_FIELDS.reduce((acc, f) => ({ ...acc, [f.key]: today[f.key] || 0 }), {}));
        setLoading(false);
      });
  }, [selectedBid, date, mk, targetUid]);

  function setField(k, v) { setData(prev => ({ ...prev, [k]: Math.max(0, parseInt(v,10) || 0) })); }
  async function save() {
    if (!sb) { setErr('Supabase não configurado'); return; }
    setSaving(true); setErr('');
    try {
      const { data: row } = await sb.from('user_kv').select('value').eq('user_id', targetUid).eq('key', 'OO_DAILY_' + selectedBid).maybeSingle();
      const all = (row && row.value) || {};
      if (!all[mk]) all[mk] = {};
      all[mk][date] = data;
      const up = await sb.from('user_kv').upsert({ user_id: targetUid, key: 'OO_DAILY_' + selectedBid, value: all }, { onConflict: 'user_id,key' });
      if (up.error) throw up.error;
      setSavedAt(Date.now());
    } catch(e) { setErr(e.message || String(e)); }
    setSaving(false);
  }

  const total = OO_FIELDS.reduce((sum, f) => sum + (data[f.key] || 0), 0);
  const corretores = USERS.filter(u => ['corretor','lider'].includes(u.role));

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>👁️ Olho-no-Olho</h1>
          <p className="text-sm text-slate-400">Registro diário de atividades</p>
        </div>
        {canViewOthers && (
          <select className="input max-w-xs" value={selectedBid} onChange={e => setSelectedBid(e.target.value)}>
            {corretores.map(u => <option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
        )}
      </div>
      <div className="card p-4 mb-4 flex items-center gap-4 flex-wrap">
        <div>
          <label className="text-xs text-slate-400 block mb-1">Data</label>
          <input type="date" className="input" value={date} onChange={e => setDate(e.target.value)} />
        </div>
        <div className="flex-1">
          <div className="text-xs text-slate-400">Corretor</div>
          <div className="font-bold text-lg">{USERS.find(u => u.id === selectedBid)?.name || selectedBid}</div>
        </div>
        <div className="text-right">
          <div className="text-xs text-slate-400">Total</div>
          <div className="text-3xl font-bold" style={{color:'#d4a843'}}>{total}</div>
        </div>
      </div>
      {loading ? <div className="text-center text-slate-500 py-8">Carregando…</div> : (
        <>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
            {OO_FIELDS.map(f => (
              <div key={f.key} className="card p-4">
                <div className="flex items-center gap-2 mb-3">
                  <span className="text-2xl">{f.emoji}</span>
                  <span className="font-bold text-sm">{f.label}</span>
                </div>
                <div className="field-counter">
                  <button onClick={() => setField(f.key, (data[f.key]||0) - 1)}>−</button>
                  <input type="number" min="0" value={data[f.key] || 0} onChange={e => setField(f.key, e.target.value)} />
                  <button onClick={() => setField(f.key, (data[f.key]||0) + 1)}>+</button>
                </div>
              </div>
            ))}
          </div>
          <div className="flex items-center gap-3 flex-wrap">
            <button className="btn" onClick={save} disabled={saving}>{saving ? 'Salvando…' : '💾 Salvar dia'}</button>
            {savedAt && <span className="text-green-400 text-sm">✓ Salvo {new Date(savedAt).toLocaleTimeString('pt-BR')}</span>}
            {err && <span className="text-red-400 text-sm">⚠ {err}</span>}
          </div>
        </>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// DashboardPage
// ──────────────────────────────────────────────────────────────────────────
function DashboardPage({ user }) {
  const [snapshot, setSnapshot] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!sb) { setLoading(false); return; }
    const today = todayKey();
    const mk = monthKey();
    Promise.all(
      USERS.filter(u => ['corretor','lider'].includes(u.role)).map(async u => {
        const { data: row } = await sb.from('user_kv').select('value').eq('user_id', legacyUid(u.id)).eq('key', 'OO_DAILY_' + u.id).maybeSingle();
        const all = (row && row.value) || {};
        const todayData = (all[mk] && all[mk][today]) || {};
        const total = OO_FIELDS.reduce((s, f) => s + (todayData[f.key] || 0), 0);
        return { id: u.id, name: u.name, frente: u.frente, total, fields: todayData };
      })
    ).then(rows => {
      rows.sort((a,b) => b.total - a.total);
      setSnapshot(rows);
      setLoading(false);
    });
  }, []);
  return (
    <div className="p-6">
      <h1 className="text-2xl font-bold mb-1" style={{color:'#d4a843'}}>📊 Dashboard — Hoje</h1>
      <p className="text-sm text-slate-400 mb-6">Atividades em {new Date().toLocaleDateString('pt-BR')}</p>
      {loading ? <div className="text-slate-500">Carregando…</div> : snapshot && (
        <div className="card overflow-hidden">
          <table className="w-full">
            <thead><tr className="bg-slate-900 text-xs text-slate-400 uppercase">
              <th className="text-left p-3">Corretor</th>
              <th className="text-left p-3">Frente</th>
              {OO_FIELDS.map(f => <th key={f.key} className="text-center p-3" title={f.label}>{f.emoji}</th>)}
              <th className="text-right p-3">Total</th>
            </tr></thead>
            <tbody>
              {snapshot.map(r => (
                <tr key={r.id} className="border-t border-slate-700 hover:bg-slate-900/50">
                  <td className="p-3 font-medium">{r.name}</td>
                  <td className="p-3 text-xs">{r.frente ? FRENTES[r.frente]?.emoji + ' ' + FRENTES[r.frente]?.label : '—'}</td>
                  {OO_FIELDS.map(f => <td key={f.key} className="text-center p-3 text-slate-300">{r.fields[f.key] || 0}</td>)}
                  <td className="text-right p-3 font-bold" style={{color:'#d4a843'}}>{r.total}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// EquipePage
// ──────────────────────────────────────────────────────────────────────────
function EquipePage({ user }) {
  const lvl = RLVL[user.role] || 0;
  const isSocio = user.role === 'socio';
  const { value: disabled, save: saveDisabled, loading } = useShared('USER_DISABLED');
  const dmap = disabled || {};

  async function toggleDisabled(uid) {
    if (!isSocio) return;
    if (uid === user.id) { alert('Você não pode desativar você mesmo'); return; }
    const target = USERS.find(x => x.id === uid);
    const isOn = !!dmap[uid];
    const action = isOn ? 'reativar' : 'desativar';
    if (!confirm('Confirma ' + action + ' ' + target.name + '?\nDados são preservados.')) return;
    const next = { ...dmap };
    if (isOn) delete next[uid];
    else next[uid] = { disabledAt: Date.now(), disabledBy: user.id };
    const r = await saveDisabled(next);
    if (r.error) alert('Erro: ' + r.error.message);
  }

  const grouped = useMemo(() => {
    const byFrente = {};
    USERS.forEach(u => {
      const k = u.frente || '_outros';
      if (!byFrente[k]) byFrente[k] = [];
      byFrente[k].push(u);
    });
    return byFrente;
  }, []);

  return (
    <div className="p-6">
      <h1 className="text-2xl font-bold mb-1" style={{color:'#d4a843'}}>👥 Equipe</h1>
      <p className="text-sm text-slate-400 mb-6">{USERS.length} usuários cadastrados • {Object.keys(dmap).length} desativados</p>
      {loading ? <div className="text-slate-500">Carregando…</div> : (
        Object.entries(grouped).map(([fid, list]) => (
          <div key={fid} className="mb-6">
            <h2 className="text-sm font-bold uppercase tracking-wider text-slate-400 mb-3">
              {FRENTES[fid] ? FRENTES[fid].emoji + ' ' + FRENTES[fid].label : '🔧 Outros'}
            </h2>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">

// ──────────────────────────────────────────────────────────────────────────
// MetasPage (configurar meta mensal por corretor)
// ──────────────────────────────────────────────────────────────────────────
function MetasPage({ user }) {
  const lvl = RLVL[user.role] || 0;
  const canEdit = lvl >= 5;
  const [editingId, setEditingId] = useState(null);
  const [editVal, setEditVal] = useState('');
  const [savingId, setSavingId] = useState(null);
  const { value: metas, save: saveMetas, loading } = useShared('METAS_INDIVIDUAIS');
  const m = metas || {};

  async function commit(uid) {
    setSavingId(uid);
    const next = { ...m, [uid]: { vgv: parseFloat(editVal) || 0, updatedAt: Date.now(), updatedBy: user.id } };
    const r = await saveMetas(next);
    if (r.error) alert('Erro: ' + r.error.message);
    setEditingId(null); setEditVal(''); setSavingId(null);
  }

  const corretores = USERS.filter(u => ['corretor','lider'].includes(u.role));
  const totalMeta = corretores.reduce((s, u) => s + (m[u.id]?.vgv || 0), 0);

  return (
    <div className="p-6">
      <h1 className="text-2xl font-bold mb-1" style={{color:'#d4a843'}}>🎯 Metas</h1>
      <p className="text-sm text-slate-400 mb-6">Meta mensal de VGV por corretor</p>
      <div className="card p-4 mb-4">
        <div className="text-xs text-slate-400">Soma das metas individuais</div>
        <div className="text-3xl font-bold" style={{color:'#d4a843'}}>{fmtMoney(totalMeta)}</div>
      </div>
      {loading ? <div className="text-slate-500">Carregando…</div> : (
        <div className="card overflow-hidden">
          <table className="w-full">
            <thead><tr className="bg-slate-900 text-xs text-slate-400 uppercase">
              <th className="text-left p-3">Corretor</th>
              <th className="text-left p-3">Frente</th>
              <th className="text-right p-3">Meta VGV (R$)</th>
              <th className="text-right p-3">Atualizado</th>
              {canEdit && <th className="p-3"></th>}
            </tr></thead>
            <tbody>
              {corretores.map(u => {
                const cur = m[u.id]?.vgv || 0;
                const isEditing = editingId === u.id;
                return (
                  <tr key={u.id} className="border-t border-slate-700">
                    <td className="p-3 font-medium">{u.name}</td>
                    <td className="p-3 text-xs">{u.frente ? FRENTES[u.frente]?.label : '—'}</td>
                    <td className="text-right p-3 font-bold" style={{color:'#d4a843'}}>
                      {isEditing ? (
                        <input type="number" className="input text-right max-w-xs" value={editVal} onChange={e => setEditVal(e.target.value)} />
                      ) : fmtMoney(cur)}
                    </td>
                    <td className="text-right p-3 text-xs text-slate-500">{m[u.id]?.updatedAt ? fmtDate(m[u.id].updatedAt) : '—'}</td>
                    {canEdit && <td className="p-3 text-right whitespace-nowrap">
                      {isEditing ? (
                        <>
                          <button className="btn btn-sm btn-success" onClick={() => commit(u.id)} disabled={savingId === u.id}>{savingId === u.id ? '...' : '✓'}</button>
                          <button className="btn btn-sm btn-out ml-1" onClick={() => { setEditingId(null); setEditVal(''); }}>×</button>
                        </>
                      ) : (
                        <button className="btn btn-sm btn-out" onClick={() => { setEditingId(u.id); setEditVal(String(cur)); }}>Editar</button>
                      )}
                    </td>}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// RecadosPage (mural simples)
// ──────────────────────────────────────────────────────────────────────────
function RecadosPage({ user }) {
  const { value: recados, save: saveRecados, loading } = useShared('RECADOS_DIRETORIA');
  const list = Array.isArray(recados) ? recados : [];
  const [text, setText] = useState('');
  const [posting, setPosting] = useState(false);
  const isSocio = user.role === 'socio';

  async function postRecado() {
    if (!text.trim()) return;
    setPosting(true);
    const next = [
      { id: 'r' + Date.now(), text: text.trim(), author: user.id, authorName: user.name, ts: Date.now() },
      ...list
    ].slice(0, 200);
    const r = await saveRecados(next);
    if (!r.error) setText('');
    setPosting(false);
  }
  async function deleteRecado(id) {
    if (!confirm('Apagar este recado?')) return;
    const next = list.filter(r => r.id !== id);
    await saveRecados(next);
  }

  return (
    <div className="p-6 max-w-3xl">
      <h1 className="text-2xl font-bold mb-1" style={{color:'#d4a843'}}>📢 Recados</h1>
      <p className="text-sm text-slate-400 mb-6">Mural compartilhado da diretoria/equipe</p>
      {isSocio && (
        <div className="card p-4 mb-6">
          <textarea className="input mb-3" rows="3" placeholder="Escreva um recado..." value={text} onChange={e => setText(e.target.value)} />
          <button className="btn" onClick={postRecado} disabled={posting || !text.trim()}>{posting ? 'Postando…' : '📌 Postar recado'}</button>
        </div>
      )}
      {loading ? <div className="text-slate-500">Carregando…</div> : (
        list.length === 0 ? (
          <div className="text-center text-slate-500 py-8">Nenhum recado ainda.</div>
        ) : (
          <div className="space-y-3">
            {list.map(r => (
              <div key={r.id} className="card p-4">
                <div className="flex items-start justify-between mb-2">
                  <div>
                    <div className="font-bold text-sm">{r.authorName || r.author}</div>
                    <div className="text-xs text-slate-500">{fmtDate(r.ts)}</div>
                  </div>
                  {isSocio && (
                    <button className="text-red-400 hover:text-red-300 text-xs" onClick={() => deleteRecado(r.id)}>Apagar</button>
                  )}
                </div>
                <div className="text-slate-200 whitespace-pre-wrap">{r.text}</div>
              </div>
            ))}
          </div>
        )
      )}
    </div>
  );
}


// ──────────────────────────────────────────────────────────────────────────
// CaptacaoPage (lista imóveis para captação)
// ──────────────────────────────────────────────────────────────────────────
function CaptacaoPage({ user }) {
  const { value: capt, save: saveCapt, loading } = useShared('CAPTACOES');
  const list = Array.isArray(capt) ? capt : [];
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ titulo: '', endereco: '', tipo: 'casa', valor: '', proprietario: '', telefone: '', obs: '' });
  const [filter, setFilter] = useState('todos');
  const [posting, setPosting] = useState(false);

  async function add() {
    if (!form.titulo.trim()) return;
    setPosting(true);
    const item = {
      id: 'c' + Date.now(),
      ...form,
      valor: parseFloat(form.valor) || 0,
      status: 'novo',
      capturadoPor: user.id,
      capturadoPorName: user.name,
      ts: Date.now()
    };
    await saveCapt([item, ...list].slice(0, 500));
    setForm({ titulo: '', endereco: '', tipo: 'casa', valor: '', proprietario: '', telefone: '', obs: '' });
    setShowForm(false);
    setPosting(false);
  }
  async function setStatus(id, status) {
    const next = list.map(c => c.id === id ? { ...c, status, statusAt: Date.now(), statusBy: user.id } : c);
    await saveCapt(next);
  }
  async function remove(id) {
    if (!confirm('Apagar captação?')) return;
    await saveCapt(list.filter(c => c.id !== id));
  }

  const filtered = filter === 'todos' ? list : list.filter(c => c.status === filter);
  const counts = list.reduce((acc, c) => { acc[c.status] = (acc[c.status]||0)+1; return acc; }, {});

  const statusColors = { novo: '#3b82f6', visita_agendada: '#d4a843', em_negociacao: '#a855f7', captado: '#16a34a', perdido: '#dc2626' };
  const statusLabels = { novo: '🆕 Novo', visita_agendada: '📅 Visita agendada', em_negociacao: '💬 Em negociação', captado: '✅ Captado', perdido: '❌ Perdido' };

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>📍 Captação</h1>
          <p className="text-sm text-slate-400">{list.length} imóveis em captação</p>
        </div>
        <button className="btn" onClick={() => setShowForm(s => !s)}>{showForm ? '× Cancelar' : '+ Nova captação'}</button>
      </div>
      {showForm && (
        <div className="card p-4 mb-4">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
            <input className="input" placeholder="Título do imóvel" value={form.titulo} onChange={e => setForm({...form, titulo: e.target.value})} />
            <input className="input" placeholder="Endereço" value={form.endereco} onChange={e => setForm({...form, endereco: e.target.value})} />
            <select className="input" value={form.tipo} onChange={e => setForm({...form, tipo: e.target.value})}>
              <option value="casa">Casa</option>
              <option value="apartamento">Apartamento</option>
              <option value="terreno">Terreno</option>
              <option value="comercial">Comercial</option>
              <option value="rural">Rural</option>
            </select>
            <input type="number" className="input" placeholder="Valor (R$)" value={form.valor} onChange={e => setForm({...form, valor: e.target.value})} />
            <input className="input" placeholder="Proprietário" value={form.proprietario} onChange={e => setForm({...form, proprietario: e.target.value})} />
            <input className="input" placeholder="Telefone" value={form.telefone} onChange={e => setForm({...form, telefone: e.target.value})} />
          </div>
          <textarea className="input mb-3" rows="2" placeholder="Observações" value={form.obs} onChange={e => setForm({...form, obs: e.target.value})} />
          <button className="btn" onClick={add} disabled={posting || !form.titulo.trim()}>{posting ? 'Salvando…' : '💾 Salvar captação'}</button>
        </div>
      )}
      <div className="flex gap-2 mb-4 flex-wrap">
        <button className={'btn btn-sm ' + (filter==='todos' ? '' : 'btn-out')} onClick={() => setFilter('todos')}>Todos ({list.length})</button>
        {Object.entries(statusLabels).map(([k, lbl]) => (
          <button key={k} className={'btn btn-sm ' + (filter===k ? '' : 'btn-out')} onClick={() => setFilter(k)}>{lbl} ({counts[k]||0})</button>
        ))}
      </div>
      {loading ? <div className="text-slate-500">Carregando…</div> : (
        filtered.length === 0 ? <div className="text-center text-slate-500 py-8">Nenhuma captação.</div> : (
          <div className="space-y-3">
            {filtered.map(c => (
              <div key={c.id} className="card p-4">
                <div className="flex items-start justify-between gap-3 mb-2 flex-wrap">
                  <div>
                    <div className="font-bold text-lg">{c.titulo}</div>
                    <div className="text-xs text-slate-400">{c.endereco} • {c.tipo}</div>
                  </div>
                  <div className="text-right">
                    <div className="text-xl font-bold" style={{color:'#d4a843'}}>{fmtMoney(c.valor)}</div>
                    <span className="badge" style={{background: statusColors[c.status]+'30', color: statusColors[c.status]}}>{statusLabels[c.status]}</span>
                  </div>
                </div>
                {c.proprietario && <div className="text-sm text-slate-300">👤 {c.proprietario} {c.telefone && '• 📞 '+c.telefone}</div>}
                {c.obs && <div className="text-sm text-slate-400 mt-2 italic">{c.obs}</div>}
                <div className="text-xs text-slate-500 mt-2">Capturado por {c.capturadoPorName || c.capturadoPor} em {fmtDate(c.ts)}</div>
                <div className="flex gap-2 mt-3 flex-wrap">
                  {Object.entries(statusLabels).filter(([k]) => k !== c.status).map(([k, lbl]) => (
                    <button key={k} className="btn btn-sm btn-out" onClick={() => setStatus(c.id, k)}>{lbl}</button>
                  ))}
                  {(user.role === 'socio' || user.id === c.capturadoPor) && (
                    <button className="btn btn-sm btn-danger" onClick={() => remove(c.id)}>Apagar</button>
                  )}
                </div>
              </div>
            ))}
          </div>
        )
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// PlantoesPage (calendário mensal de plantão)
// ──────────────────────────────────────────────────────────────────────────
function PlantoesPage({ user }) {
  const lvl = RLVL[user.role] || 0;
  const canEdit = lvl >= 5;
  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth() + 1);
  const key = 'PLANTOES_' + year + '_' + String(month).padStart(2,'0');
  const { value: plantao, save: savePlantao, loading } = useShared(key);
  const data = plantao || {};

  const daysInMonth = new Date(year, month, 0).getDate();
  const firstDow = new Date(year, month - 1, 1).getDay();
  const corretores = USERS.filter(u => ['corretor','lider'].includes(u.role));

  async function setDay(day, brokerId) {
    if (!canEdit) return;
    const next = { ...data, [day]: brokerId };
    if (!brokerId) delete next[day];
    await savePlantao(next);
  }

  function prevMonth() {
    if (month === 1) { setYear(y => y-1); setMonth(12); } else setMonth(m => m-1);
  }
  function nextMonth() {
    if (month === 12) { setYear(y => y+1); setMonth(1); } else setMonth(m => m+1);
  }

  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dows = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  const colorByBroker = useMemo(() => {
    const palette = ['#3b82f6','#16a34a','#d4a843','#a855f7','#dc2626','#06b6d4','#f97316','#ec4899'];
    const map = {};
    corretores.forEach((u, i) => { map[u.id] = palette[i % palette.length]; });
    return map;
  }, []);

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>📅 Plantões</h1>
          <p className="text-sm text-slate-400">Escala mensal de atendimento</p>
        </div>
        <div className="flex items-center gap-2">
          <button className="btn btn-sm btn-out" onClick={prevMonth}>‹</button>
          <div className="font-bold text-lg min-w-[180px] text-center">{monthNames[month-1]} {year}</div>
          <button className="btn btn-sm btn-out" onClick={nextMonth}>›</button>
        </div>
      </div>
      {loading ? <div className="text-slate-500">Carregando…</div> : (
        <div className="card p-4">
          <div className="grid grid-cols-7 gap-2 mb-2">
            {dows.map(d => <div key={d} className="text-xs text-slate-400 text-center font-bold">{d}</div>)}
          </div>
          <div className="grid grid-cols-7 gap-2">
            {Array.from({length: firstDow}).map((_, i) => <div key={'e'+i}></div>)}
            {Array.from({length: daysInMonth}, (_, i) => {
              const day = i + 1;
              const bid = data[day];
              const broker = corretores.find(b => b.id === bid);
              const isToday = year === today.getFullYear() && month === today.getMonth()+1 && day === today.getDate();
              return (
                <div key={day} className="card p-2" style={{minHeight:80, borderColor: isToday ? '#d4a843' : '#334155'}}>
                  <div className="text-xs text-slate-500 mb-1 flex justify-between"><span>{day}</span>{isToday && <span className="text-yellow-400">hoje</span>}</div>
                  {canEdit ? (
                    <select
                      className="input"
                      style={{padding:'4px 6px', fontSize:'10px', background: bid ? colorByBroker[bid]+'30' : '#0f172a', color: bid ? colorByBroker[bid] : '#94a3b8', borderColor: bid ? colorByBroker[bid] : '#334155'}}
                      value={bid || ''}
                      onChange={e => setDay(day, e.target.value)}
                    >
                      <option value="">—</option>
                      {corretores.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                    </select>
                  ) : (
                    <div style={{padding:'4px 6px', borderRadius:4, fontSize:'10px', background: bid ? colorByBroker[bid]+'30' : '#0f172a', color: bid ? colorByBroker[bid] : '#64748b', textAlign:'center'}}>
                      {broker ? broker.name.split(' ')[0] : '—'}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div className="mt-4 flex gap-3 flex-wrap text-xs">
            {corretores.map(b => {
              const cnt = Object.values(data).filter(v => v === b.id).length;
              if (cnt === 0) return null;
              return <div key={b.id} className="flex items-center gap-2"><span style={{width:12, height:12, borderRadius:3, background: colorByBroker[b.id], display:'inline-block'}}></span>{b.name} ({cnt})</div>;
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// TarefasPage (lista de tarefas pessoais, sincronizadas via user_kv)
// ──────────────────────────────────────────────────────────────────────────
function TarefasPage({ user }) {
  const targetUid = useMemo(() => legacyUid(user.id), [user.id]);
  const { value: tarefas, save: saveTarefas, loading } = useUserKv(targetUid, 'TAREFAS_PESSOAIS');
  const list = Array.isArray(tarefas) ? tarefas : [];
  const [text, setText] = useState('');
  const [filter, setFilter] = useState('abertas');

  async function add() {
    if (!text.trim()) return;
    const item = { id: 't' + Date.now(), text: text.trim(), done: false, createdAt: Date.now() };
    await saveTarefas([item, ...list].slice(0, 500));
    setText('');
  }
  async function toggle(id) {
    const next = list.map(t => t.id === id ? { ...t, done: !t.done, doneAt: !t.done ? Date.now() : null } : t);
    await saveTarefas(next);
  }
  async function remove(id) {
    await saveTarefas(list.filter(t => t.id !== id));
  }

  const filtered = filter === 'abertas' ? list.filter(t => !t.done) : filter === 'feitas' ? list.filter(t => t.done) : list;
  const counts = { abertas: list.filter(t => !t.done).length, feitas: list.filter(t => t.done).length };

  return (
    <div className="p-6 max-w-2xl">
      <h1 className="text-2xl font-bold mb-1" style={{color:'#d4a843'}}>✅ Tarefas</h1>
      <p className="text-sm text-slate-400 mb-6">Sua lista pessoal • salva no Supabase, sincroniza entre devices</p>

      <div className="card p-4 mb-4 flex gap-2">
        <input className="input flex-1" placeholder="Nova tarefa..." value={text} onChange={e => setText(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') add(); }} />
        <button className="btn" onClick={add} disabled={!text.trim()}>+ Adicionar</button>
      </div>

      <div className="flex gap-2 mb-4">
        <button className={'btn btn-sm ' + (filter==='abertas' ? '' : 'btn-out')} onClick={() => setFilter('abertas')}>Abertas ({counts.abertas})</button>
        <button className={'btn btn-sm ' + (filter==='feitas' ? '' : 'btn-out')} onClick={() => setFilter('feitas')}>Feitas ({counts.feitas})</button>
        <button className={'btn btn-sm ' + (filter==='todas' ? '' : 'btn-out')} onClick={() => setFilter('todas')}>Todas ({list.length})</button>
      </div>

      {loading ? <div className="text-slate-500">Carregando…</div> : (
        filtered.length === 0 ? <div className="text-center text-slate-500 py-8">Nenhuma tarefa {filter==='abertas' && 'aberta'}.</div> : (
          <div className="space-y-2">
            {filtered.map(t => (
              <div key={t.id} className="card p-3 flex items-center gap-3">
                <input type="checkbox" checked={!!t.done} onChange={() => toggle(t.id)} className="w-5 h-5" style={{accentColor:'#d4a843'}} />
                <div className="flex-1">
                  <div className={t.done ? 'line-through text-slate-500' : ''}>{t.text}</div>
                  <div className="text-xs text-slate-500">
                    {t.done ? '✓ Feita ' + fmtDate(t.doneAt) : 'Criada ' + fmtDate(t.createdAt)}
                  </div>
                </div>
                <button className="text-red-400 hover:text-red-300 text-xs" onClick={() => remove(t.id)}>Apagar</button>
              </div>
            ))}
          </div>
        )
      )}
    </div>
  );
}


// ──────────────────────────────────────────────────────────────────────────
// CRMPage (kanban simples por status)
// ──────────────────────────────────────────────────────────────────────────
function CRMPage({ user }) {
  const lvl = RLVL[user.role] || 0;
  const canViewAll = lvl >= 5;
  const { value: deals, save: saveDeals, loading } = useShared('CRM_DEALS');
  const list = Array.isArray(deals) ? deals : [];
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ cliente: '', valor: '', corretorId: user.id, obs: '', status: 'prospect' });
  const [filterCorretor, setFilterCorretor] = useState(canViewAll ? 'todos' : user.id);

  const STAGES = [
    { id: 'prospect',     lbl: 'Prospect',       color: '#3b82f6' },
    { id: 'atendimento',  lbl: 'Atendimento',    color: '#06b6d4' },
    { id: 'proposta',     lbl: 'Proposta',       color: '#d4a843' },
    { id: 'fechado',      lbl: 'Fechado',        color: '#16a34a' },
    { id: 'perdido',      lbl: 'Perdido',        color: '#dc2626' },
  ];

  async function add() {
    if (!form.cliente.trim()) return;
    const item = {
      id: 'd' + Date.now(),
      ...form,
      valor: parseFloat(form.valor) || 0,
      createdAt: Date.now(),
      createdBy: user.id
    };
    await saveDeals([item, ...list].slice(0, 1000));
    setForm({ cliente: '', valor: '', corretorId: user.id, obs: '', status: 'prospect' });
    setShowForm(false);
  }
  async function moveTo(id, newStatus) {
    const next = list.map(d => d.id === id ? { ...d, status: newStatus, statusAt: Date.now() } : d);
    await saveDeals(next);
  }
  async function remove(id) {
    if (!confirm('Apagar deal?')) return;
    await saveDeals(list.filter(d => d.id !== id));
  }

  const filtered = filterCorretor === 'todos' ? list : list.filter(d => d.corretorId === filterCorretor);
  const corretores = USERS.filter(u => ['corretor','lider'].includes(u.role));
  const totals = STAGES.reduce((acc, s) => ({ ...acc, [s.id]: filtered.filter(d => d.status === s.id) }), {});
  const pipelineTotal = filtered.filter(d => d.status !== 'perdido').reduce((s, d) => s + (d.valor||0), 0);
  const fechadoTotal = filtered.filter(d => d.status === 'fechado').reduce((s, d) => s + (d.valor||0), 0);

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>💼 CRM</h1>
          <p className="text-sm text-slate-400">Pipeline de oportunidades</p>
        </div>
        <button className="btn" onClick={() => setShowForm(s => !s)}>{showForm ? '× Cancelar' : '+ Novo deal'}</button>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
        <div className="card p-3"><div className="text-xs text-slate-400">Pipeline (R$)</div><div className="text-xl font-bold" style={{color:'#d4a843'}}>{fmtMoney(pipelineTotal)}</div></div>
        <div className="card p-3"><div className="text-xs text-slate-400">Fechado (R$)</div><div className="text-xl font-bold text-green-400">{fmtMoney(fechadoTotal)}</div></div>
        <div className="card p-3"><div className="text-xs text-slate-400">Total deals</div><div className="text-xl font-bold">{filtered.length}</div></div>
        <div className="card p-3"><div className="text-xs text-slate-400">Conversão</div><div className="text-xl font-bold">{filtered.length ? Math.round(totals.fechado.length / filtered.length * 100) : 0}%</div></div>
      </div>

      {showForm && (
        <div className="card p-4 mb-4">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
            <input className="input" placeholder="Nome do cliente" value={form.cliente} onChange={e => setForm({...form, cliente: e.target.value})} />
            <input type="number" className="input" placeholder="Valor (R$)" value={form.valor} onChange={e => setForm({...form, valor: e.target.value})} />
            <select className="input" value={form.corretorId} onChange={e => setForm({...form, corretorId: e.target.value})} disabled={!canViewAll}>
              {corretores.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <select className="input" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
              {STAGES.map(s => <option key={s.id} value={s.id}>{s.lbl}</option>)}
            </select>
          </div>
          <textarea className="input mb-3" rows="2" placeholder="Observações" value={form.obs} onChange={e => setForm({...form, obs: e.target.value})} />
          <button className="btn" onClick={add} disabled={!form.cliente.trim()}>💾 Salvar deal</button>
        </div>
      )}

      {canViewAll && (
        <div className="mb-4">
          <select className="input max-w-xs" value={filterCorretor} onChange={e => setFilterCorretor(e.target.value)}>
            <option value="todos">Todos os corretores ({list.length})</option>
            {corretores.map(c => <option key={c.id} value={c.id}>{c.name} ({list.filter(d => d.corretorId === c.id).length})</option>)}
          </select>
        </div>
      )}

      {loading ? <div className="text-slate-500">Carregando…</div> : (
        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-3">
          {STAGES.map(s => (
            <div key={s.id} className="card p-3" style={{borderTop: '3px solid '+s.color}}>
              <div className="font-bold text-sm mb-2" style={{color: s.color}}>{s.lbl} ({totals[s.id].length})</div>
              <div className="text-xs text-slate-500 mb-3">{fmtMoney(totals[s.id].reduce((a,b) => a+(b.valor||0), 0))}</div>
              <div className="space-y-2 min-h-[60px]">
                {totals[s.id].map(d => {
                  const c = corretores.find(x => x.id === d.corretorId);
                  return (
                    <div key={d.id} className="card p-2" style={{background:'#0f172a'}}>
                      <div className="font-bold text-sm">{d.cliente}</div>
                      <div className="text-xs" style={{color:'#d4a843'}}>{fmtMoney(d.valor)}</div>
                      <div className="text-xs text-slate-500">{c?.name || d.corretorId}</div>
                      {d.obs && <div className="text-xs text-slate-400 mt-1 italic">{d.obs}</div>}
                      <div className="flex gap-1 mt-2 flex-wrap">
                        {STAGES.filter(x => x.id !== d.status).map(x => (
                          <button key={x.id} className="btn btn-sm btn-out" style={{padding:'2px 6px',fontSize:'9px'}} onClick={() => moveTo(d.id, x.id)}>→ {x.lbl}</button>
                        ))}
                        {(user.role === 'socio' || d.createdBy === user.id) && (
                          <button className="text-red-400 text-xs hover:text-red-300" onClick={() => remove(d.id)}>×</button>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// ComissoesPage (tabela de comissoes por corretor)

function ComissoesPage({ user }) {
  const lvl = RLVL[user.role] || 0;
  const canEdit = lvl >= 5;
  const { value: comissoes, save: saveComissoes, loading } = useShared('COMISSOES_PAGAMENTOS');
  const list = Array.isArray(comissoes) ? comissoes : [];
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ corretorId: '', cliente: '', vgv: '', percent: '3', status: 'pendente', refMes: monthKey() });

  async function add() {
    if (!form.corretorId || !form.cliente) return;
    const item = {
      id: 'cm' + Date.now(),
      ...form,
      vgv: parseFloat(form.vgv) || 0,
      percent: parseFloat(form.percent) || 0,
      valor: ((parseFloat(form.vgv) || 0) * (parseFloat(form.percent) || 0) / 100),
      createdAt: Date.now(),
      createdBy: user.id
    };
    await saveComissoes([item, ...list].slice(0, 2000));
    setForm({ corretorId: '', cliente: '', vgv: '', percent: '3', status: 'pendente', refMes: monthKey() });
    setShowForm(false);
  }
  async function setStatus(id, status) {
    const next = list.map(c => c.id === id ? { ...c, status, statusAt: Date.now() } : c);
    await saveComissoes(next);
  }
  async function remove(id) {
    if (!confirm('Apagar comissão?')) return;
    await saveComissoes(list.filter(c => c.id !== id));

  const corretores = USERS.filter(u => ['corretor','lider'].includes(u.role));
  const filtered = canEdit ? list : list.filter(c => c.corretorId === user.id);
  const totalPendente = filtered.filter(c => c.status === 'pendente').reduce((s, c) => s + (c.valor||0), 0);

      </div>

      <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
        <div className="card p-3"><div className="text-xs text-slate-400">Pendente</div><div className="text-xl font-bold text-yellow-400">{fmtMoney(totalPendente)}</div></div>
        <div className="card p-3"><div className="text-xs text-slate-400">Pago</div><div className="text-xl font-bold text-green-400">{fmtMoney(totalPago)}</div></div>
        <div className="card p-3"><div className="text-xs text-slate-400">Total</div><div className="text-xl font-bold">{fmtMoney(totalPendente + totalPago)}</div></div>
      </div>

      {showForm && canEdit && (
        <div className="card p-4 mb-4">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-3">
            <select className="input" value={form.corretorId} onChange={e => setForm({...form, corretorId: e.target.value})}>
              <option value="">— corretor —</option>
              {corretores.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}

            <input className="input" placeholder="Cliente" value={form.cliente} onChange={e => setForm({...form, cliente: e.target.value})} />
            <input type="month" className="input" value={form.refMes} onChange={e => setForm({...form, refMes: e.target.value})} />
            <input type="number" className="input" placeholder="VGV (R$)" value={form.vgv} onChange={e => setForm({...form, vgv: e.target.value})} />
            <input type="number" step="0.1" className="input" placeholder="% comissão" value={form.percent} onChange={e => setForm({...form, percent: e.target.value})} />
            <select className="input" value={form.status} onChange={e => setForm({...form, status: e.target.value})}>
              <option value="pendente">Pendente</option>
              <option value="pago">Pago</option>
            </select>
          </div>
          <div className="text-sm text-slate-400 mb-3">Valor calculado: <span className="font-bold" style={{color:'#d4a843'}}>{fmtMoney((parseFloat(form.vgv)||0) * (parseFloat(form.percent)||0) / 100)}</span></div>
          <button className="btn" onClick={add} disabled={!form.corretorId || !form.cliente}>💾 Salvar comissão</button>

      {loading ? <div className="text-slate-500">Carregando…</div> : (
        <div className="card overflow-hidden">
          <table className="w-full">
            <thead><tr className="bg-slate-900 text-xs text-slate-400 uppercase">
              <th className="text-left p-3">Mês</th>
              <th className="text-left p-3">Corretor</th>
              <th className="text-left p-3">Cliente</th>
              <th className="text-right p-3">VGV</th>
              <th className="text-right p-3">%</th>
              <th className="text-right p-3">Comissão</th>
              <th className="text-center p-3">Status</th>

                    <td className="p-3">{c.cliente}</td>
                    <td className="text-right p-3">{fmtMoney(c.vgv)}</td>
                    <td className="text-right p-3">{c.percent}%</td>
                    <td className="text-right p-3 font-bold" style={{color:'#d4a843'}}>{fmtMoney(c.valor)}</td>

                      <button className="text-red-400 text-xs ml-2" onClick={() => remove(c.id)}>×</button>

                  </tr>
                );
              })}
              {filtered.length === 0 && <tr><td colSpan="8" className="text-center text-slate-500 p-8">Nenhuma comissão.</td></tr>}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// FluxoCaixaPage (entradas/saidas mensais)
// ──────────────────────────────────────────────────────────────────────────
function FluxoCaixaPage({ user }) {
  const lvl = RLVL[user.role] || 0;
  const canEdit = lvl >= 5;
  const [refMes, setRefMes] = useState(monthKey());
  const { value: fluxo, save: saveFluxo, loading } = useShared('FLUXO_CAIXA_' + refMes);
  const list = Array.isArray(fluxo) ? fluxo : [];
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ tipo: 'entrada', categoria: 'comissao', descricao: '', valor: '', data: todayKey() });

  async function add() {
    if (!form.descricao || !form.valor) return;
    const item = {
      id: 'fx' + Date.now(),
      ...form,
      valor: Math.abs(parseFloat(form.valor)) || 0,
      createdAt: Date.now(),
      createdBy: user.id
    };
    await saveFluxo([item, ...list].slice(0, 2000));
    setForm({ tipo: 'entrada', categoria: 'comissao', descricao: '', valor: '', data: todayKey() });
    setShowForm(false);
  }
  async function remove(id) {
    if (!confirm('Apagar lançamento?')) return;
    await saveFluxo(list.filter(c => c.id !== id));
  }

  const entradas = list.filter(c => c.tipo === 'entrada');
  const saidas = list.filter(c => c.tipo === 'saida');
  const totalEntradas = entradas.reduce((s, c) => s + (c.valor||0), 0);
  const totalSaidas = saidas.reduce((s, c) => s + (c.valor||0), 0);
  const saldo = totalEntradas - totalSaidas;

  const CATS_ENTRADA = ['comissao','venda_propria','rental','outros'];
  const CATS_SAIDA = ['salario','marketing','aluguel','impostos','sistemas','outros'];

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>💰 Fluxo de Caixa</h1>
          <p className="text-sm text-slate-400">Entradas e saídas mensais</p>
        </div>
        <div className="flex gap-2">
          <input type="month" className="input" value={refMes} onChange={e => setRefMes(e.target.value)} />
          {canEdit && <button className="btn" onClick={() => setShowForm(s => !s)}>{showForm ? '× Cancelar' : '+ Lançamento'}</button>}
        </div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
        <div className="card p-4"><div className="text-xs text-slate-400">Entradas</div><div className="text-2xl font-bold text-green-400">{fmtMoney(totalEntradas)}</div><div className="text-xs text-slate-500">{entradas.length} lançamentos</div></div>
        <div className="card p-4"><div className="text-xs text-slate-400">Saídas</div><div className="text-2xl font-bold text-red-400">{fmtMoney(totalSaidas)}</div><div className="text-xs text-slate-500">{saidas.length} lançamentos</div></div>
        <div className="card p-4" style={{borderColor: saldo >= 0 ? '#16a34a' : '#dc2626'}}><div className="text-xs text-slate-400">Saldo</div><div className="text-2xl font-bold" style={{color: saldo >= 0 ? '#22c55e' : '#ef4444'}}>{fmtMoney(saldo)}</div></div>
      </div>

      {showForm && canEdit && (
        <div className="card p-4 mb-4">
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-3">
            <select className="input" value={form.tipo} onChange={e => setForm({...form, tipo: e.target.value, categoria: e.target.value === 'entrada' ? 'comissao' : 'salario'})}>
              <option value="entrada">↑ Entrada</option>
              <option value="saida">↓ Saída</option>
            </select>
            <select className="input" value={form.categoria} onChange={e => setForm({...form, categoria: e.target.value})}>
              {(form.tipo === 'entrada' ? CATS_ENTRADA : CATS_SAIDA).map(c => <option key={c} value={c}>{c}</option>)}
            </select>
            <input type="date" className="input" value={form.data} onChange={e => setForm({...form, data: e.target.value})} />
            <input className="input" placeholder="Descrição" value={form.descricao} onChange={e => setForm({...form, descricao: e.target.value})} />
            <input type="number" step="0.01" className="input" placeholder="Valor (R$)" value={form.valor} onChange={e => setForm({...form, valor: e.target.value})} />
          </div>
          <button className="btn" onClick={add} disabled={!form.descricao || !form.valor}>💾 Salvar lançamento</button>
        </div>
      )}

      {loading ? <div className="text-slate-500">Carregando…</div> : (
        <div className="card overflow-hidden">
          <table className="w-full">
            <thead><tr className="bg-slate-900 text-xs text-slate-400 uppercase">
              <th className="text-left p-3">Data</th>
              <th className="text-left p-3">Tipo</th>
              <th className="text-left p-3">Categoria</th>
              <th className="text-left p-3">Descrição</th>
              <th className="text-right p-3">Valor</th>
              {canEdit && <th></th>}
            </tr></thead>
            <tbody>
              {list.sort((a,b) => (b.data||'').localeCompare(a.data||'')).map(c => (
                <tr key={c.id} className="border-t border-slate-700">
                  <td className="p-3 text-xs">{c.data}</td>
                  <td className="p-3"><span className="badge" style={{background: c.tipo==='entrada' ? '#16a34a30' : '#dc262630', color: c.tipo==='entrada' ? '#86efac' : '#fca5a5'}}>{c.tipo === 'entrada' ? '↑ Entrada' : '↓ Saída'}</span></td>
                  <td className="p-3 text-xs">{c.categoria}</td>
                  <td className="p-3">{c.descricao}</td>
                  <td className="text-right p-3 font-bold" style={{color: c.tipo === 'entrada' ? '#22c55e' : '#ef4444'}}>{c.tipo === 'entrada' ? '+' : '−'}{fmtMoney(c.valor)}</td>
                  {canEdit && <td className="p-3"><button className="text-red-400 text-xs" onClick={() => remove(c.id)}>×</button></td>}
                </tr>
              ))}
              {list.length === 0 && <tr><td colSpan="6" className="text-center text-slate-500 p-8">Nenhum lançamento neste mês.</td></tr>}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}


// ──────────────────────────────────────────────────────────────────────────
// IASolPage (chat com /api/agent)
// ──────────────────────────────────────────────────────────────────────────
function IASolPage({ user }) {
  const targetUid = useMemo(() => legacyUid(user.id), [user.id]);
  const { value: hist, save: saveHist } = useUserKv(targetUid, 'IA_SOL_HIST');
  const conversation = Array.isArray(hist) ? hist : [];
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const [agent, setAgent] = useState('sol');
  const messagesEndRef = React.useRef(null);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [conversation.length]);

  async function send() {
    if (!input.trim() || sending) return;
    const msg = { role: 'user', content: input.trim(), ts: Date.now() };
    const next = [...conversation, msg].slice(-100);
    await saveHist(next);
    setInput(''); setSending(true);

    try {
      const r = await fetch('/api/agent', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          agent,
          message: msg.content,
          conversationId: 'v2-' + user.id + '-' + agent,
          channel: 'web-v2',
          metadata: { userId: user.id, userName: user.name, userRole: user.role }
        })
      });
      const data = await r.json();
      const reply = {
        role: 'assistant',
        content: data.reply || data.response || data.message || data.error || 'Sem resposta',
        ts: Date.now(),
        properties: data.properties || []
      };
      await saveHist([...next, reply].slice(-100));
    } catch(e) {
      await saveHist([...next, { role: 'assistant', content: '⚠ Erro: ' + e.message, ts: Date.now() }].slice(-100));
    }
    setSending(false);
  }

  async function clearChat() {
    if (!confirm('Limpar todo histórico?')) return;
    await saveHist([]);
  }

  const AGENTS = [
    { id: 'sol', name: 'Sol', desc: 'Vendedora — qualifica leads, recomenda imóveis', emoji: '☀️' },
    { id: 'vera', name: 'Vera', desc: 'Performance — análise de campanhas, sugestões', emoji: '🦅' },
    { id: 'intelligence', name: 'Sr. Inteligência', desc: 'Estratégia — concorrência e mercado', emoji: '🧠' },
  ];
  const cur = AGENTS.find(a => a.id === agent) || AGENTS[0];

  return (
    <div className="p-6 flex flex-col" style={{height:'calc(100vh - 0px)'}}>
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>{cur.emoji} Agente IA — {cur.name}</h1>
          <p className="text-sm text-slate-400">{cur.desc}</p>
        </div>
        <div className="flex gap-2 items-center">
          <select className="input max-w-xs" value={agent} onChange={e => setAgent(e.target.value)}>
            {AGENTS.map(a => <option key={a.id} value={a.id}>{a.emoji} {a.name}</option>)}
          </select>
          <button className="btn btn-sm btn-out" onClick={clearChat}>Limpar</button>
        </div>
      </div>

      <div className="card flex-1 overflow-y-auto p-4 mb-4 space-y-3">
        {conversation.length === 0 ? (
          <div className="text-center text-slate-500 py-12">
            <div className="text-5xl mb-3">{cur.emoji}</div>
            <div>Comece uma conversa com {cur.name}</div>
            <div className="text-xs mt-2">Ex: "Cliente quer apto 3 dorms na zona sul até 600k"</div>
          </div>
        ) : conversation.map((m, i) => (
          <div key={i} className={'flex ' + (m.role === 'user' ? 'justify-end' : 'justify-start')}>
            <div className={'max-w-2xl rounded-lg p-3 ' + (m.role === 'user' ? 'bg-yellow-600/20 text-yellow-50' : 'bg-slate-700/50')}>
              <div className="text-xs text-slate-400 mb-1">{m.role === 'user' ? user.name : cur.name} • {fmtDate(m.ts)}</div>
              <div className="whitespace-pre-wrap text-sm">{m.content}</div>
              {m.properties && m.properties.length > 0 && (
                <div className="mt-2 space-y-1">
                  {m.properties.slice(0,5).map((p, j) => (
                    <div key={j} className="text-xs bg-slate-800/50 rounded p-2">
                      <div className="font-bold">{p.nome || p.title}</div>
                      <div className="text-slate-400">{p.regiao} • {fmtMoney(p.preco || p.valor)}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        ))}
        {sending && <div className="text-slate-500 text-sm italic">{cur.name} está pensando…</div>}
        <div ref={messagesEndRef} />
      </div>

      <div className="card p-3 flex gap-2">
        <input
          className="input flex-1"
          placeholder={'Pergunte para ' + cur.name + '...'}
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          disabled={sending}
        />
        <button className="btn" onClick={send} disabled={sending || !input.trim()}>{sending ? '⏳' : 'Enviar'}</button>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// MetaAdsPage (relatorio campanhas via /api/meta-ads)
// ──────────────────────────────────────────────────────────────────────────
function MetaAdsPage({ user }) {
  const lvl = RLVL[user.role] || 0;
  if (lvl < 5) return <div className="p-6 text-slate-500">Acesso restrito a líder+ e sócios.</div>;

  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');
  const [datePreset, setDatePreset] = useState('last_30d');

  async function load() {
    setLoading(true); setErr('');
    try {
      const r = await fetch('/api/meta-ads?date_preset=' + datePreset);
      const j = await r.json();
      if (j.error) setErr(j.error);
      else setData(j);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  }
  useEffect(() => { load(); }, [datePreset]);

  const totals = data ? data.campaigns.reduce((acc, c) => ({
    spend: acc.spend + (c.spend||0),
    impressions: acc.impressions + (c.impressions||0),
    clicks: acc.clicks + (c.clicks||0),
    results: acc.results + (c.results||0),
    reach: acc.reach + (c.reach||0),
  }), { spend:0, impressions:0, clicks:0, results:0, reach:0 }) : null;

  const PRESETS = [
    { id: 'today', lbl: 'Hoje' },
    { id: 'yesterday', lbl: 'Ontem' },
    { id: 'last_7d', lbl: '7 dias' },
    { id: 'last_30d', lbl: '30 dias' },
    { id: 'this_month', lbl: 'Este mês' },

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>📣 Meta Ads</h1>
          <p className="text-sm text-slate-400">Campanhas Facebook & Instagram</p>
        </div>
        <div className="flex gap-2 flex-wrap">
          {PRESETS.map(p => (
            <button key={p.id} className={'btn btn-sm ' + (datePreset===p.id ? '' : 'btn-out')} onClick={() => setDatePreset(p.id)}>{p.lbl}</button>
          ))}
          <button className="btn btn-sm btn-out" onClick={load}>↻</button>
        </div>
      </div>

      {err && <div className="card p-4 mb-4 border-red-500/50 text-red-400">⚠ {err}</div>}

      {loading ? <div className="text-slate-500">Carregando Meta Ads…</div> : !data ? <div className="text-slate-500">Sem dados</div> : (
        <>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3 mb-4">
            <div className="card p-3"><div className="text-xs text-slate-400">Investimento</div><div className="text-xl font-bold" style={{color:'#d4a843'}}>{fmtMoney(totals.spend)}</div></div>
            <div className="card p-3"><div className="text-xs text-slate-400">Impressões</div><div className="text-xl font-bold">{totals.impressions.toLocaleString('pt-BR')}</div></div>
            <div className="card p-3"><div className="text-xs text-slate-400">Alcance</div><div className="text-xl font-bold">{totals.reach.toLocaleString('pt-BR')}</div></div>
            <div className="card p-3"><div className="text-xs text-slate-400">Cliques</div><div className="text-xl font-bold">{totals.clicks.toLocaleString('pt-BR')}</div></div>
            <div className="card p-3"><div className="text-xs text-slate-400">Resultados</div><div className="text-xl font-bold text-green-400">{totals.results.toLocaleString('pt-BR')}</div></div>
          </div>

          {data.accounts && data.accounts.length > 0 && (
            <div className="card p-4 mb-4">
              <div className="text-sm font-bold mb-2 text-slate-400 uppercase">Contas</div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-3">

                  <div key={a.id} className="card p-3" style={{background:'#0f172a'}}>
                    <div className="font-bold">{a.label}</div>

                <th className="text-right p-3">Resultados</th>

                {data.campaigns.sort((a,b) => (b.spend||0) - (a.spend||0)).map(c => (
