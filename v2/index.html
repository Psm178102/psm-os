  );
}


// ──────────────────────────────────────────────────────────────────────────
// AgendaPSMPage (eventos/reunioes corporativas)
// ──────────────────────────────────────────────────────────────────────────
function AgendaPSMPage({ user }) {
  const { value: eventos, save } = useShared('AGENDA_EVENTOS');
  const list = Array.isArray(eventos) ? eventos : [];
  const isStaff = user.role === 'socio' || user.role === 'lider';
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ titulo:'', tipo:'reuniao', dataInicio:todayKey()+'T09:00', dataFim:todayKey()+'T10:00', local:'', participantes:[], descricao:'' });
  const [filter, setFilter] = useState('proximos');

  async function add() {
    if (!form.titulo) return;
    const item = { id:'ev'+Date.now(), ...form, ts:Date.now(), createdBy:user.id, createdByName:user.name };
    await save([item, ...list].slice(0,500));
    setForm({ titulo:'', tipo:'reuniao', dataInicio:todayKey()+'T09:00', dataFim:todayKey()+'T10:00', local:'', participantes:[], descricao:'' });
    setShowForm(false);
  }
  async function remove(id) { if (!confirm('Apagar?')) return; await save(list.filter(e => e.id !== id)); }
  function toggleParticipante(uid) {
    const ps = form.participantes.includes(uid) ? form.participantes.filter(x => x !== uid) : [...form.participantes, uid];
    setForm({...form, participantes: ps});
  }

  const TIPOS = { reuniao:'🤝 Reunião', treinamento:'🎓 Treinamento', evento:'🎉 Evento', visita:'🏠 Visita', outro:'📌 Outro' };
  const now = new Date().toISOString();
  const filtered = filter === 'proximos' ? list.filter(e => e.dataInicio >= now) : filter === 'passados' ? list.filter(e => e.dataInicio < now) : list;
  filtered.sort((a,b) => filter === 'passados' ? b.dataInicio.localeCompare(a.dataInicio) : a.dataInicio.localeCompare(b.dataInicio));

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>📅 Agenda PSM</h1>
          <p className="text-sm text-slate-400">Eventos e reuniões corporativas</p>
        </div>
        {isStaff && <button className="btn" onClick={() => setShowForm(s => !s)}>{showForm ? '× Cancelar' : '+ Novo evento'}</button>}
      </div>

      <div className="flex gap-2 mb-4">
        <button className={'btn btn-sm ' + (filter==='proximos'?'':'btn-out')} onClick={() => setFilter('proximos')}>Próximos ({list.filter(e => e.dataInicio >= now).length})</button>
        <button className={'btn btn-sm ' + (filter==='passados'?'':'btn-out')} onClick={() => setFilter('passados')}>Passados ({list.filter(e => e.dataInicio < now).length})</button>
        <button className={'btn btn-sm ' + (filter==='todos'?'':'btn-out')} onClick={() => setFilter('todos')}>Todos ({list.length})</button>
      </div>

      {showForm && isStaff && (
        <div className="card p-4 mb-4">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
            <input className="input" placeholder="Título" value={form.titulo} onChange={e => setForm({...form, titulo:e.target.value})} />
            <select className="input" value={form.tipo} onChange={e => setForm({...form, tipo:e.target.value})}>
              {Object.entries(TIPOS).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
            </select>
            <input type="datetime-local" className="input" value={form.dataInicio} onChange={e => setForm({...form, dataInicio:e.target.value})} />
            <input type="datetime-local" className="input" value={form.dataFim} onChange={e => setForm({...form, dataFim:e.target.value})} />
            <input className="input md:col-span-2" placeholder="Local (escritório, online, endereço)" value={form.local} onChange={e => setForm({...form, local:e.target.value})} />
          </div>
          <div className="mb-3">
            <label className="text-xs text-slate-400 block mb-2">Participantes</label>
            <div className="flex flex-wrap gap-1">
              {USERS.map(u => (
                <button key={u.id} type="button" className={'btn btn-sm ' + (form.participantes.includes(u.id) ? '' : 'btn-out')} onClick={() => toggleParticipante(u.id)}>{u.name.split(' ')[0]}</button>
              ))}
            </div>
          </div>
          <textarea className="input mb-3" rows="3" placeholder="Descrição/pauta" value={form.descricao} onChange={e => setForm({...form, descricao:e.target.value})} />
          <button className="btn" onClick={add} disabled={!form.titulo}>💾 Salvar evento</button>
        </div>
      )}

      <div className="space-y-3">
        {filtered.map(e => {
          const dt = new Date(e.dataInicio);
          const dtFim = new Date(e.dataFim);
          const dia = dt.toLocaleDateString('pt-BR', { weekday:'short', day:'2-digit', month:'short' });
          const hr = dt.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' }) + '–' + dtFim.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
          const participantes = e.participantes?.map(pid => USERS.find(u => u.id===pid)?.name?.split(' ')[0] || pid).filter(Boolean) || [];
          return (
            <div key={e.id} className="card p-4">
              <div className="flex items-start justify-between mb-2 flex-wrap gap-2">
                <div className="flex gap-3">
                  <div className="text-center px-3 py-2 rounded" style={{background:'#0f172a', minWidth:80}}>
                    <div className="text-xs text-slate-400 uppercase">{dia.split(',')[0]}</div>
                    <div className="text-2xl font-bold" style={{color:'#d4a843'}}>{dt.getDate()}</div>
                    <div className="text-xs text-slate-400">{dt.toLocaleDateString('pt-BR', { month:'short' })}</div>
                  </div>
                  <div>
                    <div className="flex gap-2 items-center mb-1">
                      <span className="badge" style={{background:'#d4a84330',color:'#fde68a'}}>{TIPOS[e.tipo]||e.tipo}</span>
                      <span className="font-bold text-lg">{e.titulo}</span>
                    </div>
                    <div className="text-sm text-slate-400">⏰ {hr} {e.local && '· 📍 '+e.local}</div>
                  </div>
                </div>
                {(user.role === 'socio' || e.createdBy === user.id) && <button className="text-red-400 text-xs" onClick={() => remove(e.id)}>Apagar</button>}
              </div>
              {participantes.length > 0 && <div className="text-xs text-slate-400 mt-2">👥 {participantes.join(', ')}</div>}
              {e.descricao && <div className="text-sm text-slate-300 mt-2">{e.descricao}</div>}
            </div>
          );
        })}
        {filtered.length === 0 && <div className="text-center text-slate-500 py-8">Nenhum evento.</div>}
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// RankingPage (corretores ordenados por VGV/vendas)
// ──────────────────────────────────────────────────────────────────────────
function RankingPage({ user }) {
  const { value: vendas } = useShared('VENDAS_MANUAIS');
  const { value: metas } = useShared('METAS_INDIVIDUAIS');
  const list = Array.isArray(vendas) ? vendas : [];
  const m = metas || {};

  const [refMes, setRefMes] = useState(monthKey());
  const [criterio, setCriterio] = useState('vgv');

  const corretores = USERS.filter(u => ['corretor','lider'].includes(u.role));
  const ranking = useMemo(() => {
    return corretores.map(c => {
      const myVendas = list.filter(v => v.corretorId === c.id && v.status === 'fechada' && v.dataVenda?.startsWith(refMes));
      const vgv = myVendas.reduce((s,v) => s + (v.vgv||0), 0);
      const meta = m[c.id]?.vgv || 0;
      const pctMeta = meta > 0 ? (vgv/meta*100) : 0;
      return { corretor: c, vendas: myVendas.length, vgv, meta, pctMeta };
    }).sort((a,b) => {
      if (criterio === 'vendas') return b.vendas - a.vendas;
      if (criterio === 'pct') return b.pctMeta - a.pctMeta;
      return b.vgv - a.vgv;
    });
  }, [corretores, list, m, refMes, criterio]);

  const MEDALS = ['🥇','🥈','🥉'];

  return (
    <div className="p-6">
      <div className="flex items-center justify-between mb-4 flex-wrap gap-3">
        <div>
          <h1 className="text-2xl font-bold" style={{color:'#d4a843'}}>🏅 Ranking</h1>
          <p className="text-sm text-slate-400">Performance dos corretores</p>
        </div>
        <div className="flex gap-2 items-center">
          <input type="month" className="input" value={refMes} onChange={e => setRefMes(e.target.value)} />
          <select className="input" value={criterio} onChange={e => setCriterio(e.target.value)}>
            <option value="vgv">Por VGV</option>
            <option value="vendas">Por nº vendas</option>
            <option value="pct">Por % de meta</option>
          </select>
        </div>
      </div>

      <div className="space-y-2">
        {ranking.map((r, i) => {
          const medal = MEDALS[i] || ('#' + (i+1));
          const isTop3 = i < 3;
          const colors = ['#d4a843','#94a3b8','#92400e'];
          return (
            <div key={r.corretor.id} className="card p-4" style={{borderColor: isTop3 ? colors[i] : '#334155', borderWidth: isTop3 ? 2 : 1}}>
              <div className="flex items-center gap-4">
                <div className="text-3xl w-12 text-center">{medal}</div>
                <div className="flex-1">
                  <div className="font-bold text-lg">{r.corretor.name}</div>
                  <div className="text-xs text-slate-400">{r.corretor.frente ? FRENTES[r.corretor.frente]?.label : '—'} • {r.vendas} vendas</div>
                </div>
                <div className="text-right">
                  <div className="text-xl font-bold" style={{color:'#d4a843'}}>{fmtMoney(r.vgv)}</div>
                  {r.meta > 0 && <div className="text-xs" style={{color: r.pctMeta >= 100 ? '#22c55e' : r.pctMeta >= 70 ? '#d4a843' : '#ef4444'}}>{r.pctMeta.toFixed(0)}% da meta</div>}
                </div>
              </div>
              {r.meta > 0 && (
                <div className="h-2 bg-slate-700 rounded overflow-hidden mt-3">
                  <div style={{width: Math.min(100, r.pctMeta)+'%', height:'100%', background: r.pctMeta >= 100 ? '#22c55e' : '#d4a843'}}></div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// CheckinPage (jornada de trabalho diaria)
// ──────────────────────────────────────────────────────────────────────────
function CheckinPage({ user }) {
  const targetUid = useMemo(() => legacyUid(user.id), [user.id]);
  const { value: log, save: saveLog } = useUserKv(targetUid, 'CHECKIN_LOG');
  const list = Array.isArray(log) ? log : [];
  const today = todayKey();
  const todayLog = list.find(l => l.date === today);

  async function checkIn() {
    const now = new Date();
    const time = now.toTimeString().slice(0,5);
    const next = todayLog
      ? list.map(l => l.date === today ? { ...l, checkin: time, ts: Date.now() } : l)
      : [{ date: today, checkin: time, pausas: [], checkout: null, ts: Date.now() }, ...list];
    await saveLog(next.slice(0, 365));
  }
  async function checkOut() {
    const now = new Date();
    const time = now.toTimeString().slice(0,5);
    const next = list.map(l => l.date === today ? { ...l, checkout: time, ts: Date.now() } : l);
    await saveLog(next);
  }
  async function togglePausa() {
    const now = new Date();
    const time = now.toTimeString().slice(0,5);
    let next;
    if (!todayLog) return;
    const lastPausa = todayLog.pausas?.[todayLog.pausas.length - 1];
    if (lastPausa && !lastPausa.fim) {
      // Encerrar pausa
      next = list.map(l => l.date === today ? {
        ...l,
        pausas: l.pausas.map((p, i) => i === l.pausas.length - 1 ? { ...p, fim: time } : p)
      } : l);
    } else {
      next = list.map(l => l.date === today ? { ...l, pausas: [...(l.pausas||[]), { inicio: time, fim: null }] } : l);
    }
    await saveLog(next);
  }

  function calcHoras(l) {
    if (!l.checkin || !l.checkout) return null;
    const [h1, m1] = l.checkin.split(':').map(Number);
    const [h2, m2] = l.checkout.split(':').map(Number);
    let total = (h2*60 + m2) - (h1*60 + m1);
    (l.pausas||[]).forEach(p => {
      if (p.inicio && p.fim) {
        const [pi, pmi] = p.inicio.split(':').map(Number);
        const [pf, pmf] = p.fim.split(':').map(Number);
        total -= (pf*60 + pmf) - (pi*60 + pmi);
      }
    });
    return Math.max(0, total);
  }

  const inPausa = todayLog?.pausas?.length && !todayLog.pausas[todayLog.pausas.length - 1].fim;
  const isClocked = !!todayLog?.checkin && !todayLog?.checkout;

  return (
    <div className="p-6 max-w-3xl">
      <h1 className="text-2xl font-bold mb-1" style={{color:'#d4a843'}}>⏱️ Check-in / Check-out</h1>
      <p className="text-sm text-slate-400 mb-6">Controle pessoal de jornada</p>

      <div className="card p-6 mb-6 text-center">
        <div className="text-sm text-slate-400 mb-2">Hoje • {new Date().toLocaleDateString('pt-BR')}</div>
        <div className="text-5xl font-bold mb-4" style={{color:'#d4a843'}}>
          {todayLog?.checkin || '--:--'} {todayLog?.checkout && '→ ' + todayLog.checkout}
        </div>
        {todayLog && calcHoras(todayLog) !== null && (
          <div className="text-lg text-green-400 mb-4">⏰ {Math.floor(calcHoras(todayLog)/60)}h{String(calcHoras(todayLog)%60).padStart(2,'0')} trabalhadas</div>
        )}
        <div className="flex gap-3 justify-center flex-wrap">
          {!todayLog?.checkin && <button className="btn btn-success" onClick={checkIn}>✓ Check-in</button>}
          {isClocked && <button className={'btn ' + (inPausa ? 'btn-success' : 'btn-out')} onClick={togglePausa}>{inPausa ? '▶️ Voltar pausa' : '⏸️ Iniciar pausa'}</button>}
          {isClocked && <button className="btn btn-danger" onClick={checkOut}>⏹ Check-out</button>}
        </div>
        {inPausa && <div className="text-yellow-400 text-sm mt-3">⏸️ Em pausa desde {todayLog.pausas[todayLog.pausas.length-1].inicio}</div>}
      </div>

      <div className="card p-4">
        <h2 className="font-bold mb-3">📋 Histórico (últimos 30)</h2>
        <table className="w-full text-sm">
          <thead><tr className="text-xs text-slate-400 uppercase border-b border-slate-700">
            <th className="text-left p-2">Data</th>
            <th className="text-center p-2">Check-in</th>
            <th className="text-center p-2">Check-out</th>
            <th className="text-center p-2">Pausas</th>
            <th className="text-right p-2">Horas</th>
          </tr></thead>
          <tbody>
            {list.slice(0,30).map(l => {
              const h = calcHoras(l);
              return (
                <tr key={l.date} className="border-t border-slate-700">
                  <td className="p-2">{l.date}</td>
                  <td className="text-center p-2">{l.checkin || '—'}</td>
                  <td className="text-center p-2">{l.checkout || '—'}</td>
                  <td className="text-center p-2">{l.pausas?.length || 0}</td>
                  <td className="text-right p-2 font-bold" style={{color:'#d4a843'}}>{h !== null ? Math.floor(h/60)+'h'+String(h%60).padStart(2,'0') : '—'}</td>
                </tr>
              );
            })}
            {list.length === 0 && <tr><td colSpan="5" className="text-center text-slate-500 p-6">Sem registros.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────────────────
// ArenaTVPage (modo TV — display em tela grande do escritorio)
// ──────────────────────────────────────────────────────────────────────────
function ArenaTVPage({ user }) {
  const { value: vendas } = useShared('VENDAS_MANUAIS');
  const { value: metas } = useShared('METAS_INDIVIDUAIS');
  const { value: recados } = useShared('RECADOS_DIRETORIA');
  const list = Array.isArray(vendas) ? vendas : [];
  const m = metas || {};
  const recList = Array.isArray(recados) ? recados : [];

  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const i = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(i);
  }, []);

  const corretores = USERS.filter(u => ['corretor','lider'].includes(u.role));
  const refMes = monthKey();
  const ranking = corretores.map(c => {
    const myVendas = list.filter(v => v.corretorId === c.id && v.status === 'fechada' && v.dataVenda?.startsWith(refMes));
    const vgv = myVendas.reduce((s,v) => s + (v.vgv||0), 0);
    const meta = m[c.id]?.vgv || 0;
    return { corretor: c, vgv, meta, vendas: myVendas.length, pct: meta > 0 ? (vgv/meta*100) : 0 };
  }).sort((a,b) => b.vgv - a.vgv).slice(0, 8);

  const totalVgv = corretores.reduce((s,c) => {
    const v = list.filter(x => x.corretorId === c.id && x.status === 'fechada' && x.dataVenda?.startsWith(refMes)).reduce((s2,v) => s2+(v.vgv||0), 0);
    return s + v;
  }, 0);
  const totalMeta = corretores.reduce((s,c) => s + (m[c.id]?.vgv || 0), 0);
  const pctTotal = totalMeta > 0 ? (totalVgv/totalMeta*100) : 0;

  const ultimoRecado = recList[0];

  return (
    <div className="min-h-screen p-8" style={{background:'#0f172a'}}>
      <div className="flex items-center justify-between mb-8">
        <div>
          <h1 className="text-5xl font-bold" style={{color:'#d4a843'}}>PSM ARENA</h1>
          <div className="text-xl text-slate-400 mt-1">{now.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' })}</div>
        </div>
        <div className="text-6xl font-mono font-bold" style={{color:'#d4a843'}}>{now.toTimeString().slice(0,5)}</div>
      </div>

      <div className="grid grid-cols-3 gap-6 mb-8">
        <div className="card p-6 text-center">
          <div className="text-sm text-slate-400 uppercase mb-2">VGV do Mês</div>
          <div className="text-4xl font-bold" style={{color:'#d4a843'}}>{fmtMoney(totalVgv)}</div>
        </div>
        <div className="card p-6 text-center">
          <div className="text-sm text-slate-400 uppercase mb-2">Meta do Mês</div>
          <div className="text-4xl font-bold">{fmtMoney(totalMeta)}</div>
        </div>
        <div className="card p-6 text-center" style={{borderColor: pctTotal >= 100 ? '#16a34a' : pctTotal >= 70 ? '#d4a843' : '#dc2626', borderWidth:3}}>
          <div className="text-sm text-slate-400 uppercase mb-2">% Atingimento</div>
          <div className="text-5xl font-bold" style={{color: pctTotal >= 100 ? '#22c55e' : pctTotal >= 70 ? '#d4a843' : '#ef4444'}}>{pctTotal.toFixed(0)}%</div>
        </div>
      </div>

      <div className="grid grid-cols-3 gap-6">
        <div className="col-span-2 card p-6">
          <h2 className="text-2xl font-bold mb-4" style={{color:'#d4a843'}}>🏅 RANKING DO MÊS</h2>
          <div className="space-y-3">
            {ranking.map((r, i) => {
              const medal = ['🥇','🥈','🥉'][i] || ('#'+(i+1));
              return (
                <div key={r.corretor.id} className="flex items-center gap-4">
                  <div className="text-3xl w-12">{medal}</div>
                  <div className="flex-1">
                    <div className="text-xl font-bold">{r.corretor.name}</div>
                    <div className="h-3 bg-slate-700 rounded overflow-hidden mt-1">
                      <div style={{width: Math.min(100, r.pct)+'%', height:'100%', background: r.pct >= 100 ? '#22c55e' : '#d4a843'}}></div>
                    </div>
                  </div>
                  <div className="text-right">
                    <div className="text-2xl font-bold" style={{color:'#d4a843'}}>{fmtMoney(r.vgv)}</div>
                    <div className="text-sm text-slate-400">{r.vendas} vendas {r.meta > 0 && '· '+r.pct.toFixed(0)+'%'}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="card p-6">
          <h2 className="text-xl font-bold mb-4" style={{color:'#d4a843'}}>📢 RECADO</h2>
          {ultimoRecado ? (
            <div>
              <div className="text-xs text-slate-400 mb-2">{ultimoRecado.authorName} • {fmtDate(ultimoRecado.ts)}</div>
              <div className="text-lg whitespace-pre-wrap">{ultimoRecado.text}</div>
            </div>
          ) : <div className="text-slate-500">Nenhum recado.</div>}
        </div>
      </div>

      <div className="text-center text-slate-500 text-xs mt-6">PSM /v2 ARENA — atualização ao vivo</div>
    </div>
  );
}
