        return'<tr style="cursor:pointer;'+(isSel?'background:rgba(212,168,67,.08)':'')+'" onclick="S.metasBroker=\''+b.id+'\';render()">'
        +'<td style="text-align:center">'+medal(i)+'</td><td>'+Av(b,'xs')+' <span style="font-size:11px;font-weight:'+(isSel?800:600)+'">'+b.name+'</span></td><td>'+FTag(b.frente)+'</td>'
        +'<td style="text-align:right;font-weight:700">'+fmt(b.vgv_real)+'</td><td style="text-align:right;color:var(--muted)">'+fmt(b.vgv_meta)+'</td>'
        +'<td style="text-align:right;font-weight:800;color:'+bc+'">'+b.pct+'%</td><td style="text-align:right">'+b.vendas+'</td><td style="text-align:right">'+b.conv+'%</td></tr>';
      }).join('')+'</tbody></table></div></div>';

  // ═══════════════════════════════════════════════════════════════
  // TAB: MEU PORQUÊ (Quadro de Sonhos)
  // ═══════════════════════════════════════════════════════════════
  // TAB: MEU PORQUÊ (Mural de Metas Pessoais)
  // ═══════════════════════════════════════════════════════════════
  } else {
    const bSel='<select class="fs sel-f" style="margin-bottom:14px" onchange="S.metasBroker=this.value;render()">'
      +BROKERS.map(b=>'<option value="'+b.id+'"'+(selBid===b.id?' selected':'')+'>'+b.name+'</option>').join('')+'</select>';
    const obj=(S.sonhos||{})[selBid]||{};
    const comPct=S.comissaoPct||6;
    const ticket=selB.ticketMedio||350000;
    const comMedia=Math.round(ticket*comPct/100);
    const objValor=obj.valor||0;
    const jaCom=Math.round((selBD.vgv_real||0)*comPct/100);
    const faltaCom=Math.max(0,objValor-jaCom);
    const vendasFaltam=faltaCom>0?Math.ceil(faltaCom/Math.max(1,comMedia)):0;
    const vendasTotal=objValor>0?Math.ceil(objValor/Math.max(1,comMedia)):0;
    const pctObj=objValor>0?Math.min(100,Math.round(jaCom/objValor*100)):0;
    const imgUrl=obj.imagem||'';

    content=bSel
      +'<div style="background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);border-radius:16px;padding:32px;color:#fff;margin-bottom:16px">'
      +'<div style="font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:3px;margin-bottom:6px">✨ Meu Porquê — Destino PSM</div>'
      +'<div style="font-size:24px;font-weight:900;margin-bottom:4px">'+selB.name+', o que te motiva a vender mais?</div>'
      +'<div style="font-size:12px;color:#94a3b8">Defina sua meta pessoal. O sistema calcula exatamente quanto falta para conquistar.</div>'
      +'</div>'

      // ── Mural: Imagem + Objetivo ──
      +'<div class="g2 mb2">'
      +'<div class="card">'
      +'<div class="ctitle">🎯 Minha Meta Pessoal</div>'
      +'<div class="fg"><label class="flabel">O que eu quero conquistar</label>'
      +'<input class="finp" placeholder="Ex: BMW X3, Viagem Europa, Primeiro Apartamento..." value="'+(obj.descricao||'')+'" oninput="if(!S.sonhos)S.sonhos={};if(!S.sonhos[\''+selBid+'\'])S.sonhos[\''+selBid+'\']={}; S.sonhos[\''+selBid+'\'].descricao=this.value;saveState()"></div>'
      +'<div class="fg"><label class="flabel">Valor do objetivo (R$)</label>'
      +'<input class="finp" type="number" placeholder="250000" value="'+objValor+'" oninput="if(!S.sonhos)S.sonhos={};if(!S.sonhos[\''+selBid+'\'])S.sonhos[\''+selBid+'\']={}; S.sonhos[\''+selBid+'\'].valor=+this.value;saveState();render()"></div>'
      +'<div class="fg"><label class="flabel">📷 Imagem do objetivo (cole a URL)</label>'
      +'<input class="finp" type="url" placeholder="https://... (link da imagem do carro, viagem, etc)" value="'+imgUrl+'" oninput="if(!S.sonhos)S.sonhos={};if(!S.sonhos[\''+selBid+'\'])S.sonhos[\''+selBid+'\']={}; S.sonhos[\''+selBid+'\'].imagem=this.value;saveState();render()"></div>'
      +'<div style="font-size:10px;color:var(--muted);margin-top:8px">Comissão média: '+comPct+'% sobre ticket de '+fmt(ticket)+' = <strong>'+fmt(comMedia)+'/venda</strong></div>'
      +'</div>'

      // ── Mural Visual ──
      +'<div class="card" style="display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;overflow:hidden;min-height:250px'+(imgUrl?';background-image:url('+imgUrl+');background-size:cover;background-position:center':'')+'">'
      +(imgUrl?'<div style="position:absolute;inset:0;background:rgba(15,23,42,.6)"></div>':'')
      +'<div style="position:relative;z-index:1">'
      +(obj.descricao?
        '<div style="font-size:11px;color:'+(imgUrl?'rgba(255,255,255,.7)':'var(--muted)')+';text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">META PESSOAL</div>'
        +'<div style="font-size:22px;font-weight:900;color:'+(imgUrl?'#fff':'var(--navy)')+';margin-bottom:4px">'+(obj.descricao||'')+'</div>'
        +'<div style="font-size:16px;font-weight:700;color:'+(imgUrl?'var(--gold)':'var(--navy)')+';margin-bottom:12px">'+fmt(objValor)+'</div>'
        +'<div style="width:200px;height:8px;background:'+(imgUrl?'rgba(255,255,255,.2)':'var(--cream3)')+';border-radius:99px;margin:0 auto"><div style="height:100%;width:'+pctObj+'%;background:var(--gold);border-radius:99px;transition:width .5s"></div></div>'
        +'<div style="font-size:12px;font-weight:800;color:var(--gold);margin-top:6px">'+pctObj+'% conquistado</div>'
        :'<div style="color:var(--muted);font-size:13px">Preencha sua meta pessoal<br>para visualizar aqui</div>')
      +'</div></div></div>'

      // ── Calculadora Reversa ──
      +(objValor>0?
      '<div class="card mb2" style="background:var(--navy);color:#fff;border-color:transparent">'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;text-align:center">'
      +'<div><div style="font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Comissão Acumulada</div><div style="font-size:28px;font-weight:900;color:var(--gold)">'+fmt(jaCom)+'</div><div style="font-size:10px;color:#64748b">de '+fmt(objValor)+'</div></div>'
      +'<div><div style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Ainda Falta</div><div style="font-size:28px;font-weight:900;color:#fff">'+fmt(faltaCom)+'</div><div style="font-size:10px;color:#64748b">em comissão</div></div>'
      +'<div><div style="font-size:9px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Vendas Restantes</div><div style="font-size:48px;font-weight:900;color:var(--gold);line-height:1">'+vendasFaltam+'</div><div style="font-size:10px;color:#64748b">de '+vendasTotal+' no total</div></div>'
      +'</div>'
      +'<div style="margin-top:14px;height:8px;background:rgba(255,255,255,.1);border-radius:99px"><div style="height:100%;width:'+pctObj+'%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:99px;transition:width .5s"></div></div>'
      +(pctObj>=100?'<div style="text-align:center;margin-top:12px;font-size:16px;font-weight:900;color:var(--gold)">🎉 PARABÉNS! Objetivo alcançado!</div>':'')
      +'</div>':'')

      // ── Insight Sr. Performance ──
      +'<div class="card" style="border-left:3px solid var(--gold);background:linear-gradient(90deg,#fffbeb,#fff)">'
      +'<div style="display:flex;gap:12px">'
      +'<div style="font-size:24px">🤖</div>'
      +'<div><div style="font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Sr. Performance diz:</div>'
      +'<div style="font-size:12px;color:var(--mid);line-height:1.6">'
      +(objValor>0&&jaCom>0?
        '<strong>'+selB.name.split(' ')[0]+'</strong>, você já acumulou <strong>'+fmt(jaCom)+'</strong> em comissão ('+pctObj+'% do objetivo). '
        +(pctObj>=100?'Você já conquistou sua meta! Hora de definir o próximo nível.':
          'Faltam <strong>'+vendasFaltam+' vendas</strong> para alcançar '+(obj.descricao||'seu objetivo')+'. Cada visita te aproxima!')
        :objValor>0?
        '<strong>'+selB.name.split(' ')[0]+'</strong>, seu objetivo custa '+fmt(objValor)+'. Com ticket médio de '+fmt(ticket)+' e '+comPct+'% de comissão, são <strong>'+vendasTotal+' vendas</strong>. Comece agendando 3 visitas esta semana!'
        :'Defina sua meta pessoal! Corretor com propósito claro vende em média 40% mais que quem não tem objetivo definido.')
      +'</div></div></div></div>';
  }

  return '<div class="phd"><h1>🎯 Central de Metas</h1><p>Gestão de performance e motivação — '+METRICS.mes+'</p></div>'
    +df+pBar+tabs+content;
}

// ─── PAGE: EQUIPE ─────────────────────────────────────────────────────────────
function pgEquipe(){
  const f=S.eqFrente;
  const list=f==='all'?BROKERS:BROKERS.filter(b=>b.frente===f);
  const sorted=[...list].sort((a,b)=>b.vgv-a.vgv);
  return '<div class="phd"><h1>Visão por Equipe</h1><p>'+METRICS.mes+'</p></div>'
  +'<div style="display:flex;gap:6px;margin-bottom:13px;flex-wrap:wrap">'
  +'<span class="chip'+(f==='all'?' on':'')+'" onclick="S.eqFrente=\'all\';render()">Todas</span>'
  +Object.values(FRENTES).map(fr=>'<span class="chip'+(f===fr.id?' on':'')+'" onclick="S.eqFrente=\''+fr.id+'\';render()">'+fr.icon+' '+fr.label+'</span>').join('')
  +'</div>'
  +'<div class="card mb2"><div class="ctitle">Ranking por VGV</div>'
  +svgBar(sorted.map(b=>({n:b.name.split(' ')[0],vgv:b.vgv,meta:b.meta})),'vgv','meta','n','#0f172a','#e2e8f0',150)
  +'</div>'
  +'<div class="card"><div class="tw"><table class="tbl"><thead><tr><th>#</th><th>Corretor</th><th>Frente</th><th>VGV</th><th>Meta</th><th>%</th><th>Vend.</th><th>Lig.</th><th>Agend.</th><th>Vis.</th><th>Prop.</th><th>CRM</th></tr></thead><tbody>'
  +sorted.map((b,i)=>'<tr><td style="font-size:13px;text-align:center">'+medal(i)+'</td><td><div class="flex aic gap1">'+Av(b,'xs',true)+'<span style="font-size:12px;font-weight:600">'+b.name+'</span></div></td><td>'+FTag(b.frente)+'</td><td class="tr">'+(b.vgv?fmt(b.vgv):'—')+'</td><td class="tr">'+fmt(b.meta)+'</td><td class="tr" style="color:'+(pN(b.vgv,b.meta)>=80?'var(--g-tx)':pN(b.vgv,b.meta)>=50?'var(--a-tx)':'var(--r-tx)')+';font-weight:700">'+pS(b.vgv,b.meta)+'</td><td class="tr">'+(b.vendas||0)+'</td><td class="tr">'+b.lig+'</td><td class="tr">'+b.agend+'</td><td class="tr">'+b.vis+'</td><td class="tr">'+b.prop+'</td><td style="min-width:85px">'+CrmBar(b.crm)+'</td></tr>').join('')
  +'</tbody></table></div></div>';
}

// ─── PAGE: CRM ────────────────────────────────────────────────────────────────
function pgCRM(){
  const u=S.user;
  const lvl=RLVL[u?.role]||0;
  const ff=S.crmFrente||'all', sf=S.crmSla||'all', cb=S.crmBroker||'all';
  const view=S.crmView||'kanban';

  // Broker filter availability
  let brokersAvail=BROKERS;
  if(lvl===5){
    const subs=Object.entries(TEAM_CONFIG.leaders).find(([lid])=>lid===u.id)?.[1]||[];
    brokersAvail=BROKERS.filter(b=>subs.includes(b.id)||b.id===u.id);
  }
  const canFilter=lvl>=5;
  const effectiveBid=lvl<=2?u.id:(cb==='all'?null:cb);

  const vis=OPPS.filter(o=>
    (ff==='all'||o.fr===ff)&&
    (sf==='all'||o.sla===sf)&&
    (!effectiveBid||o.bid===effectiveBid)&&(!S.crmSearch||((o.cl||'').toLowerCase().includes((S.crmSearch||'').toLowerCase())))
  );
  const totalVGV=vis.reduce((a,o)=>a+o.vgv,0);
  const selBroker=effectiveBid?UM[effectiveBid]:null;
  const lastSyncStr=RD.lastSync?RD.lastSync.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'—';
  const cacheActive=RD._cache&&Object.keys(RD._cache).length>0;

  // -- SYNC STATUS BAR --
  let syncBar='<div id="rd-sync-progress" style="margin-bottom:10px"></div>';
  if(!S.rdSyncing && S.rdSyncStatus==='ok'){
    syncBar+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:11px;color:var(--muted)">'
      +'<span style="width:6px;height:6px;border-radius:50%;background:var(--g);display:inline-block"></span>'
      +'RD Live · Última sync '+lastSyncStr
      +(cacheActive?' · <span style="color:var(--b-tx)">Cache ativo</span>':'')
      +' · <button style="background:none;border:none;color:var(--b-tx);cursor:pointer;font:inherit;font-weight:600;padding:0" onclick="RD.sync(true)">Atualizar</button>'
      +' · <button style="background:none;border:none;color:var(--muted);cursor:pointer;font:inherit;padding:0" onclick="RD.sync(true,true)">Forçar refresh</button>'
      +'</div>';
  }

  // -- FILTER BAR --
  let bar=syncBar+'<div class="crm-bar">';
  bar+='<select class="fs sel-f" onchange="S.crmFrente=this.value;render()">'
    +'<option value="all">Todas Frentes</option>'
    +Object.values(FRENTES).map(f=>'<option value="'+f.id+'"'+(ff===f.id?' selected':'')+'>'+f.icon+' '+f.label+'</option>').join('')
    +'</select>';
  bar+='<select class="fs sel-f" onchange="S.crmSla=this.value;render()">'
    +'<option value="all">Todos SLAs</option>'
    +'<option value="ok"'+(sf==='ok'?' selected':'')+'>OK</option>'
    +'<option value="warning"'+(sf==='warning'?' selected':'')+'>Atencao</option>'
    +'<option value="overdue"'+(sf==='overdue'?' selected':'')+'>Vencido</option>'
    +'</select>';
  if(canFilter){
    bar+='<select class="fs sel-f sel-broker" style="min-width:180px" onchange="S.crmBroker=this.value;S.crmView=\'kanban\';render()">'
      +'<option value="all"'+(cb==='all'?' selected':'')+'>Todos Corretores</option>'
      +brokersAvail.map(b=>'<option value="'+b.id+'"'+(cb===b.id?' selected':'')+'>'+b.ini+' '+b.name+'</option>').join('')
      +'</select>';
  }
  bar+='<input class="finp" style="width:200px;padding:6px 10px;font-size:12px" placeholder="🔍 Buscar cliente..." value="'+(S.crmSearch||'')+'" oninput="S.crmSearch=this.value;render()">';
  bar+='<div style="display:flex;gap:3px;background:var(--cream2);padding:3px;border-radius:8px;border:1px solid var(--cream3);margin-left:auto">'
    +'<button class="btn bsm'+(view==='kanban'?' bp1':' bout')+'" onclick="S.crmView=\'kanban\';render()">Kanban</button>'
    +'<button class="btn bsm'+(view==='lista'?' bp1':' bout')+'" onclick="S.crmView=\'lista\';render()">Lista</button>'
    +'</div></div>';

  // -- BROKER HEADER --
  let bhead='';
  if(selBroker){
    const bPct=selBroker.meta?Math.round(totalVGV/selBroker.meta*100):0;
    const bHot=vis.filter(o=>['quente','proposta','contrato'].includes(o.st)).length;
    bhead='<div style="display:flex;align-items:center;gap:14px;padding:14px 18px;background:linear-gradient(135deg,'+selBroker.color+'15,'+selBroker.color+'06);border:1px solid '+selBroker.color+'30;border-radius:12px;margin-bottom:14px;flex-wrap:wrap">'
      +'<div style="width:44px;height:44px;border-radius:12px;background:'+selBroker.color+';display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0">'+selBroker.ini+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:15px;font-weight:800;color:var(--navy)">'+selBroker.name+'</div>'
      +'<div style="font-size:11px;color:var(--muted)">'+FTag(selBroker.frente||'')+' &nbsp;'+( selBroker.role==='lider'?'<span class="badge ba">Lider</span>':'')+'</div></div>'
      +'<div style="display:flex;gap:20px;flex-wrap:wrap">'
      +'<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--navy)">'+vis.length+'</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Opps</div></div>'
      +'<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--navy)">'+fmt(totalVGV)+'</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">VGV</div></div>'
      +'<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:'+(bPct>=100?'var(--g-tx)':bPct>=70?'var(--a-tx)':'var(--r-tx)')+'">'+bPct+'%</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">da Meta</div></div>'
      +'<div style="text-align:center"><div style="font-size:20px;font-weight:900;color:var(--r-tx)">'+bHot+'</div><div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px">Quentes</div></div>'
      +'</div>'
      +'<button class="btn bout bsm" onclick="S.crmBroker=\'all\';render()">Ver todos</button>'
      +'</div>';
  }

  // -- KANBAN --
  let content='';
  if(view==='kanban'){
    const fid=ff!=='all'?ff:(selBroker?.frente||'lancamento');
    const stages=FUNIS[fid]||FUNIS.lancamento||[];
    const pW=vis.reduce((a,o)=>{const s=stages.find?stages.find(x=>(x.rdIds&&x.rdIds.includes(o.st))||(x.id===o.st_psm||x.id===o.st)):null;return a+(o.vgv*(s?s.w:.05));},0);
    content='<div style="overflow-x:auto;padding-bottom:8px"><div style="display:flex;gap:10px;min-width:max-content;padding:4px 2px">';
    stages.forEach(s=>{
      const co=vis.filter(o=>s.rdIds&&s.rdIds.length?s.rdIds.includes(o.st):(o.st_psm===s.id||o.st===s.id));
      const cv=co.reduce((a,o)=>a+o.vgv,0);
      content+='<div style="width:195px;flex-shrink:0">'
        +'<div style="background:'+s.color+'18;border:1px solid '+s.color+'35;border-top:3px solid '+s.color+';border-radius:8px 8px 0 0;padding:8px 10px">'
        +'<div style="font-size:10px;font-weight:800;color:'+s.color+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+s.label+'</div>'
        +'<div style="display:flex;gap:6px;margin-top:3px;align-items:center">'
        +'<span style="background:'+s.color+';color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:9px">'+co.length+'</span>'
        +(cv>0?'<span style="font-size:10px;font-weight:700;color:'+s.color+'">'+fmt(cv)+'</span>':'')
        +'</div></div>'
        +'<div style="background:var(--cream2);border:1px solid var(--cream3);border-top:none;border-radius:0 0 8px 8px;min-height:70px;padding:5px;display:flex;flex-direction:column;gap:4px">';
      if(!co.length) content+='<div style="text-align:center;padding:16px 0;font-size:10px;color:var(--muted)">vazio</div>';
      co.slice(0,10).forEach(o=>{
        const b=(UM[o.bid]||{});
        const sc=o.sla==='overdue'?'#dc2626':o.sla==='warning'?'#d97706':'#16a34a';
        content+='<div style="background:#fff;border:1px solid var(--cream3);border-left:3px solid '+sc+';border-radius:7px;padding:7px 9px">'
          +'<div style="font-size:11px;font-weight:700;color:var(--navy);line-height:1.3;margin-bottom:4px">'+o.cl+'</div>'
          +(o.vgv?'<div style="font-size:10.5px;font-weight:800;color:var(--navy);margin-bottom:4px">'+fmt(o.vgv)+'</div>':'')
          +'<div style="display:flex;align-items:center;justify-content:space-between">'
          +(b.name?'<div style="display:flex;align-items:center;gap:3px"><div style="width:16px;height:16px;border-radius:5px;background:'+(b.color||'#888')+';display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#fff">'+b.ini+'</div><span style="font-size:9px;color:var(--muted)">'+b.name.split(' ')[0]+'</span></div>':'<span></span>')
          +'<span style="font-size:9px;color:'+(o.dnu>=5?'#dc2626':o.dnu>=3?'#d97706':'var(--muted)')+'">'+o.dnu+'d</span>'
          +'</div></div>';
      });
      if(co.length>10) content+='<div style="text-align:center;font-size:9px;color:var(--muted);padding:3px">+'+( co.length-10)+' mais</div>';
      content+='</div></div>';
    });
    content+='</div></div>';
    content+='<div style="display:flex;gap:9px;flex-wrap:wrap;margin-top:11px">'
      +'<div class="card" style="flex:1;min-width:120px;padding:11px 15px;text-align:center"><div style="font-size:20px;font-weight:900;color:var(--navy)">'+vis.length+'</div><div style="font-size:9.5px;color:var(--muted);text-transform:uppercase">Oportunidades</div></div>'

  +'</div>';
}

    '6998ae081e4ffb0016d28888': {frente:'terceiros',  psm:'proposta',     w:.78},

    '66746deb31be9e0014e3e9fb': {frente:'locacao',    psm:'carteira',     w:.03},

  },

  rdIdToBid(rdId) {
    const u = USERS_BASE.find(u => u.rdId === rdId);
    return u ? u.id : null;
  },

  async req(path, service='crm') {
    const [rdPath, qs] = path.split('?');
    const c = S.connectors || {};
    // Auto-refresh MKT token if expired or expiring soon
    if (service === 'mkt' && c.rd_mkt_refresh_token && typeof refreshRdMktToken === 'function') {
      await refreshRdMktToken();
    }
    const token = service === 'mkt' ? (c.rd_mkt_access_token || c.rd_mkt_token) : c.rd_crm_token;

    // Token local é opcional — o proxy Vercel tem o token como env var
    const baseUrl = service === 'mkt'
      ? 'https://api.rdstation.com/2.0'
      : 'https://crm.rdstation.com/api/v1';
    const tokenParam = service === 'mkt' ? 'auth_token' : 'token';

    // ── STRATEGY: Proxy first (Vercel), then direct ──
    // RD Station API does NOT send CORS headers, so direct browser calls
    // are blocked. The Vercel proxy is the reliable path.

    let proxyErr = null, directErr = null;

    // 1) Try proxy FIRST (works when deployed on Vercel — uses env var token as fallback)
    try {
      const params2 = new URLSearchParams(qs || '');
      params2.set('path', rdPath);
      params2.set('service', service);
      const proxyUrl = '/api/rd?' + params2.toString();
      console.log('[RD req] Tentando proxy:', service, rdPath);
      const hdrs = { 'Accept': 'application/json' };
      if (token) hdrs['X-RD-Token'] = token;
      const r2 = await fetch(proxyUrl, { headers: hdrs });
      if (!r2.ok) {
        const errText = await r2.text().catch(()=>'');
        throw new Error('Proxy HTTP ' + r2.status + ': ' + errText.slice(0,120));
      }
      const data = await r2.json();
      console.log('[RD req] ✅ Sucesso via proxy:', service, rdPath);
      return data;
    } catch(e) {
      proxyErr = e;
      console.warn('[RD req] Proxy falhou:', e.message);
    }

    // 2) Fallback: try direct call (only works if token local exists + RD allows CORS)
    if (!token) throw proxyErr || new Error('RD ' + service + ' indisponível via proxy');
    try {
      const params = new URLSearchParams(qs || '');
      params.set(tokenParam, token);
      const directUrl = baseUrl + rdPath + '?' + params.toString();
      console.log('[RD req] Tentando chamada direta:', service, rdPath);
      const r = await fetch(directUrl, {
        headers: { 'Accept': 'application/json' },
        mode: 'cors'
      });
      if (!r.ok) {
        const errText = await r.text().catch(()=>'');
        throw new Error('HTTP ' + r.status + ': ' + errText.slice(0,120));
      }
      const data = await r.json();
      console.log('[RD req] ✅ Sucesso direto:', service, rdPath);
      return data;
    } catch(e) {
      directErr = e;
      const isCORS = e.message.includes('Failed to fetch') || e.message.includes('NetworkError') || e.message.includes('CORS');
      console.error('[RD req] Chamada direta falhou' + (isCORS ? ' (CORS bloqueado)' : '') + ':', e.message);
    }

    // Both failed — build informative error
    const isCORS = directErr && (directErr.message.includes('Failed to fetch') || directErr.message.includes('NetworkError'));
    const isProxyMissing = proxyErr && (proxyErr.message.includes('Failed to fetch') || proxyErr.message.includes('404'));

    let errMsg = 'RD ' + service + ' indisponível. ';
    if (isCORS && isProxyMissing) {
      errMsg += 'Sr. Performance precisa da ANTHROPIC_API_KEY. Configure em Vercel > Settings > Environment Variables.';
    } else if (isCORS) {
      errMsg += 'CORS bloqueado + Proxy erro: ' + (proxyErr?.message||'').slice(0,80);
    } else {
      errMsg += (proxyErr?.message || directErr?.message || 'Erro desconhecido').slice(0,100);
    }
    throw new Error(errMsg);
  },

  // ── Progress UI ──
  _updateProgress(label, done, total) {
    this._progress = { label, done, total };
    const el = document.getElementById('rd-sync-progress');
    if (el) {
      const pct = total > 0 ? Math.round(done / total * 100) : 0;
      el.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(15,23,42,.04);border-radius:10px;border:1px solid var(--cream3);font-size:12px;color:var(--mid)">'
        + '<div style="width:20px;height:20px;border:2px solid var(--cream3);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0"></div>'
        + '<div style="flex:1"><div style="font-weight:600;color:var(--navy);margin-bottom:3px">' + label + '</div>'
        + '<div style="height:4px;background:var(--cream3);border-radius:99px;overflow:hidden"><div style="height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:99px;width:' + pct + '%;transition:width .3s"></div></div>'
        + '</div><span style="font-weight:700;font-variant-numeric:tabular-nums;color:var(--navy)">' + pct + '%</span></div>';
    }
  },

  // ── Smart paginated fetch with parallel batches ──
  async _fetchPaginated(queryExtra, label, maxPages, filterFn) {
    // Check cache first
    const cacheKey = 'deals_' + queryExtra;
    const cached = this._cache[cacheKey];
    if (cached && (Date.now() - cached.ts < this._cacheTTL)) {
      console.log('[RD cache] Hit para', label, ':', cached.data.length, 'deals');
      this._updateProgress(label + ' (cache)', 1, 1);
      return cached.data;
    }

    let all = [], page = 1, more = true, totalFailed = 0, totalAttempts = 0, lastError = '';
    const BATCH = 4; // 4 páginas em paralelo
    console.log('[RD] Buscando', label, '...');

    while (more && page <= maxPages) {
      const batch = [];
      for (let i = 0; i < BATCH && (page + i) <= maxPages; i++) {
        batch.push(
          this.req('/deals?limit=200' + queryExtra + '&page=' + (page + i))
            .catch(e => { lastError = e.message; return { deals: [], has_more: false, _failed: true }; })
        );
      }

      const results = await Promise.all(batch);
      let anyMore = false, batchAllFailed = true;
      for (let i = 0; i < results.length; i++) {
        totalAttempts++;
        const d = results[i];
        if (d._failed) { totalFailed++; continue; }
        batchAllFailed = false;
        const raw = d.deals || [];
        const deals = filterFn ? raw.filter(filterFn) : raw;
        all = all.concat(deals);
        if (d.has_more && raw.length > 0) anyMore = true;
      }

      // If ALL requests in first batch failed, stop early (API/proxy is down)
      if (page === 1 && batchAllFailed) {
        console.error('[RD] Todas as chamadas do primeiro batch falharam para', label);
        throw new Error(label + ': ' + (lastError || 'Todas as chamadas falharam'));
      }

      page += BATCH;
      more = anyMore;
      this._updateProgress(label + ' (' + all.length + ' encontradas)', Math.min(page, maxPages), maxPages);
    }

    // If ALL attempts failed across all batches
    if (totalAttempts > 0 && totalFailed === totalAttempts) {
      throw new Error(label + ' — nenhuma página carregou: ' + (lastError || 'erro desconhecido'));
    }

    // Save to cache only if we got data
    if (all.length > 0 || totalFailed === 0) {
      this._cache[cacheKey] = { data: all, ts: Date.now() };
    }
    console.log('[RD] Total', label + ':', all.length, '(falhas:', totalFailed + '/' + totalAttempts + ')');
    return all;
  },

  // ── SMART FETCH: ano completo para métricas, ordenado por update ──
  _yearStart() {
    return new Date().getFullYear() + '-01-01';
  },

  async fetchOpenDeals() {
    // Pipeline ativo: todas abertas do ano + ordenadas por atualização recente
    return this._fetchPaginated(
      '&created_at_period=' + this._yearStart() + '&order_by=updated_at&order_type=desc',
      'Pipeline ativo ' + new Date().getFullYear(), 20,
      x => x.win === null || x.win === undefined
    );
  },

  async fetchLeads(page=1, limit=100) {
    try {
      const d = await this.req('/contacts?page=' + page + '&limit=' + limit, 'mkt');
      return d.contacts || d || [];
    } catch(e) {
      console.warn('[RD Marketing leads]', e.message);
      return [];
    }
  },

  async fetchWonDeals() {
    // Vendas ganhas: ano inteiro para métricas anuais/semestrais/trimestrais/mensais
    return this._fetchPaginated(
      '&win=true&created_at_period=' + this._yearStart() + '&order_by=updated_at&order_type=desc',
      'Vendas ' + new Date().getFullYear(), 15, null
    );
  },

  async fetchLostDeals() {
    // Perdidas: ano inteiro para análise de motivos e taxa de conversão
    return this._fetchPaginated(
      '&win=false&created_at_period=' + this._yearStart() + '&order_by=updated_at&order_type=desc',
      'Perdidas ' + new Date().getFullYear(), 15, null
    );
  },

  processDeals(deals, winStatus) {
    // winStatus: 'open' | 'won' | 'lost'
    const processed = [];
    deals.forEach(d => {
      const stageId = d.deal_stage?._id || d.deal_stage?.id || '';
      const stInfo  = this.STAGES[stageId] || null;
      const rdUid   = d.user?._id || d.user?.id || '';
      const bid     = this.rdIdToBid(rdUid) || '';
      const broker  = bid ? UM[bid] : null;
      const rdName  = d.user?.name || d.user?.nome || '—';

      // Determine frente from stage mapping or deal pipeline
      let frente = stInfo ? stInfo.frente : 'lancamento';
      // Also check deal_pipeline name for frente detection
      const plName = (d.deal_pipeline?.name || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      if (plName.includes('terceiro')) frente = 'terceiros';
      else if (plName.includes('locac') || plName.includes('aluguel')) frente = 'locacao';
      else if (plName.includes('conquista')) frente = 'conquista';
      else if (plName.includes('map') || plName.includes('assessoria') || plName.includes('lancamento') || plName.includes('psm')) frente = 'lancamento';
      // Conquista override: same pipeline as lançamento, but broker is conquista team
      else if (frente === 'lancamento' && bid) {
        const bUser = USERS_BASE.find(u => u.id === bid);
        if (bUser && bUser.frente === 'conquista') frente = 'conquista';
        else if (bUser && bUser.frente) frente = bUser.frente;
      }

      const cl = (d.contacts?.[0]?.name || d.name || 'Sem nome').slice(0, 42).trim();
      const dnu = d.updated_at ? Math.floor((Date.now() - new Date(d.updated_at)) / 864e5) : 0;
      const source = d.campaign?.name || d.deal_source?.name || d.source?.name || '—';
      const closedAt = d.closed_at || d.win_date || null;

      processed.push({
        id: d._id || d.id,
        cl, bid, bn: broker ? broker.name : rdName,
        fr: frente,
        vgv: d.amount_total || 0,
        st: stageId,          // RD stage ID real — para kanban
        st_psm: stInfo ? stInfo.psm : '',
        st_rd: d.deal_stage?.name || '',
        win: d.win,
        winStatus,            // 'open' | 'won' | 'lost'
        ori: source,
        dnu,
        sla: dnu >= 5 ? 'overdue' : dnu >= 3 ? 'warning' : 'ok',
        crm: Math.min(100, Math.max(20, (d.rating ? d.rating * 15 : 40) + (d.interactions ? Math.min(30, d.interactions * 3) : 0) + (d.last_activity_at ? 15 : 0))),
        rdId: d._id || d.id,
        lostReason: d.deal_lost_reason?.name || null,
        closedAt,
        updated_at: d.updated_at || '',
        createdAt: d.created_at || '',
      });
    });
    return processed;
  },

  // Invalidate cache (for force-refresh)
  clearCache() { this._cache = {}; },

  async sync(showToast = true, forceRefresh = false) {
    if (this.syncing) return;
    if (forceRefresh) this.clearCache();
    this.syncing = true; S.rdSyncing = true; S.rdSyncError = ''; render();
    if (showToast) toast('Sincronizando RD Station...', '');
    const t0 = Date.now();

    try {
      // Fetch all 3 types in parallel with progress
      console.log('[RD sync] Iniciando sync completo...');
      this._updateProgress('Conectando ao RD Station...', 0, 4);

      // ── STEP 1: Fetch users and pipelines from RD CRM ──
      this._updateProgress('Carregando equipe e pipelines...', 0, 4);
      try {
        const [usersResp, pipelinesResp] = await Promise.all([
          this.req('/users').catch(e => { console.warn('[RD] Users fetch failed:', e.message); return []; }),
          this.req('/deal_pipelines').catch(e => { console.warn('[RD] Pipelines fetch failed:', e.message); return { deal_pipelines: [] }; }),
        ]);

        // Update users dynamically
        const rdUsers = Array.isArray(usersResp) ? usersResp : (usersResp.users || []);
        if (rdUsers.length > 0) {
          console.log('[RD sync] Encontrados', rdUsers.length, 'usuários no RD CRM');
          // Map RD pipeline names to frente IDs
          const PIPELINE_FRENTE_MAP = {
            'lancamento': 'lancamento', 'lançamento': 'lancamento',
            'map': 'lancamento', 'assessoria': 'lancamento',
            'conquista': 'conquista',
            'terceiro': 'terceiros', 'terceiros': 'terceiros',
            'locacao': 'locacao', 'locação': 'locacao', 'aluguel': 'locacao',
          };

          // Nomes a excluir do sistema (desativados manualmente)
          const EXCLUDED_NAMES = ['daniela barboza','leire','o2 - leire','o2 leire','02 - leire','o3 - mariane','o3 mariane','03 - mariane','mariane'];
          const activeRdUsers = rdUsers.filter(u => {
            if (u.active === false) return false;
            const name = (u.name || '').toLowerCase().trim();
            return !EXCLUDED_NAMES.some(ex => name.includes(ex));
          });
          // Merge with existing USERS_BASE — keep existing data, add new ones
          activeRdUsers.forEach(rdu => {
            const rdId = rdu._id || rdu.id;
            const existing = USERS_BASE.find(u => u.rdId === rdId) || USERS_BASE.find(u => u.name.toLowerCase() === (rdu.name||'').toLowerCase() && !u.rdId);
            if (existing && !existing.rdId) {
              // Match by name — update rdId for future syncs
              existing.rdId = rdId;
              console.log('[RD sync] Linked', existing.name, 'to rdId', rdId);
            } else if (!existing) {
              // New user from RD — add them
              const nameParts = (rdu.name || '').split(' ');
              const ini = nameParts.length >= 2
                ? (nameParts[0][0] + nameParts[nameParts.length-1][0]).toUpperCase()
                : (rdu.nickname || rdu.name || 'XX').slice(0,2).toUpperCase();
              const colors = ['#0f172a','#1e293b','#0d9488','#7c3aed','#dc2626','#0891b2','#16a34a','#a21caf','#9333ea','#15803d'];
              const color = colors[Math.abs(rdId.charCodeAt(rdId.length-1)) % colors.length];

              USERS_BASE.push({
                id: rdId.slice(-8),
                name: rdu.name || rdu.nickname || 'Sem Nome',
                ini, color,
                role: 'corretor',
                frente: 'lancamento', // default, will be overridden by deal pipeline
                email: rdu.email || '',
                rdId,
                st: 'online',
                meta: 800000, crm: 70,
                _fromRD: true,
              });
              console.log('[RD sync] Novo corretor adicionado:', rdu.name, rdId);
            } else {
              // Update name if changed
              if (rdu.name && rdu.name !== existing.name) {
                existing.name = rdu.name;
              }
            }
          });

          // Remove users that are no longer active in RD (except socios/gerentes)
          const activeRdIds = new Set(activeRdUsers.map(u => u._id || u.id));
          USERS_BASE.forEach(u => {
            if (u.rdId && !activeRdIds.has(u.rdId) && u.role === 'corretor' && u._fromRD) {
              u._inactive = true;
              console.log('[RD sync] Corretor desativado:', u.name);
            }
          });

          // Rebuild USERS/BROKERS/UM
          USERS = buildUsers().filter(u => !u._inactive);
          UM = Object.fromEntries(USERS.map(u => [u.id, u]));
          BROKERS = USERS.filter(u => ['corretor','lider'].includes(u.role));
        }

        // Update pipelines/stages dynamically
        const pipelines = pipelinesResp.deal_pipelines || pipelinesResp || [];
        if (Array.isArray(pipelines) && pipelines.length > 0) {
          console.log('[RD sync] Encontrados', pipelines.length, 'pipelines');
          // Update RD.STAGES with real stage IDs from pipelines
          pipelines.forEach(pl => {
            const plName = (pl.name || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            let frente = 'lancamento';
            if (plName.includes('terceiro')) frente = 'terceiros';
            else if (plName.includes('locac') || plName.includes('aluguel')) frente = 'locacao';
            else if (plName.includes('conquista')) frente = 'conquista';
            else if (plName.includes('map') || plName.includes('assessoria') || plName.includes('lancamento') || plName.includes('psm')) frente = 'lancamento';

            const stages = pl.deal_stages || [];
            stages.forEach((st, idx) => {
              const stId = st._id || st.id;
              if (!RD.STAGES[stId]) {
                // Map stage position to PSM stage names
                const pct = stages.length > 1 ? idx / (stages.length - 1) : 0.5;
                let psm = 'tent_contato';
                if (pct < 0.1) psm = 'carteira';
                else if (pct < 0.2) psm = 'novo_atend';
                else if (pct < 0.3) psm = 'tent_contato';
                else if (pct < 0.4) psm = 'contato_4p';
                else if (pct < 0.5) psm = 'agendamento';
                else if (pct < 0.6) psm = 'vis_agend';
                else if (pct < 0.7) psm = 'vis_real';
                else if (pct < 0.8) psm = 'quente';
                else if (pct < 0.9) psm = 'proposta';
                else psm = 'contrato';

                RD.STAGES[stId] = { frente, psm, w: Math.round(pct * 100) / 100 };
                console.log('[RD sync] Nova etapa mapeada:', st.name, '→', frente + '/' + psm);
              }
            });
          });
        }
      } catch(e) {
        console.warn('[RD sync] Erro ao buscar users/pipelines (continuando com dados locais):', e.message);
      }

      this._updateProgress('Buscando negociações...', 1, 4);
      const [openDeals, wonDeals, lostDeals] = await Promise.all([
        this.fetchOpenDeals(),
        this.fetchWonDeals(),
        this.fetchLostDeals(),
      ]);
      console.log('[RD sync] Fetch completo em', Date.now()-t0, 'ms:',
        'open='+openDeals.length, 'won='+wonDeals.length, 'lost='+lostDeals.length);

      // Reset arrays
      // ── Track previous vendas for new sale detection ──
      const prevVendasIds = new Set(VENDAS.map(v => v.rdId || v.id));
      const prevVendasCount = VENDAS.length;

      OPPS.splice(0);
      VENDAS.splice(0);
      LOST_DEALS.splice(0);

      // Process and populate
      const openProc  = this.processDeals(openDeals,  'open');
      const wonProc   = this.processDeals(wonDeals,   'won');
      const lostProc  = this.processDeals(lostDeals,  'lost');

      openProc.forEach(o => OPPS.push(o));
      wonProc.forEach(o  => VENDAS.push(o));
      lostProc.forEach(o => LOST_DEALS.push(o));

      // ── Detect NEW sales since last sync ──
      if (prevVendasCount > 0) {
        const newSales = VENDAS.filter(v => !prevVendasIds.has(v.rdId || v.id));
        newSales.forEach(sale => {
          const broker = (UM[sale.bid] || {}).name || sale.bn || 'Corretor';
          sendNotif(
            '🏆 VENDA FECHADA!',
            broker + ' fechou ' + (sale.cl||'negócio') + ' — ' + fmt(sale.vgv||0) + ' (' + (sale.ori||'—') + ')',
            '🏆'
          );
          // Add to NOTIFS for in-app display
          NOTIFS.unshift({tipo:'ok', title:'🏆 Venda: '+(sale.cl||'—'), msg:broker+' — '+fmt(sale.vgv||0)+' ('+( sale.ori||'—')+')', page:'ranking', read:false, ts:Date.now(),
            whatsapp:'https://wa.me/?text='+encodeURIComponent('🏆 *VENDA FECHADA!*\n\nCorretor: '+broker+'\nCliente: '+(sale.cl||'—')+'\nVGV: '+fmt(sale.vgv||0)+'\nOrigem: '+(sale.ori||'—')+'\n\n_PSM Assessoria Imobiliária_')
          });
        });
        if (newSales.length > 0) {
          // Trigger War Room celebration event
          window._lastSale = newSales[0];
          window._lastSaleTs = Date.now();
        }
      }

      recalcMonthly();
      OKRS.splice(0); calcOKRs().forEach(o=>OKRS.push(o));

      // ── Compute broker metrics ──
      BROKERS.forEach(b => {
        const opps = OPPS.filter(o => o.bid === b.id);
        const won  = VENDAS.filter(v => v.bid === b.id);
        const lost = LOST_DEALS.filter(l => l.bid === b.id);

        b.vgv      = opps.reduce((a, o) => a + o.vgv, 0);
        b.vgv_real = won.reduce((a, v)  => a + v.vgv, 0);
        b.vendas   = won.length;
        b.descartados = lost.length;
        // ITEM 3: Visitas = RD CRM + One on One
        const rdVis  = opps.filter(o => ['vis_real','contrato','proposta'].includes(o.st_psm)).length;
        const ooLogs = (S.ooLogs || {})[b.id] || [];
        const ooVis  = ooLogs.reduce((acc, lg) => acc + (lg.vis || 0), 0);
        b.vis      = rdVis + ooVis;
        b.vis_rd   = rdVis;
        b.vis_oo   = ooVis;
        b.agend    = opps.filter(o => ['agendamento','vis_agend','vis_real'].includes(o.st_psm)).length;
        b.prop     = opps.filter(o => o.st_psm === 'proposta').length;
        b.lig      = opps.length;

        // Ticket médio
        b.ticketMedio = won.length > 0 ? Math.round(b.vgv_real / won.length) : 0;

        // Ciclo de venda (dias médio entre criação e fechamento)
        const ciclos = won.filter(v => v.closedAt && v.createdAt).map(v =>
          Math.max(1, Math.round((new Date(v.closedAt) - new Date(v.createdAt)) / 864e5))
        );
        b.cicloVenda = ciclos.length > 0 ? Math.round(ciclos.reduce((a,c) => a+c,0) / ciclos.length) : 0;

        // Motivos de perda
        b.motivosPerda = {};
        lost.forEach(l => {
          const m = l.lostReason || 'Sem motivo';
          b.motivosPerda[m] = (b.motivosPerda[m] || 0) + 1;
        });

        // CRM score
        const scores = opps.map(o => o.crm);
        b.crm = scores.length ? Math.round(scores.reduce((a,s) => a+s,0) / scores.length) : 60;

        // Taxa de conversão por etapa (won / (won + lost + ativas em cada etapa))
        b.conversionRate = (won.length + lost.length) > 0
          ? Math.round(won.length / (won.length + lost.length) * 100) : 0;

        // Volume de atendimento
        b.volumeLeads = opps.length + won.length + lost.length;
      });

      // ── Métricas globais ──
      const allWon  = VENDAS;
      const allLost = LOST_DEALS;
      S.wonTotal    = allWon.length;
      S.lostTotal   = allLost.length;
      S.vgvReal     = allWon.reduce((a, v) => a + v.vgv, 0);
      S.ticketMedioGeral = allWon.length > 0 ? Math.round(S.vgvReal / allWon.length) : 0;
      METRICS.pipeline = OPPS.reduce((a, o) => a + o.vgv, 0);
      METRICS.leads    = OPPS.length;

      // Taxa de conversão por origem
      S.convBySource = {};
      [...allWon, ...allLost, ...OPPS].forEach(d => {
        const src = d.ori || '—';
        if (!S.convBySource[src]) S.convBySource[src] = {won:0, lost:0, open:0};
        if (d.winStatus === 'won')  S.convBySource[src].won++;
        else if (d.winStatus === 'lost') S.convBySource[src].lost++;
        else S.convBySource[src].open++;
      });

      // Motivos de perda globais
      const allLossMap = {};
      allLost.forEach(l => {
        const m = l.lostReason || 'Sem motivo';
        allLossMap[m] = (allLossMap[m] || 0) + 1;
      });
      S.lossReasons = Object.entries(allLossMap).sort((a,b) => b[1]-a[1]).slice(0, 12);

      // Ciclo geral
      const allCiclos = allWon.filter(v => v.closedAt && v.createdAt).map(v =>
        Math.max(1, Math.round((new Date(v.closedAt) - new Date(v.createdAt)) / 864e5))
      );
      S.cicloGeral = allCiclos.length ? Math.round(allCiclos.reduce((a,c)=>a+c,0)/allCiclos.length) : 0;

      this.lastSync = new Date();
      S.rdSyncStatus = 'ok';
      S.rdDealCount  = OPPS.length;
      S.rdSyncError  = '';
      // Sync METRICS with RD data
      METRICS.vgv_real  = S.vgvReal || 0;
      METRICS.vend_real = S.wonTotal || 0;
      METRICS.vis_real  = BROKERS.reduce((a,b) => a + (b.vis||0), 0);

      this._updateProgress('Processando dados...', 4, 4);

      const elapsed = ((Date.now()-t0)/1000).toFixed(1);
      console.log('[RD sync] ✅ Concluído em', elapsed+'s');
      console.log('[RD sync] Pipeline:', fmt(METRICS.pipeline), '|', OPPS.length, 'negociações');
      console.log('[RD sync] VGV Real:', fmt(S.vgvReal), '|', allWon.length, 'vendas');
      console.log('[RD sync] Perdidos:', allLost.length, '| Motivos:', S.lossReasons?.slice(0,3).map(([m,c])=>m+'('+c+')').join(', '));

      // Clear progress after a short delay
      setTimeout(() => {
        const el = document.getElementById('rd-sync-progress');
        if (el) el.innerHTML = '';
      }, 1500);

      if (showToast) {
        if (OPPS.length === 0 && allWon.length === 0 && allLost.length === 0) {
          toast('⚠️ RD respondeu sem negociações. Verifique o token nos Conectores', 'warn');
        } else {
          toast('✅ ' + OPPS.length + ' abertas · ' + allWon.length + ' ganhas · ' + allLost.length + ' perdidas (' + elapsed + 's)', 'ok');
        }
      }

    } catch(err) {
      S.rdSyncStatus = 'error';
      S.rdSyncError = err.message;
      console.error('[RD sync] ❌ Erro:', err);

      // Clear progress and show error
      const progressEl = document.getElementById('rd-sync-progress');
      if (progressEl) {

    + '</div>'

      + '<span style="color:var(--muted);font-size:11px">até</span>'
      + '<input type="date" class="df-inp" value="'+(df.to||'')+'" onchange="setDFDate(\''+prefix+'\',\'to\',this.value)">'
      + '</div>':'')
    + '</div>';
}
function setDF(prefix, preset)     { S['df_'+prefix] = {preset}; render(); }
function setDFDate(prefix,field,v) { const df=S['df_'+prefix]||{preset:'Custom'}; df[field]=v; df.preset='Custom'; S['df_'+prefix]=df; render(); }

// Universal date filter for deals based on DateFilter selection
function applyDateFilter(deals, prefix) {
  const df = S['df_'+prefix] || {preset:'Ano'};
  const now = new Date();
  let from, to;

  if (df.preset === 'Custom') {
    from = df.from ? new Date(df.from) : new Date(now.getFullYear(), 0, 1);
    to = df.to ? new Date(df.to + 'T23:59:59') : now;
  } else if (df.preset === 'Ano') {
    from = new Date(now.getFullYear(), 0, 1);
    to = now;
  } else {
    const days = parseInt(df.preset) || 30;
    from = new Date(now.getTime() - days * 86400000);
    to = now;
  }

  return deals.filter(d => {
    const dt = new Date(d.createdAt || d.updated_at || d.closedAt || '');
    return !isNaN(dt.getTime()) && dt >= from && dt <= to;
  });
}

// Simple sync hash for password comparison (not bcrypt-level but much better than plaintext)
function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) - h + str.charCodeAt(i)) | 0; }
  return 'h' + Math.abs(h).toString(36);
}

  const entry = _LOCAL_AUTH[email];

async function doLogin() {
  const email = (document.getElementById('le')?.value||'').trim().toLowerCase();
  const senha = (document.getElementById('lp')?.value||'').trim();
  if (!email || !senha) { S.loginErr='Preencha e-mail e senha'; S.loginLoading = false; render(); return; }

  S.loginLoading = true; render();

  let uid = null;

  if (_IS_LOCAL) {
    // Fallback local para dev
    uid = _localLogin(email, senha);
    if (!uid) {
      S.loginErr = 'E-mail ou senha incorretos';
      S.loginLoading = false; render(); return;
    }
  } else {
    // Produção: autenticação server-side
    try {
      const resp = await fetch('/api/auth', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({action:'login', email, senha})
      });
      const data = await resp.json();

      if (!resp.ok || data.error) {
        S.loginErr = data.error || 'Erro ao fazer login';
        S.loginLoading = false; render(); return;
      }

      localStorage.setItem('psm_token', data.token);
      uid = data.uid;
    } catch(e) {
      // Se fetch falhar (ex: offline ou sem server), tenta fallback local
      uid = _localLogin(email, senha);
      if (!uid) {
        S.loginErr = 'Sem conexão e credenciais não reconhecidas';
        S.loginLoading = false; render(); return;
      }
    }
  }

  const user = USERS_BASE.find(u => u.id === uid);
  if (!user) { S.loginErr = 'Usuário não encontrado'; S.loginLoading = false; render(); return; }

  S.user = {...UM[user.id], ...user};
  const lvl = RLVL[S.user.role] || 0;
  S.page = lvl >= 5 ? 'dashboard' : 'meu';
  S.loginErr = null;
  S.loginLoading = false;
  toast('Bem-vindo, ' + S.user.name.split(' ')[0] + '! 👋', 'ok');
  render();
  // Faz sync do RD com tokens armazenados no navegador
  setTimeout(() => { RD.sync(true).then(() => RD.startAutoSync()); }, 200);
  if (!S.veraHist?.length) {
    S.veraHist = [{role:'assistant', content:'Olá, ' + S.user.name.split(' ')[0] + '! Sou o Sr. Performance, seu mentor de alta performance. Estou aqui para estratégia, objeções, cadências, feedbacks e o que mais precisar. Como posso te ajudar?'}];
  }
  scheduleVeraNotifs();
}
function doLogout() {
  S.user=null; S.page=undefined; S.veraHist=[];
  localStorage.removeItem('psm_token');
  render();
}

function FunnelChart(steps) {
  const mx = Math.max(...steps.map(s=>s.val),1);
  return steps.map((s,i)=>{
    const pct=Math.round(s.val/mx*100);
    const prev=i>0?steps[i-1].val:s.val;
    const conv=prev>0?Math.round(s.val/prev*100):100;
    return '<div style="margin-bottom:10px">'      +'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">'      +'<span style="font-weight:700;color:var(--navy)">'+s.lbl+'</span>'      +'<span style="font-weight:800;color:'+s.c+'">'+s.val+(i>0?' ('+conv+'% conv.)':'')+' </span>'      +'</div>'      +'<div style="background:var(--cream3);border-radius:6px;overflow:hidden;height:30px">'      +'<div style="width:'+pct+'%;min-width:30px;background:'+s.c+';height:100%;display:flex;align-items:center;padding:0 8px;transition:width .5s">'      +'<span style="color:#fff;font-size:10px;font-weight:700">'+s.val+'</span></div></div>';  }).join('');}

    content='<div class="kgrid mb2">'      +Kpi('🎯 Meta VGV',fmt(vgvMeta),'meta do período',null,'var(--navy)')      +Kpi('✅ Realizado',fmt(vgvReal),pctVGV+'% da meta',{up:pctVGV>=100,txt:pctVGV+'%'},pctVGV>=100?'var(--g)':pctVGV>=70?'var(--a)':'var(--r)')      +Kpi('📈 Projetado',fmt(vgvProj),'se manter ritmo',{up:pctProj>=100,txt:pctProj+'% da meta'},pctProj>=100?'var(--g)':'var(--a)')      +Kpi('📅 Mês',diaAtual+'/'+diasMes+' dias',Math.round(percMes*100)+'%',null,'var(--b)')      +'</div>'      +'<div class="card mb2" style="padding:18px"><div class="ctitle" style="margin-bottom:14px">VGV — Meta × Realizado × Projetado</div>'      +FunnelChart([{lbl:'Meta',val:vgvMeta,c:'#0f172a'},{lbl:'Projetado',val:vgvProj,c:'#d97706'},{lbl:'Realizado',val:vgvReal,c:'#15803d'}])      +'</div>'      +'<div class="card"><div class="ctitle">Por Corretor</div>'      +'<div style="display:flex;flex-direction:column;gap:10px;margin-top:10px">'      +bMVR.map(({b,bM,bR,bP,pct})=>        '<div style="background:var(--cream2);border-radius:8px;padding:10px">'        +'<div style="display:flex;justify-content:space-between;margin-bottom:6px">'        +'<span style="font-size:12px;font-weight:700">'+b.name.split(' ')[0]+'</span>'        +'<span style="font-size:12px;font-weight:800;color:'+(pct>=100?'var(--g-tx)':pct>=70?'var(--a-tx)':'var(--r-tx)')+'">'+pct+'%</span></div>'        +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:10px;margin-bottom:6px">'        +'<div><div style="color:var(--muted)">Meta</div><div style="font-weight:700">'+fmt(bM)+'</div></div>'        +'<div><div style="color:var(--muted)">Realizado</div><div style="font-weight:700;color:var(--g-tx)">'+fmt(bR)+'</div></div>'        +'<div><div style="color:var(--muted)">Projetado</div><div style="font-weight:700;color:'+(bP>=bM?'var(--g-tx)':'var(--a-tx)')+'">'+fmt(bP)+'</div></div>'        +'</div>'        +PB(bR,bM||1,pct>=100?'#16a34a':pct>=70?'#d97706':'#dc2626')        +'</div>')        .join('')      +'</div></div>';  }

    return '<div class="phd"><h1>Métricas Avançadas</h1><p>Dados em tempo real do RD Station CRM</p></div>'
    + (canFilter ? '<div style="margin-bottom:14px"><select class="sel-f" onchange="S.metBroker=this.value;render()">'
      + '<option value="all">Todos Corretores</option>'
      + brokers.map(b => '<option value="'+b.id+'"'+(cb===b.id?' selected':'')+'>'+b.name+'</option>').join('')
      + '</select></div>' : '')
    + tabBar + content;
}

// ─── KANBAN HELPER ────────────────────────────────────────────────────────────
function renderKanban(bid, frente) {
  const opps  = bid ? OPPS.filter(o => o.bid===bid) : OPPS.filter(o => o.fr===frente);
  const stages = FUNIS[frente] || FUNIS.lancamento;
  if (opps.length === 0) {
    return '<div class="card"><div style="text-align:center;padding:30px;color:var(--muted);font-size:12px">'
      + 'Nenhuma negociação ativa. Aguarde o sync do RD Station.<br><small style="font-size:10px">Status: '+(S.rdSyncStatus||'aguardando')+'</small></div></div>';
  }
  return '<div class="card"><div class="ctitle">Funil — ' + opps.length + ' negociações</div>'
    + '<div style="overflow-x:auto"><div style="display:flex;gap:8px;min-width:max-content;padding:4px 2px">'
    + stages.map(s => {
        const co = opps.filter(o => s.rdIds && s.rdIds.length ? s.rdIds.includes(o.st) : o.st_psm===s.id);
        return '<div style="width:160px;flex-shrink:0">'
          + '<div style="background:'+s.color+'18;border-top:3px solid '+s.color+';border-radius:8px 8px 0 0;padding:7px 9px">'
          + '<div style="font-size:9.5px;font-weight:800;color:'+s.color+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+s.label+'</div>'
          + '<span style="background:'+s.color+';color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:8px">'+co.length+'</span>'
          + '</div>'
          + '<div style="background:var(--cream2);border:1px solid var(--cream3);border-top:none;border-radius:0 0 8px 8px;min-height:60px;padding:4px;display:flex;flex-direction:column;gap:3px">'
          + (co.length===0 ? '<div style="text-align:center;padding:12px 0;font-size:10px;color:var(--muted)">—</div>'
            : co.slice(0,8).map(o => '<div style="background:#fff;border:1px solid var(--cream3);border-radius:6px;padding:6px 8px;">'
              + '<div style="font-size:10.5px;font-weight:600;color:var(--navy)">'+o.cl.slice(0,18)+'</div>'
              + (o.vgv ? '<div style="font-size:10px;color:var(--muted)">'+fmt(o.vgv)+'</div>' : '')
              + '</div>').join('')
            + (co.length>8 ? '<div style="text-align:center;font-size:9px;color:var(--muted)">+'+(co.length-8)+' mais</div>' : ''))
          + '</div></div>';
      }).join('')
    + '</div></div></div>';
}

// ─── OKRs & METAS ─────────────────────────────────────────────────────────────
function pgOKRs() {
  const u = S.user; const lvl = RLVL[u?.role]||0;
  const df = DateFilter('okrs','Período');
  const tab = S.okrTab || 'okrs';
  const tabs = [{id:'okrs',lbl:'OKRs'},{id:'metas',lbl:'Metas vs Realizado'},{id:'proj',lbl:'Projeções'}];
  const stC = {on_track:'var(--g)',at_risk:'var(--a)',off_track:'var(--r)',completed:'var(--b)'};
  const stL = {on_track:'No Caminho',at_risk:'Em Risco',off_track:'Fora da Meta',completed:'Concluído'};

  const tabBar = '<div style="display:flex;gap:4px;margin-bottom:16px">'
    + tabs.map(t => '<button class="btn bsm'+(tab===t.id?' bp1':' bout')+'" onclick="S.okrTab=\''+t.id+'\';render()">'+t.lbl+'</button>').join('')
    + '</div>';

  const metaVGV = METRICS.vgv_meta || 8000000;
  const realVGV = S.vgvReal || 0;
  const pctG    = metaVGV > 0 ? Math.round(realVGV/metaVGV*100) : 0;

  let content = '';

  if (tab === 'okrs') {
    content = '<div class="kgrid mb2">'
      + Kpi('Objectives', OKRS.length,'ativos',null,'var(--navy)')
      + Kpi('No Caminho', OKRS.flatMap(o=>o.krs).filter(k=>k.status==='on_track').length,'KRs',null,'var(--g)')
      + Kpi('Em Risco',   OKRS.flatMap(o=>o.krs).filter(k=>k.status==='at_risk').length,'KRs',null,'var(--a)')
      + Kpi('VGV Realizado', fmt(realVGV), pctG+'% da meta',null, pctG>=100?'var(--g)':pctG>=70?'var(--a)':'var(--r)')
      + '</div>'
      + OKRS.map(okr => '<div class="card mb2">'
        + '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px">'
        + '<div><div style="font-size:14px;font-weight:800;color:var(--navy)">'+okr.obj+'</div>'
        + '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+okr.ciclo+'</div></div>'
        + '<span style="flex-shrink:0;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;background:'+stC[okr.status]+'18;color:'+stC[okr.status]+'">'+stL[okr.status]+'</span>'
        + '</div>'
        + okr.krs.map(kr => '<div style="margin-bottom:10px;padding:10px;background:var(--cream2);border-radius:8px">'
          + '<div style="display:flex;justify-content:space-between;margin-bottom:5px">'
          + '<span style="font-size:12px;font-weight:600;color:var(--navy)">'+kr.label+'</span>'
          + '<span style="font-size:11px;font-weight:700;color:'+stC[kr.status]+'">'+kr.pct+'%</span>'
          + '</div>'
          + PB(kr.curr, kr.target, '#3b82f6')
          + '<div style="display:flex;justify-content:space-between;margin-top:3px">'
          + '<span style="font-size:10px;color:var(--muted)">'+kr.curr+' '+kr.unit+'</span>'
          + '<span style="font-size:10px;color:var(--muted)">meta: '+kr.target+' '+kr.unit+'</span>'
          + '</div></div>').join('')
        + '</div>').join('');
  }

  else if (tab === 'metas') {
    // Metas vs Realizado por corretor + equipe + geral
    const periods = [{id:'mes',lbl:'Mês Atual'},{id:'tri',lbl:'Trimestre'},{id:'sem',lbl:'Semestre'},{id:'ano',lbl:'Anual'}];
    const pp = S.metasPeriod || 'mes';
    const periodBar = '<div style="display:flex;gap:4px;margin-bottom:14px">'
      + periods.map(p => '<button class="btn bsm'+(pp===p.id?' bp1':' bout')+'" onclick="S.metasPeriod=\''+p.id+'\';render()">'+p.lbl+'</button>').join('')
      + '</div>';

    const factor = {mes:1, tri:3, sem:6, ano:12}[pp] || 1;

    // Edição de metas (somente sócios/gestores)
    const canEdit = lvl >= 5;

    content = periodBar
      + '<div class="card mb2"><div class="ctitle">Meta Global — '+METRICS.mes+'</div>'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
      + '<div><div style="font-size:24px;font-weight:900;color:var(--navy)">'+fmt(realVGV)+'</div>'
      + '<div style="font-size:11px;color:var(--muted)">realizado</div></div>'
      + '<div style="text-align:right"><div style="font-size:24px;font-weight:900;color:'+(pctG>=100?'var(--g-tx)':pctG>=70?'var(--a-tx)':'var(--r-tx)')+'">'+pctG+'%</div>'
      + '<div style="font-size:11px;color:var(--muted)">meta: '+fmt(metaVGV*factor)+'</div></div>'
      + '</div>'
      + PB(realVGV, metaVGV*factor, pctG>=100?'#16a34a':pctG>=70?'#d97706':'#dc2626')
      + '</div>'
      + '<div class="card"><div class="ctitle">Metas Individuais vs Realizado'+(canEdit?' &nbsp;<button class="btn bout bsm" onclick="S.editingMetas=!S.editingMetas;render()">✏️ Editar</button>':'')+'</div>'
      + '<div style="display:flex;flex-direction:column;gap:10px">'
      + BROKERS.map(b => {
          const mc = METAS_CONFIG[b.id] || {};
          const metaB = (mc.vgv_meta || b.meta || 0) * factor;
          const realB = b.vgv_real || 0;
          const pctB  = metaB > 0 ? Math.round(realB/metaB*100) : 0;
          const disc  = DISC_PROFILES[b.id];
          return '<div style="background:var(--cream2);border-radius:10px;padding:12px">'
            + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
            + '<div style="display:flex;align-items:center;gap:8px">'+Av(b,'xs')
            + '<span style="font-size:12px;font-weight:700">'+b.name.split(' ')[0]+'</span>'
            + (disc ? '<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:'+disc.cor+'22;color:'+disc.cor+'">'+disc.perfil+'</span>' : '')
            + '</div>'
            + '<span style="font-size:12px;font-weight:800;color:'+(pctB>=100?'var(--g-tx)':pctB>=70?'var(--a-tx)':'var(--r-tx)')+'">'+pctB+'%</span>'
            + '</div>'
            + (S.editingMetas && canEdit ? '<div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">'
              + '<div><label style="font-size:9px;color:var(--muted)">VGV Mín</label><input class="finp" type="number" style="width:90px;padding:5px" placeholder="0" value="'+(mc.vgv_min||0)+'" oninput="METAS_CONFIG[\''+b.id+'\']=METAS_CONFIG[\''+b.id+'\'||{};METAS_CONFIG[\''+b.id+'\'].vgv_min=+this.value"></div>'
              + '<div><label style="font-size:9px;color:var(--muted)">VGV Meta</label><input class="finp" type="number" style="width:100px;padding:5px" placeholder="0" value="'+(mc.vgv_meta||b.meta||0)+'" oninput="METAS_CONFIG[\''+b.id+'\']=METAS_CONFIG[\''+b.id+'\'||{};METAS_CONFIG[\''+b.id+'\'].vgv_meta=+this.value;render()"></div>'
              + '<div><label style="font-size:9px;color:var(--muted)">Visitas</label><input class="finp" type="number" style="width:70px;padding:5px" placeholder="0" value="'+(mc.visitas||0)+'" oninput="METAS_CONFIG[\''+b.id+'\']=METAS_CONFIG[\''+b.id+'\'||{};METAS_CONFIG[\''+b.id+'\'].visitas=+this.value"></div>'
              + '<div><label style="font-size:9px;color:var(--muted)">Captações</label><input class="finp" type="number" style="width:80px;padding:5px" placeholder="0" value="'+(mc.captacoes||0)+'" oninput="METAS_CONFIG[\''+b.id+'\']=METAS_CONFIG[\''+b.id+'\'||{};METAS_CONFIG[\''+b.id+'\'].captacoes=+this.value"></div>'
              + '</div>' : '')
            + PB(realB, metaB||1, pctB>=100?'#16a34a':pctB>=70?'#d97706':'#dc2626')
            + '<div style="display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--muted)">'
            + '<span>'+fmt(realB)+' realizado</span><span>meta: '+fmt(metaB)+'</span></div>'
            + '</div>';
        }).join('')
      + '</div></div>';
  }

  else if (tab === 'proj') {
    // Projeção anual
    const du_pass = METRICS.du_pass || 1;
    const du_tot  = METRICS.du_tot  || 22;
    const projecaoMes    = du_pass > 0 ? Math.round(realVGV / du_pass * du_tot) : 0;
    const projecaoAno    = du_pass > 0 ? Math.round(realVGV / du_pass * (du_tot * 12)) : 0;
    const projecaoTri    = du_pass > 0 ? Math.round(realVGV / du_pass * (du_tot * 3)) : 0;

    content = '<div class="kgrid mb2">'
      + Kpi('Projeção do Mês',fmt(projecaoMes),'baseado no ritmo atual',null,projecaoMes>=metaVGV?'var(--g)':'var(--a)')
      + Kpi('Projeção Trimestral',fmt(projecaoTri),'extrapolação 3 meses',null,'var(--b)')
      + Kpi('Projeção Anual',fmt(projecaoAno),'extrapolação 12 meses',null,'var(--navy)')
      + Kpi('Ritmo Diário',fmt(Math.round(realVGV/du_pass)),'VGV/dia útil',null,'var(--gold)')
      + '</div>'
      + '<div class="card mb2"><div class="ctitle">Projeção por Corretor (mês)</div>'
      + '<div style="display:flex;flex-direction:column;gap:8px">'
      + BROKERS.map(b => {
          const metaB = (METAS_CONFIG[b.id]?.vgv_meta || b.meta || 0);
          const realB = b.vgv_real || 0;
          const proj  = du_pass > 0 ? Math.round(realB / du_pass * du_tot) : 0;
          const pctP  = metaB > 0 ? Math.round(proj/metaB*100) : 0;
          return '<div style="display:flex;align-items:center;gap:10px">'
            + Av(b,'xs') + '<div style="flex:1">'
            + '<div style="display:flex;justify-content:space-between;margin-bottom:3px">'
            + '<span style="font-size:11px;font-weight:600">'+b.name.split(' ')[0]+'</span>'
            + '<span style="font-size:11px;font-weight:800;color:'+(pctP>=100?'var(--g-tx)':pctP>=70?'var(--a-tx)':'var(--r-tx)')+'">'+fmt(proj)+' ('+pctP+'%)</span>'
            + '</div>' + PB(proj, metaB||1, pctP>=100?'#16a34a':pctP>=70?'#d97706':'#dc2626')
            + '</div></div>';
        }).join('')
      + '</div></div>';
  }

  return df + '<div class="phd"><h1>OKRs & Metas</h1><p>'+METRICS.mes+'</p></div>'
    + tabBar + content;
}

// Cache de arquivos do Drive
let _driveCache = {};
let _driveCacheTTL = 5 * 60 * 1000; // 5 min

async function fetchDriveFiles(folderId) {
  folderId = folderId || GDRIVE_ROOT_ID;
  const cacheKey = 'gd_' + folderId;
  const cached = _driveCache[cacheKey];
  if (cached && Date.now() - cached.ts < _driveCacheTTL) return cached.data;

  const url = 'https://www.googleapis.com/drive/v3/files'
    + '?q=' + encodeURIComponent("'" + folderId + "' in parents and trashed=false")
    + '&key=' + GDRIVE_API_KEY
    + '&fields=' + encodeURIComponent('files(id,name,mimeType,size,modifiedTime,iconLink,thumbnailLink,webViewLink,webContentLink)')
    + '&orderBy=folder,name'
    + '&pageSize=100';

  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const files = data.files || [];
    _driveCache[cacheKey] = { data: files, ts: Date.now() };
    return files;
  } catch(e) {
    console.error('[Drive]', e.message);
    toast('Erro ao carregar Drive: ' + e.message, 'err');
    return [];
  }
}

function driveFileIcon(mime) {
  if (!mime) return '📄';
  if (mime.includes('folder')) return '📁';
  if (mime.includes('spreadsheet') || mime.includes('excel')) return '📊';
  if (mime.includes('document') || mime.includes('word')) return '📝';
  if (mime.includes('presentation') || mime.includes('powerpoint')) return '📰';
  if (mime.includes('pdf')) return '📕';
  if (mime.includes('image')) return '🖼️';
  if (mime.includes('video')) return '🎬';
  if (mime.includes('audio')) return '🎵';
  if (mime.includes('zip') || mime.includes('rar') || mime.includes('compressed')) return '📦';
  return '📄';
}

function driveFileSize(bytes) {
  if (!bytes) return '';
  const n = parseInt(bytes);
  if (n > 1048576) return (n/1048576).toFixed(1) + ' MB';
  if (n > 1024) return (n/1024).toFixed(0) + ' KB';
  return n + ' B';
}

    '<div class="card" style="padding:16px;text-align:center"><div style="font-size:28px;font-weight:700;color:var(--gold)">' + lanc + '</div><div style="color:var(--muted);font-size:12px">Lancamentos</div></div>' +
    '<div class="card" style="padding:16px;text-align:center"><div style="font-size:28px;font-weight:700;color:var(--b)">' + fPins.length + '</div><div style="color:var(--muted);font-size:12px">No Filtro Atual</div></div>' +
    '</div>';

  var filters =
    '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">' +
    '<button class="btn ' + (S.mapFilter==='all'?'bp1':'bout') + ' bsm" onclick="S.mapFilter=\'all\';render()">Todos</button>' +
    '<button class="btn ' + (S.mapFilter!=='all'&&S.mapFilter!=='Lancamento'?'bp1':'bout') + ' bsm" onclick="S.mapFilter=\'Ativo\';render()">Ativos</button>' +
    '<button class="btn ' + (S.mapFilter==='Lancamento'?'bp1':'bout') + ' bsm" onclick="S.mapFilter=\'Lancamento\';render()">Lancamentos</button>' +
    '<input type="text" class="finp" value="' + (S.mapSearch||'') + '" placeholder="Buscar empreendimento..." oninput="S.mapSearch=this.value;render()" style="flex:1;min-width:200px">' +
    '</div>';

  var mapDiv = '<div id="psm-gmap-wrap" style="width:100%;height:calc(100vh - 340px);min-height:400px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--cream4)"><div id="psm-gmap" style="width:100%;height:100%"></div></div>';

  setTimeout(function(){
    var el = document.getElementById('psm-gmap');
    if (!el) return;

    // Fetch KML from Drive if not cached or stale (>5min)
    var now = Date.now();
    if (!window._kmlPinsCache || !window._kmlLastFetch || (now - window._kmlLastFetch) > 300000) {
      el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted)">Carregando empreendimentos do Google Earth...</div>';
      fetch('https://www.googleapis.com/drive/v3/files/' + KML_FILE_ID + '?alt=media&key=' + GDRIVE_API_KEY)
      .then(function(r){ return r.text(); })
      .then(function(kmlText){
        var parser = new DOMParser();
        var kml = parser.parseFromString(kmlText, 'text/xml');
        var placemarks = kml.querySelectorAll('Placemark');
        var parsed = [];
        placemarks.forEach(function(pm){
          var nameEl = pm.querySelector('name');
          var coordsEl = pm.querySelector('coordinates');
          if (nameEl && coordsEl) {
            var nm = nameEl.textContent.trim();
            if (!nm || nm.indexOf('sem titulo') > -1 || nm.indexOf('sem t\u00edtulo') > -1 || nm.startsWith('Pol') || nm.startsWith('Linha') || nm.startsWith('Medi')) return;
            var c = coordsEl.textContent.trim().split(',');
            if (c.length >= 2) {
              var isLanc = nm.indexOf('LANCAMENTO') > -1 || nm.indexOf('LAN\u00c7AMENTO') > -1 || nm.indexOf('(LAN') > -1;
              parsed.push({ n: nm.replace(/\s*\(LAN.*?\)/, '').trim(), lat: parseFloat(c[1]), lng: parseFloat(c[0]), s: isLanc ? 'Lancamento' : 'Ativo', t: 'Empreendimento' });
            }
          }
        });
        window._kmlPinsCache = parsed;
        window._kmlLastFetch = Date.now();
        render();
      })
      .catch(function(e){
        el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--r)">Erro ao carregar KML: ' + e.message + '</div>';
      });
      return;
    }

    // Wait for Maps API then render
    if (!window._gmapsReady) {
      el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted)">Carregando Google Maps...</div>';
      var retry = setInterval(function(){
        if (window._gmapsReady) { clearInterval(retry); requestAnimationFrame(function(){ _renderGMap(document.getElementById('psm-gmap'), fPins); }); }
      }, 500);
      return;
    }
    requestAnimationFrame(function(){ _renderGMap(el, fPins); });
  }, 200);

  return '<div class="phd">\ud83c\udf0d Mapa PSM</div>' +
    '<p style="color:var(--muted);margin-bottom:16px">Empreendimentos em Sao Jose do Rio Preto - dados do Google Earth (atualiza automaticamente)</p>' +
    cards + filters + mapDiv;
}

function _renderGMap(el, pins) {
  if (!el || !pins) return;
  el.innerHTML = '';

  var center = {lat:-20.8167, lng:-49.3789};
  var map = new google.maps.Map(el, {
    center: center, zoom: 13, mapTypeId: 'hybrid',
    mapTypeControl: true, streetViewControl: true, fullscreenControl: true,
    zoomControl: true, gestureHandling: 'greedy'
  });
  window._psmGMap = map;

  var iw = new google.maps.InfoWindow();
  var colors = {Ativo:'#10b981', Lancamento:'#d4a843'};

  pins.forEach(function(p) {
    var clr = colors[p.s] || '#3b82f6';
    var mk = new google.maps.Marker({
      position: {lat: p.lat, lng: p.lng}, map: map, title: p.n,
      icon: {path: google.maps.SymbolPath.CIRCLE, scale: 8, fillColor: clr, fillOpacity: 0.9, strokeColor: '#fff', strokeWeight: 2}
    });
    mk.addListener('click', function() {
      iw.setContent(
        '<div style="font-family:Plus Jakarta Sans,sans-serif;padding:8px;min-width:200px">' +
        '<h3 style="margin:0 0 4px;font-size:15px;color:#0f172a">' + p.n + '</h3>' +
        '<span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;background:' + clr + '">' + p.s + '</span>' +
        '</div>'
      );
      iw.open(map, mk);
    });
  });
}

function addMapPin() {
  const nome = document.getElementById('pin-nome')?.value?.trim();
  const status = document.getElementById('pin-status')?.value;
  if (!nome) { toast('Informe o nome','warn'); return; }
  const statusColors = {'Lançamento':'var(--g)','Em obras':'var(--a)','Pronto':'var(--b)','Esgotado':'var(--r)'};
  S.mapPins = S.mapPins || [];
  S.mapPins.push({nome, status, cor: statusColors[status] || 'var(--muted)'});
  toast('Pin adicionado!','ok');
  render();
}

    + incs.map(i => '<option value="'+i+'"'+(filterInc===i?' selected':'')+'>'+i+'</option>').join('') + '</select>'
    + '<select class="sel-f" style="font-size:11px" onchange="S.tabelaLoc=this.value;render()"><option value="all">Todas Localizações</option>'
    + locs.map(l => '<option value="'+l+'"'+(filterLoc===l?' selected':'')+'>'+l+'</option>').join('') + '</select>'
    + '<div style="font-size:11px;color:var(--muted);font-weight:600">'+items.length+' resultados</div>'
    + '</div>'
    // Table
    + '<div class="card" style="padding:0;overflow:auto;max-height:calc(100vh - 420px)">'
    + '<table style="width:100%;border-collapse:collapse;font-size:11.5px">'
    + '<thead><tr style="background:'+activeCat.cor+';color:#fff;position:sticky;top:0;z-index:2">'

function updateFormacao(){
  // Usa proxy Vercel para contornar CORS
  if(window._kiwifyStudents) return; // ja carregou
  fetch("/api/kiwify?action=students")
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.ok){
        window._kiwifyStudents = data.students || [];
        console.log("[Kiwify] " + data.total + " alunos carregados via proxy");
        render();
      } else {
        console.error("[Kiwify] Erro:", data.error);
        window._kiwifyStudents = [];
        render();
      }
    })
    .catch(function(err){
      console.error("[Kiwify] Fetch falhou:", err);
      window._kiwifyStudents = [];
      render();
    });
}

// ─── SIMULADOR VPL ────────────────────────────────────────────────────────────
function pgSimVPL() {
  const u = S.user; if (!u) return '';
  if (!S.vpl) S.vpl = {
    valorTabela: 740000, m2: 43, taxa: 3.66, prazoObra: 42,
    pctAto: 5, pctMensal: 20, pctAnual: 5, pctSemestral: 5, pctFinanc: 70,
    numSemestrais: 7, numAnuais: 2, desconto: 0
  };
  const v = S.vpl;
  const taxaM = v.taxa / 1200;
  const valorFinal = v.valorTabela * (1 - v.desconto / 100);
  const ato = valorFinal * v.pctAto / 100;
  const totalMensal = valorFinal * v.pctMensal / 100;
  const mensal = v.prazoObra > 0 ? totalMensal / v.prazoObra : 0;
  const totalSemestral = valorFinal * v.pctSemestral / 100;
  const semestral = v.numSemestrais > 0 ? totalSemestral / v.numSemestrais : 0;
  const totalAnual = valorFinal * v.pctAnual / 100;
  const anual = v.numAnuais > 0 ? totalAnual / v.numAnuais : 0;
  const financ = valorFinal * v.pctFinanc / 100;
  const totalPrazoObra = ato + totalMensal + totalSemestral + totalAnual;
  const pctTotal = v.pctAto + v.pctMensal + v.pctAnual + v.pctSemestral + v.pctFinanc;

  // Calculate VPL
  let vpls = [];
  // Ato (month 0)
  vpls.push({mes: 0, tipo: 'Ato', valor: ato, pv: ato});
  // Mensais
  for (let i = 1; i <= v.prazoObra; i++) {
    const pv = mensal / Math.pow(1 + taxaM, i);
    vpls.push({mes: i, tipo: 'Mensal', valor: mensal, pv});
  }
  // Semestrais
  for (let i = 1; i <= v.numSemestrais; i++) {
    const mes = i * 6;
    const pv = semestral / Math.pow(1 + taxaM, mes);
    vpls.push({mes, tipo: 'Semestral', valor: semestral, pv});
  }
  // Anuais
  for (let i = 1; i <= v.numAnuais; i++) {
    const mes = i * 12;
    const pv = anual / Math.pow(1 + taxaM, mes);
    vpls.push({mes, tipo: 'Anual', valor: anual, pv});
  }
  // Financiamento (last month)
  const pvFinanc = financ / Math.pow(1 + taxaM, v.prazoObra);
  vpls.push({mes: v.prazoObra, tipo: 'Financiamento', valor: financ, pv: pvFinanc});

  const totalPV = vpls.reduce((a, x) => a + x.pv, 0);
  const descVPL = ((1 - totalPV / v.valorTabela) * 100).toFixed(1);
  const m2VPL = v.m2 > 0 ? (totalPV / v.m2).toFixed(0) : 0;
  const m2Tabela = v.m2 > 0 ? (v.valorTabela / v.m2).toFixed(0) : 0;

  const fmt = n => 'R$ ' + Math.round(n).toLocaleString('pt-BR');

  function inp(label, key, step, suffix) {
    return '<div style="display:flex;flex-direction:column;gap:2px">'
      + '<label style="font-size:10px;font-weight:600;color:var(--muted)">'+label+'</label>'
      + '<div style="display:flex;align-items:center;gap:4px"><input type="number" class="finp" value="'+v[key]+'" step="'+(step||1)+'" '
      + 'oninput="S.vpl.'+key+'=parseFloat(this.value)||0;render()" style="width:100%;font-size:12px;padding:6px 8px">'
      + (suffix ? '<span style="font-size:10px;color:var(--muted);white-space:nowrap">'+suffix+'</span>' : '')
      + '</div></div>';
  }

  return '<div class="phd"><h1>📐 Simulador VPL</h1><p>Valor Presente Líquido — PSM Imóveis</p></div>'
    + '<div style="display:grid;grid-template-columns:320px 1fr;gap:16px">'
    // LEFT — inputs
    + '<div class="card" style="padding:16px;overflow-y:auto;max-height:calc(100vh - 160px)">'
    + '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Dados do Imóvel</div>'
    + '<div style="display:flex;flex-direction:column;gap:8px">'
    + inp('Valor de Tabela (R$)', 'valorTabela', 1000)
    + inp('Metragem (m²)', 'm2', 0.1, 'm²')
    + inp('Taxa VPL (% a.a.)', 'taxa', 0.1, '% a.a.')
    + inp('Desconto sobre Tabela (%)', 'desconto', 0.5, '%')
    + '</div>'
    + '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:14px 0 10px">Fluxo de Pagamento</div>'
    + '<div style="display:flex;flex-direction:column;gap:8px">'
    + inp('Ato (%)', 'pctAto', 0.5, '%')
    + inp('Mensais (%)', 'pctMensal', 0.5, '%')
    + inp('Prazo Obra (meses)', 'prazoObra', 1, 'meses')
    + inp('Semestrais (%)', 'pctSemestral', 0.5, '%')
    + inp('Nº Semestrais', 'numSemestrais', 1)
    + inp('Anuais (%)', 'pctAnual', 0.5, '%')
    + inp('Nº Anuais', 'numAnuais', 1)
    + inp('Financiamento / Chaves (%)', 'pctFinanc', 0.5, '%')
    + '</div>'
    + (Math.abs(pctTotal - 100) > 0.1 ? '<div style="margin-top:8px;padding:8px;background:var(--r-bg);border-radius:8px;font-size:11px;color:var(--r-tx);font-weight:600">⚠️ Total do fluxo: '+pctTotal.toFixed(1)+'% (deve ser ~100%)</div>' : '')
    + '</div>'
    // RIGHT — results
    + '<div style="display:flex;flex-direction:column;gap:12px">'
    // KPIs
    + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">'
    + '<div class="card" style="padding:12px;text-align:center;background:linear-gradient(135deg,var(--navy),#1e3a5f);color:#fff"><div style="font-size:9px;opacity:.6;text-transform:uppercase;font-weight:600">Valor VPL</div><div style="font-size:20px;font-weight:800;margin-top:4px">'+fmt(totalPV)+'</div></div>'
    + '<div class="card" style="padding:12px;text-align:center"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:600">Desc. VPL</div><div style="font-size:20px;font-weight:800;color:var(--g-tx);margin-top:4px">'+descVPL+'%</div></div>'
    + '<div class="card" style="padding:12px;text-align:center"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:600">R$/m² VPL</div><div style="font-size:20px;font-weight:800;color:var(--b-tx);margin-top:4px">R$ '+m2VPL+'</div></div>'
    + '<div class="card" style="padding:12px;text-align:center"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:600">R$/m² Tabela</div><div style="font-size:20px;font-weight:800;color:var(--muted);margin-top:4px">R$ '+m2Tabela+'</div></div>'
    + '</div>'
    // Summary
