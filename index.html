// ═══════════════════════════════════════════════════════════════════════════════
// CHECK-IN / CHECK-OUT + DISCIPLINA OPERACIONAL
// ═══════════════════════════════════════════════════════════════════════════════

function pgCheckin() {
  var u = S.user; if (!u) return '';
  var perfil = getPerfil();
  var isDiretor = perfil === 'diretor' || perfil === 'backoffice' || perfil === 'lider';
  var isCorretor = perfil === 'corretor' || (!isDiretor);
  var now = new Date();
  var hh = now.getHours(), mm = now.getMinutes();
  var nowStr = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');
  var today = now.toISOString().slice(0,10);

  // ─── Initialize Check-in State ──────────────────────────────────────────────
  if (!S.checkin) {
    S.checkin = {
      logs: {},       // {brokerId: [{date, checkinTime, checkoutTime, status, pausas:[{inicio,fim,motivo}]}]}
      config: {
        horario_inicio: '08:00',
        horario_fim: '18:00',
        tolerancia_min: 15,        // minutes late allowed
        pausa_inatividade_min: 60, // auto-pause after X min inactive
        max_pausas_dia: 3,
        pausa_max_min: 30,         // max duration per pause
      }
    };
  }
  var cfg = S.checkin.config;
  var logs = S.checkin.logs;

  // Ensure all brokers have log entries
  BROKERS.forEach(function(b) {
    if (!logs[b.id]) logs[b.id] = [];
  });

  // Helper: get today's log for a broker
  function getTodayLog(bid) {
    var bLogs = logs[bid] || [];
    var tl = bLogs.find(function(l) { return l.date === today; });
    if (!tl) {
      tl = { date: today, checkinTime: null, checkoutTime: null, status: 'offline', pausas: [], alertas: [] };
      if (!logs[bid]) logs[bid] = [];
      logs[bid].push(tl);
    }
    return tl;
  }

  // Helper: calc hours worked today
  function horasTrabalho(log) {
    if (!log.checkinTime) return 0;
    var ini = log.checkinTime.split(':').map(Number);
    var endT = log.checkoutTime || nowStr;
    var fim = endT.split(':').map(Number);
    var totalMin = (fim[0]*60+fim[1]) - (ini[0]*60+ini[1]);
    // Subtract pauses
    (log.pausas || []).forEach(function(p) {
      if (p.inicio && p.fim) {
        var pi = p.inicio.split(':').map(Number);
        var pf = p.fim.split(':').map(Number);
        totalMin -= (pf[0]*60+pf[1]) - (pi[0]*60+pi[1]);
      }
    });
    return Math.max(0, Math.round(totalMin / 60 * 10) / 10);
  }

  // Helper: check if broker is late
  function isLate(log) {
    if (!log.checkinTime) return false;
    var expected = cfg.horario_inicio.split(':').map(Number);
    var actual = log.checkinTime.split(':').map(Number);
    var diff = (actual[0]*60+actual[1]) - (expected[0]*60+expected[1]);
    return diff > cfg.tolerancia_min;
  }

  // Helper: status badge
  function statusBadge(st) {
    var map = {
      online:    { bg:'var(--g-bg)', tx:'var(--g-tx)', lbl:'Online',         ico:'\u2705' },
      offline:   { bg:'var(--cream2)',tx:'var(--muted)',lbl:'Offline',        ico:'\u26AA' },
      pausa:     { bg:'var(--a-bg)', tx:'var(--a-tx)', lbl:'Em Pausa',       ico:'\u23F8\uFE0F' },
      atendimento:{bg:'rgba(37,99,235,.1)',tx:'#2563eb',lbl:'Em Atendimento',ico:'\uD83D\uDCDE' },
      captacao:  { bg:'rgba(139,92,246,.1)',tx:'#8b5cf6',lbl:'Em Capta\u00E7\u00E3o',ico:'\uD83D\uDCCD' },
      finalizado:{ bg:'var(--cream3)',tx:'var(--navy)', lbl:'Finalizado',     ico:'\uD83C\uDFC1' }
    };
    var s = map[st] || map.offline;
    return '<span style="font-size:10px;padding:3px 10px;border-radius:6px;background:'+s.bg+';color:'+s.tx+';font-weight:600;white-space:nowrap">'+s.ico+' '+s.lbl+'</span>';
  }

  // ─── CORRETOR VIEW: My Check-in ────────────────────────────────────────────
  function corretorView() {
    var myLog = getTodayLog(u.id);
    var myStatus = myLog.status;
    var late = isLate(myLog);
    var horas = horasTrabalho(myLog);
    var pausaCount = (myLog.pausas || []).length;
    var inPausa = myStatus === 'pausa' || myStatus === 'atendimento' || myStatus === 'captacao';

    var h = '';
    // Header
    h += '<div class="pheader"><div class="ptitle">\u23F0 Check-in / Check-out</div>';
    h += '<div class="psub">Controle de ponto e presen\u00E7a operacional</div></div>';

    // Status Card
    h += '<div class="card" style="padding:20px;text-align:center">';
    h += '<div style="font-size:48px;margin-bottom:8px">' + (myStatus === 'online' ? '\u2705' : myStatus === 'offline' ? '\u26AA' : myStatus === 'finalizado' ? '\uD83C\uDFC1' : '\u23F8\uFE0F') + '</div>';
    h += '<div style="font-size:20px;font-weight:800;color:var(--navy);margin-bottom:4px">' + (statusBadge(myStatus)) + '</div>';
    if (myLog.checkinTime) {
      h += '<div style="font-size:13px;color:var(--muted);margin-top:8px">Check-in: <strong>' + myLog.checkinTime + '</strong>';
      if (late) h += ' <span style="color:var(--r-tx);font-weight:700">(ATRASADO)</span>';
      if (myLog.checkoutTime) h += ' \u2192 Check-out: <strong>' + myLog.checkoutTime + '</strong>';
      h += '</div>';
      h += '<div style="font-size:14px;font-weight:700;color:var(--navy);margin-top:4px">' + horas + 'h trabalhadas hoje</div>';
    }
    h += '</div>';

    // Action Buttons
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:16px 0">';

    if (myStatus === 'offline') {
      h += '<button onclick="doCheckin()" class="btn-g" style="padding:14px;font-size:15px;font-weight:800;border-radius:12px;cursor:pointer">\u2705 Fazer Check-in</button>';
    } else if (myStatus === 'online') {
      h += '<button onclick="doPausa(\'atendimento\')" style="padding:12px;font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;background:rgba(37,99,235,.1);color:#2563eb;border:1px solid rgba(37,99,235,.2)">\uD83D\uDCDE Atendimento</button>';
      h += '<button onclick="doPausa(\'captacao\')" style="padding:12px;font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;background:rgba(139,92,246,.1);color:#8b5cf6;border:1px solid rgba(139,92,246,.2)">\uD83D\uDCCD Capta\u00E7\u00E3o</button>';
      h += '<button onclick="doPausa(\'pausa\')" style="padding:12px;font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;background:var(--a-bg);color:var(--a-tx);border:1px solid rgba(212,168,67,.2)">\u23F8\uFE0F Pausa</button>';
      h += '<button onclick="doCheckout()" style="padding:12px;font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;background:var(--r-bg);color:var(--r-tx);border:1px solid rgba(220,38,38,.2)">\uD83D\uDEAA Check-out</button>';
    } else if (inPausa) {
      h += '<button onclick="voltarOnline()" class="btn-g" style="padding:14px;font-size:15px;font-weight:800;border-radius:12px;cursor:pointer">\u25B6\uFE0F Voltar Online</button>';
      h += '<button onclick="doCheckout()" style="padding:12px;font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;background:var(--r-bg);color:var(--r-tx);border:1px solid rgba(220,38,38,.2)">\uD83D\uDEAA Check-out</button>';
    } else if (myStatus === 'finalizado') {
      h += '<div style="padding:14px;font-size:13px;color:var(--muted);text-align:center">Jornada finalizada. At\u00E9 amanh\u00E3!</div>';
    }
    h += '</div>';

    // Today's timeline
    h += '<div class="card"><div class="ctitle">\uD83D\uDCCB Meu Registro de Hoje</div>';
    h += '<div style="padding:0 16px 16px">';
    if (myLog.checkinTime) {
      h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
      h += '<div style="width:10px;height:10px;border-radius:50%;background:var(--g-tx)"></div>';
      h += '<span style="font-size:12px;font-weight:600">' + myLog.checkinTime + '</span>';
      h += '<span style="font-size:11px;color:var(--muted)">Check-in</span>';
      if (late) h += '<span style="font-size:10px;padding:2px 6px;border-radius:4px;background:var(--r-bg);color:var(--r-tx);font-weight:600">Atraso</span>';
      h += '</div>';

      (myLog.pausas || []).forEach(function(p, idx) {
        var motivos = { pausa: '\u23F8\uFE0F Pausa', atendimento: '\uD83D\uDCDE Atendimento', captacao: '\uD83D\uDCCD Capta\u00E7\u00E3o' };
        h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;margin-left:20px">';
        h += '<div style="width:7px;height:7px;border-radius:50%;background:var(--a-tx)"></div>';
        h += '<span style="font-size:11px;font-weight:600">' + p.inicio + (p.fim ? ' \u2192 ' + p.fim : ' (ativa)') + '</span>';
        h += '<span style="font-size:10px;color:var(--muted)">' + (motivos[p.motivo] || p.motivo) + '</span>';
        h += '</div>';
      });

      if (myLog.checkoutTime) {
        h += '<div style="display:flex;align-items:center;gap:8px;margin-top:4px">';
        h += '<div style="width:10px;height:10px;border-radius:50%;background:var(--r-tx)"></div>';
        h += '<span style="font-size:12px;font-weight:600">' + myLog.checkoutTime + '</span>';
        h += '<span style="font-size:11px;color:var(--muted)">Check-out</span>';
        h += '</div>';
      }
    } else {
      h += '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">Nenhum registro hoje. Fa\u00E7a seu check-in!</div>';
    }
    h += '</div></div>';

    // Roleta Status
    h += '<div class="card"><div class="ctitle">\uD83C\uDFB0 Status na Roleta</div>';
    h += '<div style="padding:0 16px 16px;text-align:center">';
    var naRoleta = myStatus === 'online';
    h += '<div style="font-size:36px;margin-bottom:6px">' + (naRoleta ? '\u2705' : '\u274C') + '</div>';
    h += '<div style="font-size:15px;font-weight:700;color:' + (naRoleta ? 'var(--g-tx)' : 'var(--r-tx)') + '">';
    h += naRoleta ? 'Voc\u00EA est\u00E1 na Roleta' : 'Fora da Roleta';
    h += '</div>';
    h += '<div style="font-size:11px;color:var(--muted);margin-top:4px">';
    h += naRoleta ? 'Voc\u00EA est\u00E1 recebendo leads normalmente' : 'Fa\u00E7a check-in e fique online para entrar na roleta';
    h += '</div></div></div>';

    return h;
  }

  // ─── GESTOR VIEW: Dashboard de Presença ─────────────────────────────────────
  function gestorView() {
    var h = '';
    // Header
    h += '<div class="pheader"><div class="ptitle">\u23F0 Check-in / Check-out</div>';
    h += '<div class="psub">Painel de presen\u00E7a e disciplina operacional</div></div>';

    // KPIs
    var onlineCount = 0, offlineCount = 0, pausaCount = 0, atrasados = 0, naRoleta = 0;
    var totalHoras = 0;
    BROKERS.forEach(function(b) {
      var log = getTodayLog(b.id);
      if (log.status === 'online') { onlineCount++; naRoleta++; }
      else if (log.status === 'offline') offlineCount++;
      else if (log.status === 'finalizado') { /* done */ }
      else pausaCount++;
      if (isLate(log)) atrasados++;
      totalHoras += horasTrabalho(log);
    });

    h += '<div class="kgrid">';
    h += '<div class="kcard"><div class="klbl">Online Agora</div><div class="kval" style="color:var(--g-tx)">' + onlineCount + '</div><div class="ksub">de ' + BROKERS.length + ' corretores</div></div>';
    h += '<div class="kcard"><div class="klbl">Na Roleta</div><div class="kval" style="color:var(--navy)">' + naRoleta + '</div><div class="ksub">recebendo leads</div></div>';
    h += '<div class="kcard"><div class="klbl">Em Pausa</div><div class="kval" style="color:var(--a-tx)">' + pausaCount + '</div><div class="ksub">atendimento/capta\u00E7\u00E3o</div></div>';
    h += '<div class="kcard"><div class="klbl">Offline</div><div class="kval" style="color:var(--muted)">' + offlineCount + '</div><div class="ksub">sem check-in</div></div>';
    h += '<div class="kcard"><div class="klbl">Atrasados Hoje</div><div class="kval" style="color:var(--r-tx)">' + atrasados + '</div><div class="ksub">ap\u00F3s ' + cfg.horario_inicio + ' + ' + cfg.tolerancia_min + 'min</div></div>';
    h += '</div>';

    // Live status table
    h += '<div class="card"><div class="ctitle">\uD83D\uDCE1 Status ao Vivo</div>';
    h += '<div class="tw"><table class="rank-tbl"><thead><tr>';
    h += '<th>Corretor</th><th>Frente</th><th>Status</th><th>Check-in</th><th>Horas</th><th>Pausas</th><th>Roleta</th>';
    h += '</tr></thead><tbody>';

    var sorted = BROKERS.slice().sort(function(a,b) {
      var order = {online:0, atendimento:1, captacao:1, pausa:2, finalizado:3, offline:4};
      var al = getTodayLog(a.id), bl = getTodayLog(b.id);
      return (order[al.status]||5) - (order[bl.status]||5);
    });

    sorted.forEach(function(b) {
      var log = getTodayLog(b.id);
      var hrs = horasTrabalho(log);
      var late = isLate(log);
      var roleta = log.status === 'online';
      h += '<tr>';
      h += '<td><div style="font-size:12px;font-weight:600">' + b.nome + '</div></td>';
      h += '<td style="font-size:11px;color:var(--muted)">' + (b.frente || '-') + '</td>';
      h += '<td>' + statusBadge(log.status) + '</td>';
      h += '<td style="font-size:12px;font-weight:600">';
      h += log.checkinTime ? log.checkinTime : '<span style="color:var(--muted)">--</span>';
      if (late) h += ' <span style="font-size:9px;padding:1px 5px;border-radius:3px;background:var(--r-bg);color:var(--r-tx);font-weight:700">ATRASO</span>';
      h += '</td>';
      h += '<td style="font-size:12px;font-weight:700;color:' + (hrs >= 6 ? 'var(--g-tx)' : hrs >= 3 ? 'var(--a-tx)' : 'var(--muted)') + '">' + hrs + 'h</td>';
      h += '<td style="font-size:12px;text-align:center">' + (log.pausas || []).length + '/' + cfg.max_pausas_dia + '</td>';
      h += '<td style="text-align:center">';
      h += roleta ? '<span style="font-size:10px;padding:3px 8px;border-radius:6px;background:var(--g-bg);color:var(--g-tx);font-weight:700">\u2705 SIM</span>' : '<span style="font-size:10px;padding:3px 8px;border-radius:6px;background:var(--r-bg);color:var(--r-tx);font-weight:700">\u274C N\u00C3O</span>';
      h += '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div>';

    // Weekly summary
    h += '<div class="card"><div class="ctitle">\uD83D\uDCC5 Resumo Semanal</div>';
    h += '<div class="tw"><table class="rank-tbl"><thead><tr>';
    h += '<th>Corretor</th><th>Dias Presente</th><th>Atrasos</th><th>Total Horas</th><th>M\u00E9dia/Dia</th><th>Score</th>';
    h += '</tr></thead><tbody>';

    BROKERS.forEach(function(b) {
      var bLogs = logs[b.id] || [];
      var weekLogs = bLogs.filter(function(l) {
        var d = new Date(l.date);
        var diff = (now - d) / 864e5;
        return diff >= 0 && diff < 7;
      });
      var diasPresente = weekLogs.filter(function(l) { return l.checkinTime; }).length;
      var atrasos = weekLogs.filter(function(l) { return isLate(l); }).length;
      var totalH = weekLogs.reduce(function(acc, l) { return acc + horasTrabalho(l); }, 0);
      var media = diasPresente > 0 ? Math.round(totalH / diasPresente * 10) / 10 : 0;
      // Score: 100 base, -10 per absence, -5 per late, +5 per day > 8h
      var score = 100 - ((5 - diasPresente) * 10) - (atrasos * 5);
      weekLogs.forEach(function(l) { if (horasTrabalho(l) >= 8) score += 5; });
      score = Math.max(0, Math.min(100, score));

      h += '<tr>';
      h += '<td style="font-size:12px;font-weight:600">' + b.nome + '</td>';
      h += '<td style="text-align:center;font-size:12px;font-weight:700;color:' + (diasPresente >= 5 ? 'var(--g-tx)' : diasPresente >= 3 ? 'var(--a-tx)' : 'var(--r-tx)') + '">' + diasPresente + '/5</td>';
      h += '<td style="text-align:center;font-size:12px;font-weight:700;color:' + (atrasos === 0 ? 'var(--g-tx)' : 'var(--r-tx)') + '">' + atrasos + '</td>';
      h += '<td style="text-align:center;font-size:12px;font-weight:600">' + Math.round(totalH * 10) / 10 + 'h</td>';
      h += '<td style="text-align:center;font-size:12px;font-weight:600">' + media + 'h</td>';
      h += '<td style="text-align:center">';
      var scoreColor = score >= 80 ? 'var(--g-tx)' : score >= 50 ? 'var(--a-tx)' : 'var(--r-tx)';
      h += '<span style="font-size:12px;font-weight:800;color:' + scoreColor + '">' + score + '</span>';
      h += '<span style="font-size:9px;color:var(--muted)">/100</span>';
      h += '</td>';
      h += '</tr>';
    });
    h += '</tbody></table></div></div>';

    // Config section (diretor only)
    if (perfil === 'diretor') {
      h += '<div class="card"><div class="ctitle">\u2699\uFE0F Configura\u00E7\u00F5es de Ponto</div>';
      h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;padding:0 16px 16px">';
      h += '<div><label style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600">Hor\u00E1rio In\u00EDcio</label>';
      h += '<input type="time" value="'+cfg.horario_inicio+'" onchange="S.checkin.config.horario_inicio=this.value;saveState()" style="width:100%;padding:8px;border:1px solid var(--cream3);border-radius:8px;font-size:14px;font-weight:600" /></div>';
      h += '<div><label style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600">Hor\u00E1rio Fim</label>';
      h += '<input type="time" value="'+cfg.horario_fim+'" onchange="S.checkin.config.horario_fim=this.value;saveState()" style="width:100%;padding:8px;border:1px solid var(--cream3);border-radius:8px;font-size:14px;font-weight:600" /></div>';
      h += '<div><label style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600">Toler\u00E2ncia Atraso (min)</label>';
      h += '<input type="number" value="'+cfg.tolerancia_min+'" onchange="S.checkin.config.tolerancia_min=+this.value;saveState()" style="width:100%;padding:8px;border:1px solid var(--cream3);border-radius:8px;font-size:14px;font-weight:600" /></div>';
      h += '<div><label style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600">Max Pausas/Dia</label>';
      h += '<input type="number" value="'+cfg.max_pausas_dia+'" onchange="S.checkin.config.max_pausas_dia=+this.value;saveState()" style="width:100%;padding:8px;border:1px solid var(--cream3);border-radius:8px;font-size:14px;font-weight:600" /></div>';
      h += '</div></div>';
    }

    return h;
  }

  // ─── Render ─────────────────────────────────────────────────────────────────
  return isDiretor ? gestorView() : corretorView();
}

// ─── CHECK-IN ACTIONS ─────────────────────────────────────────────────────────
function doCheckin() {
  var now = new Date();
  var hh = String(now.getHours()).padStart(2,'0');
  var mm = String(now.getMinutes()).padStart(2,'0');
  var today = now.toISOString().slice(0,10);
  var uid = S.user.id;
  if (!S.checkin.logs[uid]) S.checkin.logs[uid] = [];
  var log = S.checkin.logs[uid].find(function(l) { return l.date === today; });
  if (!log) {
    log = { date: today, checkinTime: null, checkoutTime: null, status: 'offline', pausas: [], alertas: [] };
    S.checkin.logs[uid].push(log);
  }
  log.checkinTime = hh + ':' + mm;
  log.status = 'online';
  saveState();
  render();
}

function doCheckout() {
  var now = new Date();
  var hh = String(now.getHours()).padStart(2,'0');
  var mm = String(now.getMinutes()).padStart(2,'0');
  var today = now.toISOString().slice(0,10);
  var uid = S.user.id;
  var log = (S.checkin.logs[uid] || []).find(function(l) { return l.date === today; });
  if (!log) return;
  // Close any open pause
  (log.pausas || []).forEach(function(p) {
    if (p.inicio && !p.fim) p.fim = hh + ':' + mm;
  });
  log.checkoutTime = hh + ':' + mm;
  log.status = 'finalizado';
  saveState();
  render();
}

function doPausa(motivo) {
  var now = new Date();
  var hh = String(now.getHours()).padStart(2,'0');
  var mm = String(now.getMinutes()).padStart(2,'0');
  var today = now.toISOString().slice(0,10);
  var uid = S.user.id;
  var log = (S.checkin.logs[uid] || []).find(function(l) { return l.date === today; });
  if (!log) return;
  var cfg = S.checkin.config;
  if ((log.pausas || []).length >= cfg.max_pausas_dia && motivo === 'pausa') {
    alert('Limite de pausas atingido (' + cfg.max_pausas_dia + '/dia)');
    return;
  }
  log.pausas.push({ inicio: hh + ':' + mm, fim: null, motivo: motivo });
  log.status = motivo;
  saveState();
  render();
}

function voltarOnline() {
  var now = new Date();
  var hh = String(now.getHours()).padStart(2,'0');
  var mm = String(now.getMinutes()).padStart(2,'0');
  var today = now.toISOString().slice(0,10);
  var uid = S.user.id;
  var log = (S.checkin.logs[uid] || []).find(function(l) { return l.date === today; });
  if (!log) return;

// ─── SIMULADOR INCC ───────────────────────────────────────────────────────────
function pgSimINCC() {
  const u = S.user; if (!u) return '';
  if (!S.incc) S.incc = {
    valorTotal: 300900, inccAA: 6, pctFluxoSemCorrecao: 5,
    prazoMeses: 42, pctEntrada: 5, pctMensais: 20, pctSemestrais: 0,
    pctAnuais: 7.8, pctFinanc: 70, numMensais: 42, numAnuais: 3
  };
  const c = S.incc;
  const inccM = Math.pow(1 + c.inccAA / 100, 1/12) - 1;
  const valorEntrada = c.valorTotal * c.pctEntrada / 100;
  const valorMensais = c.valorTotal * c.pctMensais / 100;
  const mensal = c.numMensais > 0 ? valorMensais / c.numMensais : 0;
  const valorAnuais = c.valorTotal * c.pctAnuais / 100;
  const anual = c.numAnuais > 0 ? valorAnuais / c.numAnuais : 0;
  const financ = c.valorTotal * c.pctFinanc / 100;

  // Calculate INCC projection
  let projecao = [];
  let saldoCorrigido = 0;
  let custoINCC = 0;
  for (let i = 0; i <= Math.min(c.prazoMeses, 60); i++) {
    const fatorAcum = Math.pow(1 + inccM, i);
    let pagamento = 0;
    if (i === 0) pagamento = valorEntrada;
    else pagamento = mensal;
    // Add anual
    if (i > 0 && i % 12 === 0 && i / 12 <= c.numAnuais) pagamento += anual;

    const semCorrecao = pagamento;
    const pctFluxo = i === 0 ? 1 : (1 - c.pctFluxoSemCorrecao / 100);
    const comCorrecao = pagamento * fatorAcum * pctFluxo + pagamento * (1 - pctFluxo);
    const custoMes = comCorrecao - semCorrecao;
    custoINCC += custoMes;

    projecao.push({
      mes: i, fator: fatorAcum.toFixed(4),
      semCorrecao: semCorrecao, comCorrecao: comCorrecao,
      custoMes: custoMes, custoAcum: custoINCC
    });
  }

  const totalSemINCC = projecao.reduce((a, x) => a + x.semCorrecao, 0);
  const totalComINCC = projecao.reduce((a, x) => a + x.comCorrecao, 0);
  const economiaINCC = totalComINCC - totalSemINCC;
  const pctEconomia = totalSemINCC > 0 ? ((economiaINCC / totalSemINCC) * 100).toFixed(1) : 0;

  // Valorização estimada
  const valorizacaoTotal = c.valorTotal * Math.pow(1 + inccM, c.prazoMeses) - c.valorTotal;

  const fmt = n => 'R$ ' + Math.round(n).toLocaleString('pt-BR');

  function inp(label, key, step, suffix) {
    return '<div style="display:flex;flex-direction:column;gap:2px">'
      + '<label style="font-size:10px;font-weight:600;color:var(--muted)">'+label+'</label>'
      + '<div style="display:flex;align-items:center;gap:4px"><input type="number" class="finp" value="'+c[key]+'" step="'+(step||1)+'" '
      + 'oninput="S.incc.'+key+'=parseFloat(this.value)||0;render()" style="width:100%;font-size:12px;padding:6px 8px">'
      + (suffix ? '<span style="font-size:10px;color:var(--muted);white-space:nowrap">'+suffix+'</span>' : '')
      + '</div></div>';
  }

  return '<div class="phd"><h1>📊 Simulador INCC</h1><p>Projeção de correção INCC e economia estimada</p></div>'
    + '<div style="display:grid;grid-template-columns:300px 1fr;gap:16px">'
    // LEFT
    + '<div class="card" style="padding:16px;overflow-y:auto;max-height:calc(100vh - 160px)">'
    + '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Parâmetros</div>'
    + '<div style="display:flex;flex-direction:column;gap:8px">'
    + inp('Valor Total do Imóvel (R$)', 'valorTotal', 1000)
    + inp('INCC (% a.a.)', 'inccAA', 0.1, '% a.a.')
    + inp('Prazo (meses)', 'prazoMeses', 1, 'meses')
    + inp('% Fluxo Sem Correção', 'pctFluxoSemCorrecao', 0.5, '%')
    + '</div>'
    + '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:14px 0 10px">Fluxo</div>'
    + '<div style="display:flex;flex-direction:column;gap:8px">'
    + inp('Entrada (%)', 'pctEntrada', 0.5, '%')
    + inp('Mensais (%)', 'pctMensais', 0.5, '%')
    + inp('N\u00BA Mensais', 'numMensais', 1)
    + inp('Anuais (%)', 'pctAnuais', 0.5, '%')
    + inp('N\u00BA Anuais', 'numAnuais', 1)
    + inp('Financiamento (%)', 'pctFinanc', 0.5, '%')
    + '</div></div>'
    // RIGHT
    + '<div style="display:flex;flex-direction:column;gap:12px">'
    // KPIs
    + '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">'
    + '<div class="card" style="padding:12px;text-align:center"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:600">INCC Mensal</div><div style="font-size:18px;font-weight:800;color:var(--navy);margin-top:4px">'+(inccM*100).toFixed(3)+'%</div></div>'
    + '<div class="card" style="padding:12px;text-align:center"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:600">Custo INCC Est.</div><div style="font-size:18px;font-weight:800;color:var(--r-tx);margin-top:4px">'+fmt(economiaINCC)+'</div></div>'
    + '<div class="card" style="padding:12px;text-align:center"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:600">% Sobre Fluxo</div><div style="font-size:18px;font-weight:800;color:var(--a-tx);margin-top:4px">'+pctEconomia+'%</div></div>'
    + '<div class="card" style="padding:12px;text-align:center"><div style="font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:600">Valorização Est.</div><div style="font-size:18px;font-weight:800;color:var(--g-tx);margin-top:4px">'+fmt(valorizacaoTotal)+'</div></div>'

    + '<div style="font-size:11px;font-weight:700;color:var(--g-tx)">'+fmt(totalSemINCC)+'</div>'
    + '<div style="width:100%;background:var(--g);border-radius:6px 6px 0 0;height:'+Math.round(totalSemINCC/(totalComINCC||1)*100)+'px"></div>'
    + '<div style="font-size:10px;color:var(--muted)">Sem INCC</div></div>'
    + '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">'
    + '<div style="font-size:11px;font-weight:700;color:var(--r-tx)">'+fmt(totalComINCC)+'</div>'
    + '<div style="width:100%;background:var(--r);border-radius:6px 6px 0 0;height:100px"></div>'
    + '<div style="font-size:10px;color:var(--muted)">Com INCC</div></div>'
    + '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">'
    + '<div style="font-size:11px;font-weight:700;color:var(--a-tx)">'+fmt(economiaINCC)+'</div>'
    + '<div style="width:100%;background:var(--a);border-radius:6px 6px 0 0;height:'+Math.round(economiaINCC/(totalComINCC||1)*100)+'px"></div>'
    + '<div style="font-size:10px;color:var(--muted)">Custo INCC</div></div>'
    + '</div></div>'
    // Projecao table
    + '<div class="card" style="padding:0;overflow:auto;max-height:300px"><table style="width:100%;border-collapse:collapse;font-size:11px">'

}

async function sendVera(skipInput = false) {
  if (!skipInput) {
    const inp = document.getElementById('vera-inp');
    const txt = (inp?.value || '').trim();
    if (!txt) return;
    S.veraHist = S.veraHist || [];
    S.veraHist.push({role:'user', content:txt});
    if (inp) inp.value = '';
  }
  S.veraLoading = true; render();
  setTimeout(() => { const el=document.getElementById('vera-msgs'); if(el) el.scrollTop=el.scrollHeight; }, 50);

  try {
    const u = S.user;
    const b = u ? BROKERS.find(x=>x.id===u.id) : null;
    const disc = DISC_PROFILES[u?.id];
    const rankList = [...BROKERS].sort((a,c)=>(c.vgv_real||0)-(a.vgv_real||0)).slice(0,5).map((b,i)=>'#'+(i+1)+' '+b.name.split(' ')[0]+': '+fmt(b.vgv_real||0)).join('\n');
    const system = `Você é o Sr. Performance, mentora de alta performance da PSM Assessoria Imobiliária em São José do Rio Preto - SP.

PERFIL DO USUÁRIO:
- Nome: ${u?.name||'Corretor'}

- Perfil DISC: ${disc?.perfil||'—'} — ${disc?.desc||''}
- Pipeline: ${fmt(b?.vgv||0)} em ${OPPS.filter(o=>o.bid===u?.id).length} negociações
- VGV realizado: ${fmt(b?.vgv_real||0)} / Meta: ${fmt(METAS_CONFIG[u?.id]?.vgv_meta||b?.meta||0)}
- Ticket médio: ${fmt(b?.ticketMedio||0)}
- Ciclo de venda: ${b?.cicloVenda||0} dias
- Taxa conversão: ${b?.conversionRate||0}%
- Principal perda: ${Object.entries(b?.motivosPerda||{}).sort((a,c)=>c[1]-a[1])[0]?.[0]||'—'}

RANKING (VGV realizado):
${rankList}

METODOLOGIA PSM: Funil → Carteira → Tentativa → Contato 4Ps → Agendamento → Visita → Quente → Proposta → Contrato
FRENTES: MAP/Lançamento, Conquista (revenda), Terceiros (captação), Locação

DADOS ADICIONAIS DO PIPELINE:
- Total pipeline: ${fmt(OPPS.reduce((a,o)=>a+(o.vgv||0),0))} em ${OPPS.length} oportunidades
- Vendas este período: ${VENDAS.length} (${fmt(VENDAS.reduce((a,v)=>a+(v.vgv||0),0))})
- Perdidas: ${LOST_DEALS.length}
- Leads quentes: ${OPPS.filter(o=>['quente','proposta','contrato'].includes(o.st_psm)).length}
- Agendamentos: ${OPPS.filter(o=>['agendamento','vis_agend'].includes(o.st_psm)).length}

INSTRUÇÕES: Seja direta, prática e motivadora. Use os dados reais. Máximo 280 palavras. Formato com **negrito** nos pontos-chave.`;

    // Send Gemini API key via header + query param (from Configurações > IA)
    const geminiKey = (S.connectors || {}).gemini_api_key || '';
    const srUrl = '/api/sr' + (geminiKey ? '?gemini_key=' + encodeURIComponent(geminiKey) : '');
    const resp = await fetch(srUrl, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'X-Gemini-Key': geminiKey},
      body: JSON.stringify({
        max_tokens: 1024,
        system,
        messages: S.veraHist.slice(-10).map(m => ({role:m.role, content:m.content}))
      })
    });
    const data = await resp.json();
    const txt = data.content?.[0]?.text || 'Não consegui responder agora.';
    S.veraHist.push({role:'assistant', content:txt});
  } catch(e) {

// ─── PERIOD FILTER HELPER ─────────────────────────────────────────────────────
function filterByPeriod(deals, period) {
  if (!period || period === 'all') return deals;
  const now = new Date();
  const start = new Date();
  if (period === 'week') start.setDate(now.getDate() - 7);
  else if (period === 'month') { start.setDate(1); }
  else if (period === 'quarter') { start.setMonth(Math.floor(now.getMonth()/3)*3, 1); }
  else if (period === 'semester') { start.setMonth(now.getMonth() < 6 ? 0 : 6, 1); }
  return deals.filter(d => {
    const dt = new Date(d.createdAt || d.updated_at || '');
    return dt >= start;
  });
}

// Teste de conexão com RD
async function rdDebugTest() {
  toast('Testando conexão com RD Station...', '');
  const c = S.connectors || {};
  const token = c.rd_crm_token;
  try {
    const t0 = Date.now();
    // 1) Proxy (usa env var token do Vercel como fallback)
    const hdrs = { 'Accept': 'application/json' };
    if (token) hdrs['X-RD-Token'] = token;
    const r = await fetch('/api/rd?path=/deals&limit=1&service=crm', { headers: hdrs });
    const ms = Date.now() - t0;
    if (!r.ok) {
      const err = await r.json().catch(()=>({}));
      toast('❌ RD CRM HTTP ' + r.status + ': ' + (err.error || 'erro desconhecido'), 'err');
      return;
    }
    const d = await r.json();
    const total = d.total || d.deals?.length || 0;
    toast('✅ RD CRM OK — ' + total + ' negociações em ' + ms + 'ms', 'ok');
    console.log('[RD Debug] ✅', d);
  } catch(e) {
    toast('❌ Falha na conexão: ' + e.message, 'err');
    console.error('[RD Debug]', e);
  }
}

// ── Pickup RD MKT tokens from URL hash (after OAuth2 callback redirect) ──
(function pickupRdMktTokens() {
  if (!location.hash.includes('rd_mkt_tokens=')) return;
  try {
    const raw = decodeURIComponent(location.hash.split('rd_mkt_tokens=')[1]);
    const t = JSON.parse(raw);
    if (t.access_token) {
      S.connectors = S.connectors || {};
      S.connectors.rd_mkt_access_token = t.access_token;
      S.connectors.rd_mkt_refresh_token = t.refresh_token;
      S.connectors.rd_mkt_token_expires = Date.now() + (t.expires_in || 86400) * 1000;
      saveState();
      history.replaceState(null, '', location.pathname);
      setTimeout(() => { toast('✅ RD Marketing conectado com sucesso!', 'ok'); render(); }, 500);
      console.log('[RD MKT] Tokens salvos via URL hash redirect');
    }
  } catch(e) { console.warn('[RD MKT] Erro ao processar tokens do hash:', e); }
})();

// Iniciar autorizacao RD MKT OAuth2
function startRdMktAuth() {
  var c = S.connectors || {};
  var cid = c.rd_mkt_client_id || '';
  var csec = c.rd_mkt_client_secret || '';
  if (!cid) { toast('Preencha o Token Publico (Client ID) antes de autorizar','warn'); return; }
  if (!csec) { toast('Preencha o Token Privado (Client Secret) antes de autorizar','warn'); return; }
  location.href = '/api/rd-auth?client_id=' + encodeURIComponent(cid) + '&client_secret=' + encodeURIComponent(csec);
}

async function refreshRdMktToken() {
  const c = S.connectors || {};
  if (!c.rd_mkt_refresh_token) return;
  // Check if token expires within 4 hours
  const expiresAt = c.rd_mkt_token_expires || 0;
  if (expiresAt > Date.now() + 4 * 60 * 60 * 1000) return; // still fresh
  console.log('[RD MKT] Token expiring soon, refreshing...');
  try {
    const r = await fetch('/api/rd-refresh', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({refresh_token: c.rd_mkt_refresh_token})
    });
    const d = await r.json();
    if (d.access_token) {
      S.connectors.rd_mkt_access_token = d.access_token;
      S.connectors.rd_mkt_refresh_token = d.refresh_token || c.rd_mkt_refresh_token;
      S.connectors.rd_mkt_token_expires = Date.now() + (d.expires_in || 86400) * 1000;
      saveState();
      console.log('[RD MKT] Token refreshed! Expires:', new Date(S.connectors.rd_mkt_token_expires).toLocaleString());
      toast('🔄 Token RD Marketing renovado', 'ok');
    } else {
      console.warn('[RD MKT] Refresh failed:', d);
    }
  } catch(e) { console.warn('[RD MKT] Refresh error:', e.message); }
}

async function testConnectors() {
  const st = document.getElementById('conn-status');
  if (st) st.innerHTML = '<span style="color:var(--a-tx)">⏳ Testando conexões...</span>';
  const results = [];
  const c = S.connectors || {};

  // ── Test RD CRM (via proxy — usa env var token do Vercel) ──
  try {
    const hdrs = { 'Accept': 'application/json' };
    if (c.rd_crm_token) hdrs['X-RD-Token'] = c.rd_crm_token;
    const r = await fetch('/api/rd?path=/deals&limit=1&service=crm', { headers: hdrs });
    if (r.ok) {
      const d = await r.json();
      results.push('✅ RD CRM (' + (d.total||'ok') + ' deals)');
    } else {
      const err = await r.json().catch(()=>({}));
      results.push('❌ RD CRM (' + (err.error||r.status) + ')');
    }
  } catch(e) { results.push('❌ RD CRM (' + e.message.slice(0,40) + ')'); }

  // ── Test RD MKT ──
  try {
    const hdrs = { 'Accept': 'application/json' };
    const mktToken = c.rd_mkt_access_token || c.rd_mkt_token;
    if (mktToken) hdrs['X-RD-Token'] = mktToken;
    const r = await fetch('/api/rd?path=/platform/contacts&limit=1&service=mkt', { headers: hdrs });
    results.push(r.ok ? '✅ RD MKT' : '❌ RD MKT (' + r.status + ')');
  } catch(e) { results.push('❌ RD MKT (' + e.message.slice(0,40) + ')'); }

  // ── Test Google Gemini ──
  if (c.gemini_api_key) {
    try {
      const r = await fetch('/api/sr?gemini_key=' + encodeURIComponent(c.gemini_api_key), {
        method: 'POST',
        headers: {'Content-Type':'application/json', 'X-Gemini-Key': c.gemini_api_key},
        body: JSON.stringify({system:'Responda apenas: OK', messages:[{role:'user',content:'teste'}], max_tokens:10})
      });
      const d = await r.json();
      const txt = d.content?.[0]?.text || '';
      results.push(txt && !txt.includes('⚠️') ? '✅ Gemini AI (ativo)' : '❌ Gemini (' + txt.slice(0,30) + ')');
    } catch(e) { results.push('❌ Gemini (' + e.message.slice(0,30) + ')'); }
  } else {
    results.push('⬜ Gemini (sem chave)');
  }

  // ── Test OpenAI ──
  if (c.openai_api_key) {
    results.push('💾 OpenAI (chave salva)');
  }

  // ── Vera NotebookLM ──
  if (c.vera_notebook_url) {
    results.push('✅ Vera 5.0 (link salvo)');
  }

  // ── Outros ──
  if (c.notion_key) results.push('💾 Notion');
  if (c.google_api_key || c.google_client_id) results.push('💾 Google');
  if (c.excel_url) results.push('💾 Excel');

  if (st) st.innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">'
    + results.map(r => '<span style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;background:'
      + (r.startsWith('✅') ? 'var(--g-bg);color:var(--g-tx)' : r.startsWith('❌') ? 'var(--r-bg);color:var(--r-tx)' : 'var(--cream2);color:var(--muted)')
      + '">'+r+'</span>').join('')
    + '</div>';
}

function safeRoute() {
  try { return route(); }
  catch(e) {
    console.error('[PSM] Render error:', e);
    return '<div class="empty-card"><div class="empty-ico">⚠️</div>'
      + '<div class="empty-title">Erro ao carregar página</div>'

  }
}

function simCriativoCalc(){
  var tipo=el('sc_tipo').value, inv=+(el('sc_invest').value)||0, dias=+(el('sc_dias').value)||1;
  var total=inv*dias;
  var cpm={imagem:18,video:12,carrossel:15,stories:10}[tipo]||15;
  var ctr={imagem:1.2,video:2.5,carrossel:1.8,stories:3.0}[tipo]||1.5;
  var impressoes=Math.round((total/cpm)*1000);
  var cliques=Math.round(impressoes*(ctr/100));
  var cpc=cliques>0?(total/cliques).toFixed(2):'\u2014';
  var leads=Math.round(cliques*0.08);
  var cpl=leads>0?(total/leads).toFixed(2):'\u2014';
  el('sc_result').innerHTML=`
    <div class="card" style="background:#1e293b;border-radius:14px;padding:20px;text-align:center">
      <div style="color:#94a3b8;font-size:12px">Investimento Total</div>

function simLeadsCalc(){
  var inv=+(el('sl_invest').value)||0, cpl=+(el('sl_cpl').value)||1;
  var qual=+(el('sl_qual').value)||0, conv=+(el('sl_conv').value)||0;
  var ticket=+(el('sl_ticket').value)||0, com=+(el('sl_comissao').value)||0;
  var leads=Math.round(inv/cpl);
  var qualificados=Math.round(leads*(qual/100));
  var vendas=Math.round(qualificados*(conv/100));
  var vgv=vendas*ticket;
  var receita=vgv*(com/100);
  var roi=inv>0?((receita-inv)/inv*100).toFixed(0):'\u2014';
  el('sl_result').innerHTML=`
    <div class="card" style="background:#1e293b;border-radius:14px;padding:20px;text-align:center">
      <div style="color:#94a3b8;font-size:12px">Leads Gerados</div>

    </div>

      <div style="color:#94a3b8;font-size:12px">VGV Projetado</div>

function metricasViabCalc(){

  var cpl=leads>0?(orc/leads).toFixed(2):'\u2014';
  var vendas=Math.round(leads*(conv/100));
  var vgv=vendas*ticket;
  var receita=vgv*(com/100);
  var lucro=receita-custoTotal;
  var roi=custoTotal>0?((lucro/custoTotal)*100).toFixed(0):'\u2014';

S.simuladorSimulate=function(){

  var cta=S.simuladorCTA||'saiba-mais';
  var hasFile=!!S.simuladorUpload;

  // Scoring heuristics (0-10 scale)
  var composicao=hasFile?Math.max(5,Math.min(10,6+Math.random()*3)):5;
  var cores=hasFile?Math.max(4,Math.min(10,5+Math.random()*4)):4;
  var copy_score=copyLen>20&&copyLen<150?9:copyLen>10&&copyLen<200?7:copyLen>0?5:0;
  var cta_score=(cta&&cta!=='saiba-mais')?8:7;

  var hook_score=formato==='video'?8:formato==='carrossel'?7:5;
  var psycho_score=(copyLen>30)?7:5;

  var overall=Math.round((composicao+cores+copy_score+cta_score+mobile_score+hook_score+psycho_score+algo_score)/8*10);

const NOTIF_QUEUE = [];
function requestNotifPerm() {
  if (!('Notification' in window)) { toast('Notificações não suportadas neste browser', 'warn'); return; }
  Notification.requestPermission().then(p => {
    if (p === 'granted') { toast('✅ Notificações ativadas!', 'ok'); scheduleNotifs(); }
    else toast('Notificações bloqueadas', 'warn');
  });
}
function sendNotif(title, body, icon='🫡') {
  if (Notification.permission === 'granted') {
    try { new Notification(title, {body, icon: '/favicon.ico', badge: '/favicon.ico'}); } catch(e){}
  }
  toast(icon + ' ' + title + ': ' + body, 'ok');
}
function scheduleNotifs() {
  // Check SLA overdue
  const overdue = OPPS.filter(o => (o.sla||'') === 'overdue');
  if (overdue.length > 3) {
    sendNotif('⚠️ Prazo Vencido', overdue.length + ' oportunidades precisam de atenção', '⚠️');
    NOTIFS.unshift({tipo:'w', title:'⚠️ Prazo Vencido', msg:overdue.length+' oportunidades sem ação', page:'governance', read:false, ts:Date.now()});
  }
  // Check top performer
  const topBroker = [...BROKERS].sort((a,b)=>(b.vgv_real||0)-(a.vgv_real||0))[0];
  if (topBroker && (topBroker.vgv_real||0) > 0) {
    NOTIFS.unshift({tipo:'ok', title:'🏆 Top Performer', msg:topBroker.name+' lidera com '+fmt(topBroker.vgv_real||0), page:'ranking', read:false, ts:Date.now()});
  }
  // Keep only last 20 notifs
  if (NOTIFS.length > 20) NOTIFS.splice(20);
}
// Schedule checks every 30 min
setInterval(() => { if(S.user) scheduleNotifs(); }, 30 * 60 * 1000);

window.addEventListener('psm-login', scheduleNotifs);

  if (savedToken) {

      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action:'verify', token:savedToken})
    }).then(r => r.json()).then(data => {

// Vera Agent test chat
function testVeraMsg(msg) {
  S.veraAgHist = S.veraAgHist || [];
  S.veraAgHist.push({role:'user', content:msg});
  sendVeraAgent(true);
}

function sendVeraAgent() {
  var inp = document.getElementById('vera-ag-inp');
  var txt = (inp ? inp.value : '').trim();
  if (!txt) return;
  S.veraAgHist = S.veraAgHist || [];
  S.veraAgHist.push({role:'user', content:txt});
  if (inp) inp.value = '';
  S.veraAgLoading = true; render();
  setTimeout(function(){ var el=document.getElementById('vera-ag-msgs'); if(el) el.scrollTop=el.scrollHeight; }, 50);
  fetch('/api/agent', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      agent: 'vera',
      message: txt,
      conversationId: 'test_vera_' + (S.user && S.user.id || 'admin'),
      channel: 'web',
      metadata: { leadName: 'Teste Admin' }
    })
  }).then(function(r){ return r.json(); }).then(function(data){
    S.veraAgHist.push({role:'assistant', content: data.response || data.error || 'Sem resposta'});
    S.veraAgLoading = false; render();
    setTimeout(function(){ var el=document.getElementById('vera-ag-msgs'); if(el) el.scrollTop=el.scrollHeight; }, 80);
  }).catch(function(e){
    S.veraAgHist.push({role:'assistant', content:'Erro: '+e.message});
    S.veraAgLoading = false; render();
  });
}

    S.solAgHist.push({role:'assistant', content: data.response || data.error || 'Sem resposta'});

    setTimeout(function(){ var el=document.getElementById('sol-ag-msgs'); if(el) el.scrollTop=el.scrollHeight; }, 80);
  }).catch(function(e){
    S.solAgHist.push({role:'assistant', content:'Erro: '+e.message});
    S.solAgLoading = false; render();
  });
}

function pgSrPerformance() {
  S.srPerfHist = S.srPerfHist || [];
  S.srPerfTab = S.srPerfTab || "chat";
  var tabs = [
    {id:"chat", ico:"\ud83d\udcac", label:"Chat com Sr. Performance"},
    {id:"ranking", ico:"\ud83c\udfc6", label:"Ranking Corretores"},
    {id:"config", ico:"\u2699\ufe0f", label:"Configura\u00e7\u00e3o"}
  ];
  var tabsHtml = tabs.map(function(t){
    return '<button onclick="S.srPerfTab=\''+t.id+'\';render()" style="padding:8px 16px;border-radius:8px;border:none;cursor:pointer;' +
      (S.srPerfTab===t.id ? 'background:#0f172a;color:#fff' : 'background:#f1f5f9;color:#334155') + '">' + t.ico + ' ' + t.label + '</button>';
  }).join(" ");
  var content = "";
  if (S.srPerfTab === "chat") {
    var msgs = (S.srPerfHist||[]).map(function(m){
      var isU = m.role==="user";
      return '<div style="display:flex;justify-content:' + (isU?"flex-end":"flex-start") + ';margin:6px 0"><div style="max-width:75%;padding:10px 14px;border-radius:12px;background:' + (isU?"#0f172a":"#f1f5f9") + ';color:' + (isU?"#fff":"#1e293b") + '">' + m.content + '</div></div>';
    }).join("");
    if (!S.srPerfHist.length) msgs = '<div style="text-align:center;padding:40px;color:#94a3b8"><p style="font-size:40px">\ud83e\udd16</p><p>Ol\u00e1! Sou o <b>Sr. Performance</b>.</p><p>Pergunte sobre t\u00e9cnicas de venda, scripts, obje\u00e7\u00f5es, ou pe\u00e7a um treino espec\u00edfico.</p></div>';
    content = '<div id="sr-perf-msgs" style="flex:1;overflow-y:auto;padding:16px">' + msgs +
      (S.srPerfLoading ? '<div style="display:flex;justify-content:flex-start;margin:6px 0"><div style="padding:10px 14px;border-radius:12px;background:#f1f5f9;color:#94a3b8">Digitando...</div></div>' : "") +
      '</div><div style="padding:12px;border-top:1px solid #e2e8f0;display:flex;gap:8px"><input id="sr-perf-inp" onkeydown="if(event.key===\'Enter\')sendSrPerf()" placeholder="Pergunte ao Sr. Performance..." style="flex:1;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px"><button onclick="sendSrPerf()" style="padding:10px 20px;background:#0f172a;color:#fff;border:none;border-radius:8px;cursor:pointer">Enviar</button></div>';
  } else if (S.srPerfTab === "ranking") {
    content = '<div style="padding:24px;text-align:center;color:#94a3b8"><p style="font-size:40px">\ud83c\udfc6</p><p>Ranking de corretores por performance</p><p>Em breve \u2014 dados do CRM ser\u00e3o integrados aqui.</p></div>';
  } else {
    content = '<div style="padding:24px;text-align:center;color:#94a3b8"><p style="font-size:40px">\u2699\ufe0f</p><p>Configura\u00e7\u00f5es do Sr. Performance</p><p>Personalidade, tom, foco de treino \u2014 em breve.</p></div>';
  }
  return '<div style="max-width:900px;margin:0 auto"><div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><span style="font-size:32px">\ud83e\udd16</span><div><h2 style="margin:0;font-size:22px;color:#1e293b">Sr. Performance</h2><p style="margin:2px 0 0;color:#64748b;font-size:14px">Mentor de Corretores \u2014 Treino, Scripts e Obje\u00e7\u00f5es</p></div><button onclick="nav(\'agentes\')" style="margin-left:auto;padding:6px 14px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;cursor:pointer;font-size:13px">\u2190 Central</button></div>' +
    '<div style="display:flex;gap:8px;margin-bottom:16px">' + tabsHtml + '</div>' +
    '<div style="background:#fff;border-radius:12px;border:1px solid #e2e8f0;min-height:400px;display:flex;flex-direction:column">' + content + '</div></div>';
}

function sendSrPerf() {
  var inp = document.getElementById("sr-perf-inp");
  var txt = (inp ? inp.value : "").trim();
  if (!txt) return;
  S.srPerfHist = S.srPerfHist || [];
  S.srPerfHist.push({role:"user", content:txt});
  if (inp) inp.value = "";
  S.srPerfLoading = true; render();
  setTimeout(function(){ var el=document.getElementById("sr-perf-msgs"); if(el) el.scrollTop=el.scrollHeight; }, 50);
  fetch("/api/agent", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      agent: "performance",
      message: txt,
      conversationId: "test_perf_" + (S.user && S.user.id || "admin"),
      channel: "web",
      metadata: { leadName: "Teste Admin" }
    })
  }).then(function(r){ return r.json(); }).then(function(data){
    S.srPerfHist.push({role:"assistant", content: data.response || data.error || "Sem resposta"});
    S.srPerfLoading = false; render();
    setTimeout(function(){ var el=document.getElementById("sr-perf-msgs"); if(el) el.scrollTop=el.scrollHeight; }, 80);
  }).catch(function(e){
    S.srPerfHist.push({role:"assistant", content:"Erro: "+e.message});
    S.srPerfLoading = false; render();
  });
}


</script>
</body>
</html>
