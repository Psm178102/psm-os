function FunnelChart(steps) {
  const mx = Math.max(...steps.map(s=>s.val),1);
  return steps.map((s,i)=>{
    const pct=parseFloat((s.val/mx*100).toFixed(2));
    const prev=i>0?steps[i-1].val:s.val;
    const conv=prev>0?Math.round(s.val/prev*100):100;
    return '<div style="margin-bottom:10px">'      +'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">'      +'<span style="font-weight:700;color:var(--navy)">'+s.lbl+'</span>'      +'<span style="font-weight:800;color:'+s.c+'">'+s.val+(i>0?' ('+conv+'% conv.)':'')+' </span>'      +'</div>'      +'<div style="background:var(--cream3);border-radius:6px;overflow:hidden;height:30px">'      +'<div style="width:'+pct+'%;min-width:30px;background:'+s.c+';height:100%;display:flex;align-items:center;padding:0 8px;transition:width .5s">'      +'<span style="color:#fff;font-size:10px;font-weight:700">'+s.val+'</span></div></div>';  }).join('');}

    });
    content='<div class="kgrid mb2">'      +Kpi('🎯 Meta VGV',fmt(vgvMeta),'meta do período',null,'var(--navy)')      +Kpi('✅ Realizado',fmt(vgvReal),pctVGV+'% da meta',{up:pctVGV>=100,txt:pctVGV+'%'},pctVGV>=100?'var(--g)':pctVGV>=70?'var(--a)':'var(--r)')      +Kpi('📈 Projetado',fmt(vgvProj),'se manter ritmo',{up:pctProj>=100,txt:pctProj+'% da meta'},pctProj>=100?'var(--g)':'var(--a)')      +Kpi('📅 Mês',diaAtual+'/'+diasMes+' dias',parseFloat((percMes*100).toFixed(2))+'%',null,'var(--b)')      +'</div>'      +'<div class="card mb2" style="padding:18px"><div class="ctitle" style="margin-bottom:14px">VGV — Meta × Realizado × Projetado</div>'      +FunnelChart([{lbl:'Meta',val:vgvMeta,c:'#0f172a'},{lbl:'Projetado',val:vgvProj,c:'#d97706'},{lbl:'Realizado',val:vgvReal,c:'#15803d'}])      +'</div>'      +'<div class="card"><div class="ctitle">Por Corretor</div>'      +'<div style="display:flex;flex-direction:column;gap:10px;margin-top:10px">'      +bMVR.map(({b,bM,bR,bP,pct})=>        '<div style="background:var(--cream2);border-radius:8px;padding:10px">'        +'<div style="display:flex;justify-content:space-between;margin-bottom:6px">'        +'<span style="font-size:12px;font-weight:700">'+b.name.split(' ')[0]+'</span>'        +'<span style="font-size:12px;font-weight:800;color:'+(pct>=100?'var(--g-tx)':pct>=70?'var(--a-tx)':'var(--r-tx)')+'">'+pct+'%</span></div>'        +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:10px;margin-bottom:6px">'        +'<div><div style="color:var(--muted)">Meta</div><div style="font-weight:700">'+fmt(bM)+'</div></div>'        +'<div><div style="color:var(--muted)">Realizado</div><div style="font-weight:700;color:var(--g-tx)">'+fmt(bR)+'</div></div>'        +'<div><div style="color:var(--muted)">Projetado</div><div style="font-weight:700;color:'+(bP>=bM?'var(--g-tx)':'var(--a-tx)')+'">'+fmt(bP)+'</div></div>'        +'</div>'        +PB(bR,bM||1,pct>=100?'#16a34a':pct>=70?'#d97706':'#dc2626')        +'</div>')        .join('')      +'</div></div>';  }

    return '<div class="phd"><h1>Métricas Avançadas</h1><p>Dados em tempo real do RD Station CRM</p></div>'
    + (canFilter ? '<div style="margin-bottom:14px"><select class="sel-f" onchange="S.metBroker=this.value;render()">'
      + '<option value="all">Todos Corretores</option>'
      + brokers.map(b => '<option value="'+b.id+'"'+(cb===b.id?' selected':'')+'>'+b.name+'</option>').join('')

    + tabBar + content;
}

  else if (tab === 'proj') {
    // Projeção anual
    const du_pass = METRICS.du_pass || 1;

  return df + '<div class="phd"><h1>OKRs & Metas</h1><p>'+METRICS.mes+'</p></div>'

// ─── ONE ON ONE ───────────────────────────────────────────────────────────────
// --- Google Sheets integration for One on One ---
function _ooFetchSheet(bid) {
  var url = (S.ooSheetLinks||{})[bid];
  if (!url) return;
  var cache = (S.ooSheetCache||{})[bid];
  function applyData(totals) {
    var campos = ['lig_real','lig_atend','tent_agend','agend','vis','prop','capt','vend'];
    for (var k in totals) {
      var el = document.getElementById('oo_v_' + k);
      if (el) el.textContent = totals[k] > 0 ? totals[k] : 0;
    }
    for (var ci = 1; ci < campos.length; ci++) {
      var cel = document.getElementById('oo_conv_' + campos[ci]);
      if (!cel) continue;
      var prev = totals[campos[ci-1]] || 0;
      var cur = totals[campos[ci]] || 0;
      cel.textContent = prev > 0 ? (cur/prev*100).toFixed(1) + '%' : '';
    }
    var ind = document.getElementById('oo_sheet_status');
    if (ind) ind.innerHTML = '<span style="color:#10b981;font-size:10px">\u2705 Planilha carregada</span>';
  }
  // Use cache if available
  if (cache && Object.keys(cache).length > 0) {
    applyData(cache);
    return;
  }
  var m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (!m) return;
  var sid = m[1];
  var directUrl = 'https://docs.google.com/spreadsheets/d/' + sid + '/export?format=csv';
  var proxyUrl = S.ooProxyUrl ? S.ooProxyUrl + '?id=' + sid : '';
  var ind = document.getElementById('oo_sheet_status');
  if (ind) ind.innerHTML = '<span style="color:#94a3b8;font-size:10px">Carregando...</span>';
  function parseCSV(csv) {
    var map = {
      'TENTATIVA DE LIGA': 'lig_real',
      'ATENDIDA': 'lig_atend',
      'TENTATIVA DE AGENDAMENTO': 'tent_agend',
      'DE  AGEN': 'agend',
      'N\u00BA DE AGEN': 'agend',
      'DE VISITA': 'vis',
      'PROPOSTA': 'prop',
      'VENDA': 'vend',
      'CONTRATO': 'vend',
      'DESCARTADO': 'desc',
      'CAPTA': 'capt'
    };
    function parseLine(line) {
      var cells = [], cur = '', inQ = false;
      for (var i = 0; i < line.length; i++) {
        var c = line.charAt(i);
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
        else if (c === '\r') {}
        else { cur += c; }
      }
      cells.push(cur.trim());
      return cells;
    }
    var rows = csv.split('\n');
    var totals = {};
    var inMonthly = false;
    for (var i = 0; i < rows.length; i++) {
      var cells = parseLine(rows[i]);
      var label = (cells[5]||'').toUpperCase();
      if (label.indexOf('PER') !== -1 && label.indexOf('ODO') !== -1) { inMonthly = true; continue; }
      if (label.indexOf('SEMANA') !== -1) { inMonthly = false; continue; }
      if (!inMonthly || !label) continue;
      for (var mk in map) {
        if (label.indexOf(mk) !== -1 && !totals[map[mk]]) {
          var val = 0;
          for (var ci = cells.length - 1; ci > 5; ci--) {
            var raw = (cells[ci]||'').replace(/\./g,'').replace(',','.').replace(/[^0-9.\-]/g,'');
            var n = parseFloat(raw);
            if (!isNaN(n)) { val = Math.round(n); break; }
          }
          totals[map[mk]] = val;
          break;
        }
      }
    }
    return totals;
  }
  fetch(directUrl).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.text();
  }).then(function(csv) {
    if (csv.length < 50 || csv.indexOf('<') === 0) throw new Error('invalid');
    var totals = parseCSV(csv);
    if (!S.ooSheetCache) S.ooSheetCache = {};
    S.ooSheetCache[bid] = totals;
    saveState();
    applyData(totals);
  }).catch(function() {
    if (proxyUrl) {
      fetch(proxyUrl).then(function(r) { return r.text(); }).then(function(csv) {
        if (csv.indexOf('ERROR') === 0) throw new Error(csv);
        var totals = parseCSV(csv);
        if (!S.ooSheetCache) S.ooSheetCache = {};
        S.ooSheetCache[bid] = totals;
        saveState();
        applyData(totals);
      }).catch(function() {
        if (ind) ind.innerHTML = '<span style="color:#ef4444;font-size:10px">Erro ao carregar</span>';
      });
    } else {
      if (ind) ind.innerHTML = '<span style="color:#f59e0b;font-size:10px">\u26A0 Planilha privada \u2014 use cache ou <a href=\"#\" onclick=\"ooSetupProxy();return false\" style=\"color:#3b82f6;text-decoration:underline\">configure proxy</a></span>';
    }
  });
}
function ooSetupProxy() {
  var cur = S.ooProxyUrl || '';
  var html = '<div style="padding:20px;max-width:480px">'
    + '<h3 style="color:#f1f5f9;margin:0 0 12px">Configurar Acesso</h3>'
    + '<p style="color:#94a3b8;font-size:12px;line-height:1.5">Crie um proxy no <a href=\"https://script.google.com\" target=\"_blank\" style=\"color:#3b82f6\">Google Apps Script</a>:</p>'
    + '<textarea id=\"oo_proxy_code\" readonly style=\"width:100%;height:80px;background:#0f172a;color:#10b981;border:1px solid #334155;border-radius:4px;padding:6px;font-size:10px;margin:8px 0;font-family:monospace\">function doGet(e){var id=e.parameter.id;try{var ss=SpreadsheetApp.openById(id);var d=ss.getSheets()[0].getDataRange().getValues();var csv=d.map(function(r){return r.map(function(c){var s=String(c);return(s.indexOf(\",\")>-1)?\'\"\'+s+\'\"\':s}).join(\",\")}).join(\"\\n\");return ContentService.createTextOutput(csv).setMimeType(ContentService.MimeType.TEXT)}catch(err){return ContentService.createTextOutput(\"ERROR:\"+err.message)}}</textarea>'

function ooGetMonthKey(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'); }
function ooGetDayKey(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function ooGetDaysInMonth(y,m) { return new Date(y, m, 0).getDate(); }
function ooGetWorkDays(y,m) {
  var total = 0;
  for (var d = 1; d <= ooGetDaysInMonth(y,m); d++) {
    var dow = new Date(y, m-1, d).getDay();
    if (dow > 0 && dow < 6) total++;
  }
  return total;
}
function ooGetWorkDaysPassed(y,m) {
  var today = new Date();
  var total = 0;
  var maxDay = (today.getFullYear() === y && today.getMonth()+1 === m) ? today.getDate() : ooGetDaysInMonth(y,m);
  for (var d = 1; d <= maxDay; d++) {
    var dow = new Date(y, m-1, d).getDay();
    if (dow > 0 && dow < 6) total++;
  }
  return total;
}

var OO_FUNNEL_STEPS = [
  {from:'lig_real', to:'lig_atend', lbl:'Ligacoes -> Atendidas'},
  {from:'lig_atend', to:'tent_agend', lbl:'Atendidas -> Tent. Agend.'},

  {from:'vis', to:'prop', lbl:'Visitas -> Propostas'},

];
function ooGetFrenteForBroker(bid) {
  var u = USERS_BASE.find(function(x){ return x.id === bid; });
  return u ? (u.frente || 'geral') : 'geral';
}
function ooGetFunnelPct(frente) {
  if (!S.ooFunnelPct) S.ooFunnelPct = {};
  return S.ooFunnelPct[frente] || {};
}
function ooSaveFunnelPct(frente, data) {
  if (!S.ooFunnelPct) S.ooFunnelPct = {};
  S.ooFunnelPct[frente] = data;
  saveState();
}
function ooCalcFunnelPctFromData(realizado) {
  var pct = {};
  OO_FUNNEL_STEPS.forEach(function(step) {
    var fromVal = realizado[step.from] || 0;
    var toVal = realizado[step.to] || 0;
    pct[step.from + '_to_' + step.to] = fromVal > 0 ? Math.round(toVal / fromVal * 10000) / 100 : 0;
  });
  return pct;
}
function ooProjectForward(realizado, funnelPct) {
  var proj = {};
  OO_FUNNEL_STEPS.forEach(function(step) {
    var key = step.from + '_to_' + step.to;
    var pctVal = funnelPct[key] || 0;
    var fromVal = realizado[step.from] || 0;
    proj[step.to] = fromVal * pctVal / 100;
  });
  return proj;
}
function ooProjectBackward(metaVendas, funnelPct) {
  var need = {vend: metaVendas};
  for (var i = OO_FUNNEL_STEPS.length - 1; i >= 0; i--) {
    var step = OO_FUNNEL_STEPS[i];
    var key = step.from + '_to_' + step.to;
    var pctVal = funnelPct[key] || 0;
    var toVal = need[step.to] || 0;
    need[step.from] = pctVal > 0 ? Math.ceil(toVal / (pctVal / 100)) : 0;
  }
  return need;
}

    var key = step.from + '_to_' + step.to;

    if (el) data[key] = parseFloat(el.value) || 0;

function ooAggMonth(bid, monthKey) {
  var daily = ((S.ooDaily||{})[bid]||{})[monthKey] || {};
  var totals = {};
  OO_CAMPOS.forEach(function(c) { totals[c.k] = 0; });
  Object.keys(daily).forEach(function(dayKey) {
    var d = daily[dayKey];
    OO_CAMPOS.forEach(function(c) { totals[c.k] += (d[c.k] || 0); });
  });
  return totals;
}
function ooAggYear(bid, year) {
  var totals = {};
  OO_CAMPOS.forEach(function(c) { totals[c.k] = 0; });
  for (var m = 1; m <= 12; m++) {
    var mk = year + '-' + String(m).padStart(2,'0');
    var mt = ooAggMonth(bid, mk);
    OO_CAMPOS.forEach(function(c) { totals[c.k] += mt[c.k]; });
  }
  return totals;
}
function ooGetMetas(bid, monthKey) {
  return ((S.ooMetas||{})[bid]||{})[monthKey] || {};
}
function ooGetMetasAnual(bid, year) {
  return ((S.ooMetas||{})[bid]||{})[year] || {};
}
function ooSaveDaily(bid, dayKey, data) {
  if (!S.ooDaily) S.ooDaily = {};
  if (!S.ooDaily[bid]) S.ooDaily[bid] = {};
  var mk = dayKey.substring(0, 7);
  if (!S.ooDaily[bid][mk]) S.ooDaily[bid][mk] = {};
  S.ooDaily[bid][mk][dayKey] = data;
  saveState();
}
function ooSaveMetas(bid, key, data) {

  if (!S.ooMetas[bid]) S.ooMetas[bid] = {};
  S.ooMetas[bid][key] = data;

}

// Cache de arquivos do Drive
let _driveCache = {};
let _driveCacheTTL = 5 * 60 * 1000; // 5 min

async function fetchDriveFiles(folderId) {
  folderId = folderId || GDRIVE_ROOT_ID;
  const cacheKey = 'gd_' + folderId;
  const cached = _driveCache[cacheKey];
  if (cached && Date.now() - cached.ts < _driveCacheTTL) return cached.data;

  const url = 'https://www.googleapis.com/drive/v3/files'
    + '?q=' + encodeURIComponent("'" + folderId + "' in parents and trashed=false")
    + '&key=' + GDRIVE_API_KEY
    + '&fields=' + encodeURIComponent('files(id,name,mimeType,size,modifiedTime,iconLink,thumbnailLink,webViewLink,webContentLink)')
    + '&orderBy=folder,name'
    + '&pageSize=100';

  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const files = data.files || [];
    _driveCache[cacheKey] = { data: files, ts: Date.now() };
    return files;
  } catch(e) {
    console.error('[Drive]', e.message);
    toast('Erro ao carregar Drive: ' + e.message, 'err');
    return [];
  }
}

function driveFileIcon(mime) {
  if (!mime) return '📄';
  if (mime.includes('folder')) return '📁';
  if (mime.includes('spreadsheet') || mime.includes('excel')) return '📊';
  if (mime.includes('document') || mime.includes('word')) return '📝';
  if (mime.includes('presentation') || mime.includes('powerpoint')) return '📰';
  if (mime.includes('pdf')) return '📕';
  if (mime.includes('image')) return '🖼️';
  if (mime.includes('video')) return '🎬';
  if (mime.includes('audio')) return '🎵';
  if (mime.includes('zip') || mime.includes('rar') || mime.includes('compressed')) return '📦';
  return '📄';
}

function driveFileSize(bytes) {
  if (!bytes) return '';
  const n = parseInt(bytes);
  if (n > 1048576) return (n/1048576).toFixed(1) + ' MB';
  if (n > 1024) return (n/1024).toFixed(0) + ' KB';
  return n + ' B';
}

        + '<span style="font-size:11px;color:var(--muted)">▶</span></div>';
    });
    // Then files
    docs.forEach(f => {
      const ico = driveFileIcon(f.mimeType);
      const sz = driveFileSize(f.size);

        + '<a href="' + link + '" target="_blank" rel="noreferrer" class="btn bout bsm" style="text-decoration:none;font-size:10px;flex-shrink:0">Abrir</a>'
        + '</div>';
    });
  }

  return '<div class="phd"><h1>📁 Drive PSM</h1><p>Arquivos e documentos do Google Drive — navegue pelas pastas em tempo real</p></div>'
    + '<div style="display:flex;flex-direction:column;gap:12px;height:calc(100vh - 180px)">'
    // Top bar: breadcrumb + actions
    + '<div class="card" style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px">'
    + '<div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;overflow-x:auto">' + breadcrumb + '</div>'
    + '<div style="display:flex;gap:6px;flex-shrink:0">'
    + '<a href="' + driveUrl + '" target="_blank" rel="noreferrer" class="btn bp1 bsm" style="text-decoration:none;font-size:11px">↗ Abrir no Drive</a>'
    + '<button class="btn bout bsm" style="font-size:11px" onclick="navigateDrive(\'' + currentFolder.id + '\',\'' + currentFolder.name.replace(/'/g,"\\'") + '\')">🔄 Atualizar</button>'
    + '</div></div>'
    // Search
    + '<div style="flex-shrink:0"><input class="finp" placeholder="🔍 Buscar nesta pasta..." style="width:100%;font-size:12px;padding:8px 12px" value="' + (S.driveSearch||'') + '" oninput="S.driveSearch=this.value;render()"></div>'

    + '<div style="font-size:11px;color:var(--muted);padding:0 4px;flex-shrink:0">' + folders.length + ' pastas \u00B7 ' + docs.length + ' arquivos</div>'
    // File list
    + '<div class="card" style="flex:1;overflow-y:auto;padding:8px">' + fileListHTML + '</div>'
    + '</div>';
}

// ─── MAPA PSM ────────────────────────────────────────────────────────────────
function pgMapa() {
  // Google Maps API loader
  if (!window._gmapsLoading && !window._gmapsReady) {
    window._gmapsLoading = true;
    var s = document.createElement('script');
    s.src = 'https://maps.googleapis.com/maps/api/js?key=' + GDRIVE_API_KEY + '&callback=_gmapsCb&v=weekly';
    s.async = true; s.defer = true;
    document.head.appendChild(s);
    window._gmapsCb = function(){ window._gmapsReady = true; delete window._gmapsLoading; };
  }

  // KML file ID in Drive PSM > Documentos
  var KML_FILE_ID = '1NIEUohSCw-A2iq3VY_inPTSALRmxK3P-';

  if (!S.mapFilter) S.mapFilter = 'all';
  if (!S.mapSearch) S.mapSearch = '';

  // Use cached pins or show loading
  var pins = window._kmlPinsCache || [];
  var fPins = pins.filter(function(p) {
    if (S.mapFilter !== 'all' && p.s !== S.mapFilter) return false;
    if (S.mapSearch && !p.n.toLowerCase().includes(S.mapSearch.toLowerCase())) return false;
    return true;
  });

  var total = pins.length;
  var ativos = pins.filter(function(p){ return p.s !== 'Lancamento'; }).length;
  var lanc = pins.filter(function(p){ return p.s === 'Lancamento'; }).length;

  var cards =
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:16px">' +
    '<div class="card" style="padding:16px;text-align:center"><div style="font-size:28px;font-weight:700;color:var(--g)">' + total + '</div><div style="color:var(--muted);font-size:12px">Total Empreendimentos</div></div>' +
    '<div class="card" style="padding:16px;text-align:center"><div style="font-size:28px;font-weight:700;color:var(--g)">' + ativos + '</div><div style="color:var(--muted);font-size:12px">Ativos</div></div>' +
    '<div class="card" style="padding:16px;text-align:center"><div style="font-size:28px;font-weight:700;color:var(--gold)">' + lanc + '</div><div style="color:var(--muted);font-size:12px">Lancamentos</div></div>' +
    '<div class="card" style="padding:16px;text-align:center"><div style="font-size:28px;font-weight:700;color:var(--b)">' + fPins.length + '</div><div style="color:var(--muted);font-size:12px">No Filtro Atual</div></div>' +
    '</div>';

  var filters =
    '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">' +
    '<button class="btn ' + (S.mapFilter==='all'?'bp1':'bout') + ' bsm" onclick="S.mapFilter=\'all\';render()">Todos</button>' +
    '<button class="btn ' + (S.mapFilter!=='all'&&S.mapFilter!=='Lancamento'?'bp1':'bout') + ' bsm" onclick="S.mapFilter=\'Ativo\';render()">Ativos</button>' +
    '<button class="btn ' + (S.mapFilter==='Lancamento'?'bp1':'bout') + ' bsm" onclick="S.mapFilter=\'Lancamento\';render()">Lancamentos</button>' +
    '<input type="text" class="finp" value="' + (S.mapSearch||'') + '" placeholder="Buscar empreendimento..." oninput="S.mapSearch=this.value;render()" style="flex:1;min-width:200px">' +
    '</div>';

  var mapDiv = '<div id="psm-gmap-wrap" style="width:100%;height:calc(100vh - 340px);min-height:400px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--cream4)"><div id="psm-gmap" style="width:100%;height:100%"></div></div>';

  setTimeout(function(){
    var el = document.getElementById('psm-gmap');
    if (!el) return;

    // Fetch KML from Drive if not cached or stale (>5min)
    var now = Date.now();
    if (!window._kmlPinsCache || !window._kmlLastFetch || (now - window._kmlLastFetch) > 300000) {
      el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted)">Carregando empreendimentos do Google Earth...</div>';
      fetch('https://www.googleapis.com/drive/v3/files/' + KML_FILE_ID + '?alt=media&key=' + GDRIVE_API_KEY)
      .then(function(r){ return r.text(); })
      .then(function(kmlText){
        var parser = new DOMParser();
        var kml = parser.parseFromString(kmlText, 'text/xml');
        var placemarks = kml.querySelectorAll('Placemark');
        var parsed = [];
        placemarks.forEach(function(pm){
          var nameEl = pm.querySelector('name');
          var coordsEl = pm.querySelector('coordinates');
          if (nameEl && coordsEl) {
            var nm = nameEl.textContent.trim();
            if (!nm || nm.indexOf('sem titulo') > -1 || nm.indexOf('sem t\u00edtulo') > -1 || nm.startsWith('Pol') || nm.startsWith('Linha') || nm.startsWith('Medi')) return;
            var c = coordsEl.textContent.trim().split(',');
            if (c.length >= 2) {
              var isLanc = nm.indexOf('LANCAMENTO') > -1 || nm.indexOf('LAN\u00c7AMENTO') > -1 || nm.indexOf('(LAN') > -1;
              parsed.push({ n: nm.replace(/\s*\(LAN.*?\)/, '').trim(), lat: parseFloat(c[1]), lng: parseFloat(c[0]), s: isLanc ? 'Lancamento' : 'Ativo', t: 'Empreendimento' });
            }
          }
        });
        window._kmlPinsCache = parsed;
        window._kmlLastFetch = Date.now();
        render();
      })
      .catch(function(e){
        el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--r)">Erro ao carregar KML: ' + e.message + '</div>';
      });
      return;
    }

    // Wait for Maps API then render
    if (!window._gmapsReady) {
      el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted)">Carregando Google Maps...</div>';
      var retry = setInterval(function(){
        if (window._gmapsReady) { clearInterval(retry); requestAnimationFrame(function(){ _renderGMap(document.getElementById('psm-gmap'), fPins); }); }
      }, 500);
      return;
    }
    requestAnimationFrame(function(){ _renderGMap(el, fPins); });
  }, 200);

  return '<div class="phd">\ud83c\udf0d Mapa PSM</div>' +
    '<p style="color:var(--muted);margin-bottom:16px">Empreendimentos em Sao Jose do Rio Preto - dados do Google Earth (atualiza automaticamente)</p>' +
    cards + filters + mapDiv;
}

function _renderGMap(el, pins) {
  if (!el || !pins) return;
  el.innerHTML = '';

  var center = {lat:-20.8167, lng:-49.3789};
  var map = new google.maps.Map(el, {
    center: center, zoom: 13, mapTypeId: 'hybrid',
    mapTypeControl: true, streetViewControl: true, fullscreenControl: true,
    zoomControl: true, gestureHandling: 'greedy'
  });
  window._psmGMap = map;

  var iw = new google.maps.InfoWindow();
  var colors = {Ativo:'#10b981', Lancamento:'#d4a843'};

  pins.forEach(function(p) {
    var clr = colors[p.s] || '#3b82f6';
    var mk = new google.maps.Marker({
      position: {lat: p.lat, lng: p.lng}, map: map, title: p.n,
      icon: {path: google.maps.SymbolPath.CIRCLE, scale: 8, fillColor: clr, fillOpacity: 0.9, strokeColor: '#fff', strokeWeight: 2}
    });
    mk.addListener('click', function() {
      iw.setContent(
        '<div style="font-family:Plus Jakarta Sans,sans-serif;padding:8px;min-width:200px">' +
        '<h3 style="margin:0 0 4px;font-size:15px;color:#0f172a">' + p.n + '</h3>' +
        '<span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;background:' + clr + '">' + p.s + '</span>' +
        '</div>'
      );
      iw.open(map, mk);
    });
  });
}

function updateFormacao(){
  // Usa proxy Vercel para contornar CORS
  if(window._kiwifyStudents) return; // ja carregou
  fetch("/api/kiwify?action=students")
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data.ok){
        window._kiwifyStudents = data.students || [];
        console.log("[Kiwify] " + data.total + " alunos carregados via proxy");
        render();
      } else {
        console.error("[Kiwify] Erro:", data.error);
        window._kiwifyStudents = [];
        render();
      }
    })
    .catch(function(err){
      console.error("[Kiwify] Fetch falhou:", err);
      window._kiwifyStudents = [];
      render();
    });
}

// ─── CAPTAÇÃO DE IMÓVEIS ──────────────────────────────────────────────────────
function pgCaptacao() {
  const captacoes = JSON.parse(localStorage.getItem('psm_captacao') || '[]');
  const total = captacoes.length;
  const ativas = captacoes.filter(c => c.status === 'ativo').length;
  const vendidas = captacoes.filter(c => c.status === 'vendido').length;

  setTimeout(() => {
  document.querySelector('#cap-add').onclick = () => {
    const nome = prompt('Nome/Identifica\u00e7\u00e3o do im\u00f3vel:');
    if (!nome) return;
    const tipo = prompt('Tipo (apartamento/casa/terreno/comercial):') || 'apartamento';
    const bairro = prompt('Bairro:') || '\u2014';
    const valor = prompt('Valor (R$):') || '0';
    const arr = JSON.parse(localStorage.getItem('psm_captacao') || '[]');
    arr.push({ nome, tipo, bairro, valor: parseFloat(valor) || 0, status: 'ativo', data: new Date().toISOString().split('T')[0] });
    localStorage.setItem('psm_captacao', JSON.stringify(arr));
    pgCaptacao();
  };
  window.removeCaptacao = function(i) {
    const arr = JSON.parse(localStorage.getItem('psm_captacao') || '[]');
    arr.splice(i, 1);
    localStorage.setItem('psm_captacao', JSON.stringify(arr));
    pgCaptacao();
  };
  }, 0);
  return `
  <div style="max-width:1200px;margin:auto;padding:24px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
      <span style="font-size:32px">\ud83c\udfe0</span>
      <div>
        <h2 style="margin:0;color:#fff;font-size:22px">Capta\u00e7\u00e3o de Im\u00f3veis</h2>
        <p style="margin:4px 0 0;color:#94a3b8;font-size:13px">Controle de im\u00f3veis captados</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px">
      <div style="background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid #3b82f6">
        <div style="color:#94a3b8;font-size:12px">TOTAL CAPTADOS</div>
        <div style="color:#3b82f6;font-size:28px;font-weight:700;margin-top:6px">${total}</div>
      </div>
      <div style="background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid #22c55e">
        <div style="color:#94a3b8;font-size:12px">ATIVOS</div>
        <div style="color:#22c55e;font-size:28px;font-weight:700;margin-top:6px">${ativas}</div>
      </div>
      <div style="background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid #f59e0b">
        <div style="color:#94a3b8;font-size:12px">VENDIDOS</div>
        <div style="color:#f59e0b;font-size:28px;font-weight:700;margin-top:6px">${vendidas}</div>
      </div>
    </div>
    <div style="background:#1e293b;border-radius:12px;padding:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="color:#fff;margin:0;font-size:16px">Im\u00f3veis Captados</h3>
        <button id="cap-add" style="padding:6px 14px;border-radius:8px;border:none;background:#3b82f6;color:#fff;cursor:pointer;font-size:12px">+ Nova Capta\u00e7\u00e3o</button>
      </div>
      ${captacoes.length === 0 ? '<p style="color:#64748b;font-size:13px">\u2014 Nenhum im\u00f3vel captado</p>' : `
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:2px solid #334155">
          <th style="padding:10px;text-align:left;color:#94a3b8;font-size:11px">DATA</th>
          <th style="padding:10px;text-align:left;color:#94a3b8;font-size:11px">IM\u00d3VEL</th>
          <th style="padding:10px;text-align:left;color:#94a3b8;font-size:11px">TIPO</th>
          <th style="padding:10px;text-align:left;color:#94a3b8;font-size:11px">BAIRRO</th>
          <th style="padding:10px;text-align:right;color:#94a3b8;font-size:11px">VALOR</th>
          <th style="padding:10px;text-align:center;color:#94a3b8;font-size:11px">STATUS</th>
          <th style="padding:10px;text-align:center;color:#94a3b8;font-size:11px">A\u00c7\u00c3O</th>
        </tr></thead>
        <tbody>
          ${captacoes.map((c, i) => `
          <tr style="border-bottom:1px solid #334155">
            <td style="padding:8px 10px;color:#64748b;font-size:12px">${c.data || '\u2014'}</td>
            <td style="padding:8px 10px;color:#fff;font-size:12px">${c.nome || '\u2014'}</td>
            <td style="padding:8px 10px;color:#94a3b8;font-size:12px">${c.tipo || '\u2014'}</td>
            <td style="padding:8px 10px;color:#94a3b8;font-size:12px">${c.bairro || '\u2014'}</td>
            <td style="padding:8px 10px;text-align:right;color:#22c55e;font-size:12px;font-weight:600">${c.valor ? 'R$ ' + Number(c.valor).toLocaleString('pt-BR') : '\u2014'}</td>
            <td style="padding:8px 10px;text-align:center"><span style="padding:3px 8px;border-radius:4px;font-size:10px;background:${c.status === 'vendido' ? '#1a3a2a' : '#0f2a4a'};color:${c.status === 'vendido' ? '#22c55e' : '#3b82f6'}">${c.status || 'ativo'}</span></td>
            <td style="padding:8px 10px;text-align:center"><button onclick="removeCaptacao(${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px">\u00d7</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`}
    </div>
  </div>`;

}

    mk.conteudos.forEach(function(c, idx) {
      content += '<div style="display:flex;align-items:center;gap:12px;padding:14px;margin-bottom:8px;background:var(--cream2);border-radius:10px;border-left:4px solid '+(c.status==='publicado'?'var(--g)':c.status==='agendado'?'var(--b)':c.status==='producao'?'var(--a)':'var(--muted)')+'">'
        + '<div style="font-size:24px">'+(tipoIco[c.tipo]||'\uD83D\uDCDD')+'</div>'
        + '<div style="flex:1;min-width:0">'
        + '<div style="font-size:13px;font-weight:700;color:var(--navy)">'+c.titulo+'</div>'
        + '<div style="font-size:10px;color:var(--muted);margin-top:2px">'+c.tipo+(c.data?' \u2022 '+c.data:'')+(c.engajamento>0?' \u2022 '+c.engajamento.toLocaleString('pt-BR')+' interações':'')+'</div>'
        + '</div>'
        + '<div style="text-align:right">'
        + '<div style="font-size:10px;padding:3px 10px;border-radius:6px;background:'+(c.status==='publicado'?'var(--g-bg)':c.status==='agendado'?'var(--b-bg)':c.status==='producao'?'var(--a-bg)':'var(--cream3)')+';color:'+(c.status==='publicado'?'var(--g-tx)':c.status==='agendado'?'var(--b-tx)':c.status==='producao'?'var(--a-tx)':'var(--muted)')+';font-weight:600">'+statusLbl[c.status]+'</div>'
        + (c.engajamento > 0 ? '<div style="font-size:9px;color:var(--g-tx);margin-top:4px">\u2764\uFE0F '+c.engajamento.toLocaleString('pt-BR')+'</div>' : '')
        + '</div></div>';
    });
    content += '</div></div>';

    // Estatísticas de conteúdo
    var pub = mk.conteudos.filter(function(c){return c.status==='publicado';}).length;
    var agend = mk.conteudos.filter(function(c){return c.status==='agendado';}).length;
    var prod = mk.conteudos.filter(function(c){return c.status==='producao';}).length;
    var totalEng = mk.conteudos.reduce(function(a,c){return a+(c.engajamento||0);},0);

    content += '<div class="kgrid">'
      + Kpi('Publicados', pub, 'este m\u00eas', null, 'var(--g)')
      + Kpi('Agendados', agend, 'pr\u00f3ximos dias', null, 'var(--b)')
      + Kpi('Em Produ\u00e7\u00e3o', prod, 'em andamento', null, 'var(--a)')
      + Kpi('Engajamento Total', totalEng.toLocaleString('pt-BR'), 'intera\u00e7\u00f5es', null, 'var(--pu)')
      + '</div>';

  } else if (mkTab === 'investimento' && isDiretor) {
    // ── INVESTIMENTO (DIRETOR ONLY) ──
    content = '<div class="card mb2" style="background:linear-gradient(135deg,var(--navy) 0%,#1e3a5f 100%);color:#fff;padding:24px">'
      + '<div style="font-size:11px;opacity:.5;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Investimento Total no M\u00eas</div>'
      + '<div style="font-size:32px;font-weight:800">R$ '+fmt(mk.investimento)+'</div>'
      + '<div style="font-size:13px;opacity:.7;margin-top:4px">'+mk.leads_mes+' leads gerados \u2022 R$ '+mk.custo_lead.toFixed(2)+'/lead</div>'
      + '</div>';

    // Breakdown por campanha
    content += '<div class="card mb2"><div class="ctitle">\uD83D\uDCCA Breakdown de Investimento</div>'
      + '<div style="margin-top:12px">';
    mk.campanhas.sort(function(a,b){return b.custo-a.custo;}).forEach(function(c) {
      var pct = mk.investimento > 0 ? Math.round(c.custo / mk.investimento * 100) : 0;
      content += '<div style="margin-bottom:14px">'
        + '<div style="display:flex;justify-content:space-between;margin-bottom:4px">'
        + '<span style="font-size:11px;font-weight:600;color:var(--navy)">'+c.nome+'</span>'
        + '<span style="font-size:11px;font-weight:700">R$ '+fmt(c.custo)+' ('+pct+'%)</span></div>'
        + '<div style="height:8px;background:var(--cream3);border-radius:4px;overflow:hidden">'
        + '<div style="height:100%;width:'+pct+'%;background:'+(c.roi>150?'var(--g)':c.roi>50?'var(--a)':'var(--r)')+';border-radius:4px;transition:width .3s"></div></div>'
        + '<div style="display:flex;justify-content:space-between;margin-top:2px">'
        + '<span style="font-size:9px;color:var(--muted)">'+c.leads+' leads \u2022 R$ '+(c.leads>0?(c.custo/c.leads).toFixed(2):'0')+'/lead</span>'
        + '<span style="font-size:9px;font-weight:600;color:'+(c.roi>150?'var(--g-tx)':c.roi>50?'var(--a-tx)':'var(--r-tx)')+'">ROI: '+c.roi+'%</span></div>'
        + '</div>';
    });
    content += '</div></div>';

    // KPIs financeiros
    var totalCusto = mk.campanhas.reduce(function(a,c){return a+c.custo;},0);
    var avgROI = mk.campanhas.length > 0 ? Math.round(mk.campanhas.reduce(function(a,c){return a+c.roi;},0)/mk.campanhas.length) : 0;

    content += '<div class="kgrid">'
      + Kpi('Custo/Lead', 'R$ '+mk.custo_lead.toFixed(2), 'média geral', null, mk.custo_lead < 25 ? 'var(--g)' : 'var(--a)')
      + Kpi('ROI M\u00e9dio', avgROI+'%', 'todas campanhas', null, avgROI > 100 ? 'var(--g)' : 'var(--a)')
      + Kpi('Leads Qualificados', mk.leads_qualificados, parseFloat((mk.leads_qualificados/mk.leads_mes*100).toFixed(2))+'% do total', null, 'var(--pu)')
      + Kpi('Custo/Lead Qualif.', 'R$ '+(mk.leads_qualificados>0?(mk.investimento/mk.leads_qualificados).toFixed(2):'0'), '', null, 'var(--b)')
      + '</div>';
  }

  return header + tabs + content;
}


// ─── PAGE: FLUXO DE CAIXA ────────────────────────────────────────────────

  return `

      <span style="font-size:32px">\ud83d\udcb5</span>

        <div style="color:#94a3b8;font-size:12px;margin-bottom:8px">ENTRADAS</div>
        <div style="color:#22c55e;font-size:24px;font-weight:700">R$ ${totalEntradas.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
      </div>
      <div style="background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid #ef4444">
        <div style="color:#94a3b8;font-size:12px;margin-bottom:8px">SA\u00cdDAS</div>
        <div style="color:#ef4444;font-size:24px;font-weight:700">R$ ${totalSaidas.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
      </div>
      <div style="background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid ${saldo >= 0 ? '#3b82f6' : '#ef4444'}">
        <div style="color:#94a3b8;font-size:12px;margin-bottom:8px">SALDO</div>
        <div style="color:${saldo >= 0 ? '#3b82f6' : '#ef4444'};font-size:24px;font-weight:700">R$ ${saldo.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
      <div style="background:#1e293b;border-radius:12px;padding:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <h3 style="color:#22c55e;margin:0;font-size:15px">\u2b06\ufe0f Entradas</h3>
          <button onclick="addFluxo('entradas')" style="padding:5px 12px;border-radius:6px;border:none;background:#22c55e;color:#fff;cursor:pointer;font-size:11px">+ Novo</button>
        </div>
        ${(dados.entradas || []).length === 0 ? '<p style="color:#64748b;font-size:12px">\u2014</p>' :
          (dados.entradas || []).map((e, i) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:#0f172a;border-radius:6px;margin-bottom:6px">
            <div><div style="color:#fff;font-size:12px">${e.descricao || '\u2014'}</div><div style="color:#64748b;font-size:10px">${e.data || '\u2014'} | ${e.categoria || ''}</div></div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="color:#22c55e;font-size:13px;font-weight:600">R$ ${(parseFloat(e.valor)||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
              <button onclick="removeFluxo('entradas',${i})" style="background:none;border:none;color:#ef4444;cursor:pointer">\u00d7</button>
            </div>
          </div>`).join('')}
      </div>
      <div style="background:#1e293b;border-radius:12px;padding:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <h3 style="color:#ef4444;margin:0;font-size:15px">\u2b07\ufe0f Sa\u00eddas</h3>
          <button onclick="addFluxo('saidas')" style="padding:5px 12px;border-radius:6px;border:none;background:#ef4444;color:#fff;cursor:pointer;font-size:11px">+ Novo</button>
        </div>
        ${(dados.saidas || []).length === 0 ? '<p style="color:#64748b;font-size:12px">\u2014</p>' :
          (dados.saidas || []).map((e, i) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:#0f172a;border-radius:6px;margin-bottom:6px">
            <div><div style="color:#fff;font-size:12px">${e.descricao || '\u2014'}</div><div style="color:#64748b;font-size:10px">${e.data || '\u2014'} | ${e.categoria || ''}</div></div>
            <div style="display:flex;align-items:center;gap:8px">
              <span style="color:#ef4444;font-size:13px;font-weight:600">R$ ${(parseFloat(e.valor)||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</span>
              <button onclick="removeFluxo('saidas',${i})" style="background:none;border:none;color:#ef4444;cursor:pointer">\u00d7</button>
            </div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
  setTimeout(() => {
    window.addFluxo = function(tipo) {
      const desc = prompt('Descrição:'); if (!desc) return;
      const valor = prompt('Valor (R$):'); if (!valor) return;
      const categoria = prompt('Categoria:') || 'Geral';
      const d = JSON.parse(localStorage.getItem('psm_fluxocaixa') || '{"entradas":[],"saidas":[]}');
      if (!d[tipo]) d[tipo] = [];
      d[tipo].push({ descricao: desc, valor: parseFloat(valor) || 0, categoria, data: new Date().toISOString().split('T')[0] });
      localStorage.setItem('psm_fluxocaixa', JSON.stringify(d));
      render();
    };
    window.removeFluxo = function(tipo, idx) {
      const d = JSON.parse(localStorage.getItem('psm_fluxocaixa') || '{"entradas":[],"saidas":[]}');
      if (d[tipo]) { d[tipo].splice(idx, 1); localStorage.setItem('psm_fluxocaixa', JSON.stringify(d)); }
      render();
    };
  }, 0);
}

// ─── PAGE: DRE ────────────────────────────────────────────────
function pgDre() {

  const mesAtual = new Date().getMonth();
  const categorias = [
    { grupo: 'RECEITAS', color: '#22c55e', items: [
      { key: 'receita_vendas', label: 'Receita com Vendas' },
      { key: 'receita_locacao', label: 'Receita com Loca\u00e7\u00e3o' },
      { key: 'receita_outras', label: 'Outras Receitas' }
    ]},
    { grupo: 'CUSTOS', color: '#ef4444', items: [
      { key: 'custo_pessoal', label: 'Pessoal' },
      { key: 'custo_marketing', label: 'Marketing' },
      { key: 'custo_operacional', label: 'Operacional' },
      { key: 'custo_tecnologia', label: 'Tecnologia' },
      { key: 'custo_outros', label: 'Outros Custos' }
    ]},
    { grupo: 'IMPOSTOS', color: '#f59e0b', items: [
      { key: 'imposto_iss', label: 'ISS' },
      { key: 'imposto_ir', label: 'IR' },
      { key: 'imposto_outros', label: 'Outros Impostos' }
    ]}
  ];
  function getVal(key) { return parseFloat(dados[key]) || 0; }
  const totalReceita = categorias[0].items.reduce((s, i) => s + getVal(i.key), 0);
  const totalCusto = categorias[1].items.reduce((s, i) => s + getVal(i.key), 0);
  const totalImposto = categorias[2].items.reduce((s, i) => s + getVal(i.key), 0);
  const lucro = totalReceita - totalCusto - totalImposto;
  const margem = totalReceita > 0 ? ((lucro / totalReceita) * 100).toFixed(1) : '\u2014';
  return `
  <div style="max-width:1200px;margin:auto;padding:24px">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px">
      <span style="font-size:32px">\ud83d\udcca</span>
      <div>
        <h2 style="margin:0;color:#fff;font-size:22px">DRE \u2014 Demonstrativo de Resultados</h2>
        <p style="margin:4px 0 0;color:#94a3b8;font-size:13px">Refer\u00eancia: ${meses[mesAtual]} ${new Date().getFullYear()}</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px">
      <div style="background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid #22c55e">
        <div style="color:#94a3b8;font-size:12px">RECEITA TOTAL</div>
        <div style="color:#22c55e;font-size:22px;font-weight:700;margin-top:6px">R$ ${totalReceita.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
      </div>
      <div style="background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid #ef4444">
        <div style="color:#94a3b8;font-size:12px">CUSTOS + IMPOSTOS</div>
        <div style="color:#ef4444;font-size:22px;font-weight:700;margin-top:6px">R$ ${(totalCusto + totalImposto).toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
      </div>
      <div style="background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid ${lucro >= 0 ? '#3b82f6' : '#ef4444'}">
        <div style="color:#94a3b8;font-size:12px">LUCRO L\u00cdQUIDO</div>
        <div style="color:${lucro >= 0 ? '#3b82f6' : '#ef4444'};font-size:22px;font-weight:700;margin-top:6px">R$ ${lucro.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
      </div>
      <div style="background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid #8b5cf6">
        <div style="color:#94a3b8;font-size:12px">MARGEM</div>
        <div style="color:#8b5cf6;font-size:22px;font-weight:700;margin-top:6px">${margem}%</div>
      </div>
    </div>
    <div style="background:#1e293b;border-radius:12px;padding:24px">
      <h3 style="color:#fff;margin:0 0 16px;font-size:16px">Detalhamento</h3>
      <table style="width:100%;border-collapse:collapse">
        ${categorias.map(cat => `
          <tr style="background:#0f172a"><td colspan="3" style="padding:10px 14px;color:${cat.color};font-size:13px;font-weight:700">${cat.grupo}</td></tr>
          ${cat.items.map(item => `
          <tr style="border-bottom:1px solid #1e293b">
            <td style="padding:8px 14px 8px 28px;color:#94a3b8;font-size:13px">${item.label}</td>
            <td style="padding:8px 14px;text-align:right;color:#fff;font-size:13px">R$ ${getVal(item.key).toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
            <td style="padding:8px 14px;width:40px"><button onclick="editDre('${item.key}','${item.label}')" style="background:none;border:none;color:#3b82f6;cursor:pointer;font-size:12px">\u270f\ufe0f</button></td>
          </tr>`).join('')}`).join('')}
        <tr style="background:#0f172a;border-top:2px solid #334155">
          <td style="padding:12px 14px;color:#fff;font-size:14px;font-weight:700">RESULTADO L\u00cdQUIDO</td>
          <td style="padding:12px 14px;text-align:right;color:${lucro >= 0 ? '#22c55e' : '#ef4444'};font-size:16px;font-weight:700">R$ ${lucro.toLocaleString('pt-BR',{minimumFractionDigits:2})}</td>
          <td></td>
        </tr>
      </table>
    </div>
  </div>`;
  setTimeout(() => {
    window.editDre = function(key, label) {
      const val = prompt('Valor para ' + label + ' (R$):');
      if (val === null) return;
      const d = JSON.parse(localStorage.getItem('psm_dre') || '{}');
      d[key] = parseFloat(val) || 0;
      localStorage.setItem('psm_dre', JSON.stringify(d));
      render();
    };
  }, 0);
}

// ─── PAGE: COMISSÕES ────────────────────────────────────────────────
function pgComissoes() {
  const comissoes = JSON.parse(localStorage.getItem('psm_comissoes') || '[]');
  const total = comissoes.reduce((s, c) => s + (parseFloat(c.valor) || 0), 0);
  const pagas = comissoes.filter(c => c.status === 'pago');
  const pendentes = comissoes.filter(c => c.status !== 'pago');
  const totalPago = pagas.reduce((s, c) => s + (parseFloat(c.valor) || 0), 0);
  const totalPendente = pendentes.reduce((s, c) => s + (parseFloat(c.valor) || 0), 0);
  setTimeout(() => {
  document.querySelector('#com-add').onclick = () => {
    const corretor = prompt('Nome do corretor:'); if (!corretor) return;
    const imovel = prompt('Im\u00f3vel:') || '\u2014';
    const valor = prompt('Valor da comiss\u00e3o (R$):') || '0';
    const arr = JSON.parse(localStorage.getItem('psm_comissoes') || '[]');
    arr.push({ corretor, imovel, valor: parseFloat(valor) || 0, status: 'pendente', data: new Date().toISOString().split('T')[0] });
    localStorage.setItem('psm_comissoes', JSON.stringify(arr));
    pgComissoes();
  };
  window.toggleComissao = function(i) {
    const arr = JSON.parse(localStorage.getItem('psm_comissoes') || '[]');
    if (arr[i]) { arr[i].status = arr[i].status === 'pago' ? 'pendente' : 'pago'; localStorage.setItem('psm_comissoes', JSON.stringify(arr)); }
    pgComissoes();
  };
  window.removeComissao = function(i) {
    const arr = JSON.parse(localStorage.getItem('psm_comissoes') || '[]');
    arr.splice(i, 1); localStorage.setItem('psm_comissoes', JSON.stringify(arr));
    pgComissoes();

      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px">
      <div style="background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid #3b82f6">
        <div style="color:#94a3b8;font-size:12px">TOTAL</div>
        <div style="color:#3b82f6;font-size:22px;font-weight:700;margin-top:6px">R$ ${total.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
      </div>
      <div style="background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid #22c55e">
        <div style="color:#94a3b8;font-size:12px">PAGAS</div>
        <div style="color:#22c55e;font-size:22px;font-weight:700;margin-top:6px">R$ ${totalPago.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
      </div>
      <div style="background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid #f59e0b">
        <div style="color:#94a3b8;font-size:12px">PENDENTES</div>
        <div style="color:#f59e0b;font-size:22px;font-weight:700;margin-top:6px">R$ ${totalPendente.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
      </div>
    </div>
    <div style="background:#1e293b;border-radius:12px;padding:24px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 style="color:#fff;margin:0;font-size:16px">Registro de Comiss\u00f5es</h3>

      </div>
      ${comissoes.length === 0 ? '<p style="color:#64748b;font-size:13px">\u2014 Nenhuma comiss\u00e3o registrada</p>' : `
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="border-bottom:2px solid #334155">

function pgRepasses() {

  setTimeout(() => {
  document.querySelector('#rep-add').onclick = () => {
    const descricao = prompt('Descri\u00e7\u00e3o do repasse:'); if (!descricao) return;
    const destinatario = prompt('Destinat\u00e1rio:') || '\u2014';
    const valor = prompt('Valor (R$):') || '0';
    const arr = JSON.parse(localStorage.getItem('psm_repasses') || '[]');
    arr.push({ descricao, destinatario, valor: parseFloat(valor) || 0, status: 'agendado', data: new Date().toISOString().split('T')[0] });
    localStorage.setItem('psm_repasses', JSON.stringify(arr));
    pgRepasses();
  };
  window.toggleRepasse = function(i) {
    const arr = JSON.parse(localStorage.getItem('psm_repasses') || '[]');
    if (arr[i]) { arr[i].status = arr[i].status === 'realizado' ? 'agendado' : 'realizado'; localStorage.setItem('psm_repasses', JSON.stringify(arr)); }

  };

    const arr = JSON.parse(localStorage.getItem('psm_repasses') || '[]');

function pgBenchmark() {
  const radarObj = JSON.parse(localStorage.getItem('psm_radar_data') || '{}');
  const concorrentes = Object.keys(radarObj).map(handle => ({ handle, name: handle, ...radarObj[handle] }));
  const metricas = [
    { key: 'seguidores', label: 'Seguidores', icon: '👥', format: v => v ? Number(v).toLocaleString('pt-BR') : '—' },
    { key: 'engajamento', label: 'Engajamento (%)', icon: '💬', format: v => v ? v + '%' : '—' },
    { key: 'volume_anuncios', label: 'Volume Anúncios', icon: '📢', format: v => v || '—' },
    { key: 'preco_medio', label: 'Preço Médio', icon: '💰', format: v => v ? 'R$ ' + Number(v).toLocaleString('pt-BR') : '—' },
    { key: 'market_share', label: 'Market Share', icon: '🏯', format: v => v ? v + '%' : '—' },
    { key: 'nota_google', label: 'Nota Google', icon: '⭐', format: v => v || '—' },
    { key: 'imoveis_ativos', label: 'Imóveis Ativos', icon: '🏠', format: v => v || '—' },
    { key: 'freq_posts', label: 'Posts/Semana', icon: '📅', format: v => v || '—' }
  ];
  function calcStats(key) {
    const vals = concorrentes.map(c => parseFloat(c[key])).filter(v => !isNaN(v) && v > 0);
    if (vals.length === 0) return { avg: 0, max: 0, min: 0, median: 0, count: 0 };
    vals.sort((a, b) => a - b);
    const sum = vals.reduce((s, v) => s + v, 0);
    const avg = sum / vals.length;
    const median = vals.length % 2 === 0 ? (vals[vals.length/2-1] + vals[vals.length/2]) / 2 : vals[Math.floor(vals.length/2)];
    return { avg: Math.round(avg * 100) / 100, max: vals[vals.length-1], min: vals[0], median: Math.round(median * 100) / 100, count: vals.length };
  }
  const noData = concorrentes.length === 0;
  return `
  <div style="max-width:1400px;margin:auto;padding:28px;background:#0f172a;border-radius:16px;min-height:80vh">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:32px">
      <span style="font-size:40px;color:#d4af37">📊</span>
      <div>
        <h2 style="margin:0;color:#fff;font-size:26px;font-weight:700">Benchmark de Mercado</h2>
        <p style="margin:6px 0 0;color:#94a3b8;font-size:14px">Análise comparativa ${noData ? '— nenhum dado' : `(${concorrentes.length} concorrentes)`}</p>
      </div>
    </div>
    ${noData ? `<div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:40px;text-align:center"><p style="color:#64748b;font-size:14px;margin:0">Nenhum concorrente registrado no radar. Adicione dados para visualizar o benchmark.</p></div>` : `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:28px">
      ${metricas.map(m => {
        const stats = calcStats(m.key);
        const top = concorrentes.reduce((best, c) => (parseFloat(c[m.key]) || 0) > (parseFloat(best[m.key]) || 0) ? c : best, concorrentes[0] || {});
        return `
        <div style="background:linear-gradient(135deg,#1e293b 0%,#263549 100%);border:1px solid #334155;border-radius:14px;padding:24px;transition:all 0.3s">
          <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:18px">
            <span style="font-size:32px;line-height:1">${m.icon}</span>
            <div style="flex:1">
              <h3 style="margin:0;color:#fff;font-size:15px;font-weight:700">${m.label}</h3>
              <p style="margin:4px 0 0;color:#94a3b8;font-size:12px">${stats.count} dados disponíveis</p>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
            <div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px">
              <div style="color:#64748b;font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:4px">Média</div>
              <div style="color:#3b82f6;font-size:18px;font-weight:700">${m.format(stats.avg)}</div>
            </div>
            <div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px">
              <div style="color:#64748b;font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:4px">Mediana</div>
              <div style="color:#8b5cf6;font-size:18px;font-weight:700">${m.format(stats.median)}</div>
            </div>
            <div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px">
              <div style="color:#64748b;font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:4px">Máximo</div>
              <div style="color:#22c55e;font-size:18px;font-weight:700">${m.format(stats.max)}</div>
            </div>
            <div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px">
              <div style="color:#64748b;font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:4px">Mínimo</div>
              <div style="color:#ef4444;font-size:18px;font-weight:700">${m.format(stats.min)}</div>
            </div>
          </div>
          <div style="padding:12px;background:#0a1628;border-radius:8px;border-left:3px solid #d4af37">
            <div style="color:#94a3b8;font-size:11px;text-transform:uppercase;font-weight:600;margin-bottom:4px">🏆 Líder</div>
            <div style="color:#d4af37;font-size:13px;font-weight:700">${top.nome || top.name || '—'}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="background:linear-gradient(135deg,#1e293b 0%,#263549 100%);border:1px solid #334155;border-radius:14px;padding:28px">
      <h3 style="color:#fff;margin:0 0 20px;font-size:18px;font-weight:700">🏆 Ranking por Tier</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px">
        ${['A', 'B', 'C'].map(tier => {
          const grupo = concorrentes.filter(c => (c.tier || '').toUpperCase() === tier);
          const tierColor = tier === 'A' ? '#f59e0b' : tier === 'B' ? '#3b82f6' : '#64748b';
          return `
          <div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:18px">
            <div style="color:${tierColor};font-size:15px;font-weight:700;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.5px">Tier ${tier} <span style="color:#94a3b8;font-weight:400">(${grupo.length})</span></div>
            ${grupo.length === 0 ? '<div style="color:#64748b;font-size:13px;padding:12px;text-align:center">—</div>' :
              grupo.slice(0, 8).map((c, i) => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1e293b;font-size:13px">
                  <span style="color:#fff;font-weight:600">${i+1}. ${c.nome || c.name || '—'}</span>
                  <span style="color:#94a3b8;font-size:12px">${c.seguidores ? Number(c.seguidores).toLocaleString('pt-BR') + ' seg.' : '—'}</span>
                </div>`).join('')}
          </div>`;
        }).join('')}
      </div>
    </div>
    `}
  </div>`;
}

                <td style="padding:12px 14px;text-align:center"><span style="padding:4px 10px;border-radius:4px;font-size:12px;font-weight:600;${t.impacto === 'alto' ? 'background:#ef4444;color:#fff' : t.impacto === 'medio' ? 'background:#f59e0b;color:#fff' : 'background:#22c55e;color:#fff'}">${t.impacto || '\u2014'}</span></td>
                <td style="padding:12px 14px;text-align:center"><button onclick="(function(){const a=JSON.parse(localStorage.getItem('psm_tendencias')||'[]');a.splice(${data.length-1-i},1);localStorage.setItem('psm_tendencias',JSON.stringify(a));document.querySelector('.tend-tab[data-tab=historico]').click()})()" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px;transition:all 0.3s;padding:4px">\ud83d\uddd1\ufe0f</button></td>

function pgLancamentosAno() {
  var u = S.user; if (!u) return '';
  var perfil = getPerfil();
  var isDiretor = perfil === 'diretor';

  var MESES = ['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
  var DEFAULT_LANC = [
    { mes: 1, nome: 'Giulia BOULEVARD 2', cor: '#0f9d58' },
    { mes: 1, nome: 'SOHO SQUARE - FAJ', cor: '#0f9d58' },
    { mes: 3, nome: 'Organique', cor: '#0f9d58' },
    { mes: 3, nome: 'Studios Catanduva', cor: '#0f172a' },
    { mes: 3, nome: 'FAG', cor: '#0f172a' },
    { mes: 2, nome: 'ALAMEDA DOS IPES', cor: '#0f172a' },
    { mes: 5, nome: 'Studios + 2 dorms R3M', cor: '#0f172a' },
    { mes: 5, nome: 'VITTA - 3d', cor: '#0f172a' },
    { mes: 5, nome: 'INC', cor: '#0f172a' },
    { mes: 5, nome: 'BILD ANDALO STUDIOS', cor: '#0f172a' },
    { mes: 5, nome: 'PIETRA 178m2 - Impper', cor: '#0f9d58' },
    { mes: 5, nome: 'SOHO BUSINESS - FAJ', cor: '#0f9d58' },
    { mes: 5, nome: 'RESERVA GOLF', cor: '#0f172a' },
    { mes: 5, nome: 'PERPLAN', cor: '#0f172a' },
    { mes: 5, nome: 'CASAS KARVAS', cor: '#0f172a' },
    { mes: 7, nome: 'Costantini 220m2', cor: '#0f172a' },
    { mes: 8, nome: 'DECK RIO By Tarraf', cor: '#0f9d58' },
    { mes: 8, nome: 'Plaza - HUGO FABRI', cor: '#0f172a' },
    { mes: 9, nome: 'Recanto Real - LUPEMA', cor: '#0f9d58' },
    { mes: 9, nome: 'IMPPER CITY', cor: '#0f172a' },
    { mes: 10, nome: 'SOUL - KARVAS', cor: '#0f9d58' },
    { mes: 10, nome: 'BIO CITY 2', cor: '#0f172a' }
  ];

  if (!S.lancTimeline || !S.lancTimeline.length) S.lancTimeline = DEFAULT_LANC.map(function(l,i){ return { id: i, mes: l.mes, nome: l.nome, cor: l.cor, meta_vgv: 0, meta_pastas: 0 }; });
  var LANC = S.lancTimeline;

  var byMonth = {};
  for (var i = 1; i <= 12; i++) byMonth[i] = [];
  LANC.forEach(function(l){ if (!byMonth[l.mes]) byMonth[l.mes] = []; byMonth[l.mes].push(l); });

  if (!S.lancMetas) S.lancMetas = { meta_vgv: 0, meta_pastas: 0, meta_estoque: 0, meta_impper: 0 };
  var metas = S.lancMetas;

  var header = '<div class="ph"><div class="phtitle">\u{1F3D7}\uFE0F Lan\u00e7amentos 2026</div>'
    + '<div class="phsub">Timeline edit\u00e1vel \u2014 clique + para adicionar ou \u00d7 para remover lan\u00e7amentos</div></div>';

  var metasCard = '';
  if (isDiretor) {
    metasCard = '<div class="card mb2"><div class="ctitle" style="margin-bottom:4px">\u{1F3AF} Metas de Lan\u00e7amentos 2026</div>'
      + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px">'
      + '<div><label class="flabel">Meta VGV (R$)</label><input class="finp" type="number" value="'+metas.meta_vgv+'" oninput="S.lancMetas.meta_vgv=+this.value"></div>'
      + '<div><label class="flabel">Meta Pastas</label><input class="finp" type="number" value="'+metas.meta_pastas+'" oninput="S.lancMetas.meta_pastas=+this.value"></div>'
      + '<div><label class="flabel">Meta Estoque</label><input class="finp" type="number" value="'+metas.meta_estoque+'" oninput="S.lancMetas.meta_estoque=+this.value"></div>'
      + '<div><label class="flabel">Meta Impper</label><input class="finp" type="number" value="'+metas.meta_impper+'" oninput="S.lancMetas.meta_impper=+this.value"></div>'
      + '</div>'
      + '<button class="btn bpri bsm mt1" onclick="saveState();render()">Salvar Metas</button>'
      + '</div>';
  } else {
    var hasAnyMeta = metas.meta_vgv || metas.meta_pastas || metas.meta_estoque || metas.meta_impper;
    if (hasAnyMeta) {
      metasCard = '<div class="kgrid mb2">'
        + (metas.meta_vgv ? Kpi('Meta VGV', fmt(metas.meta_vgv), 'lan\u00e7amentos 2026', null, 'var(--navy)') : '')
        + (metas.meta_pastas ? Kpi('Meta Pastas', metas.meta_pastas, 'unidades', null, 'var(--g)') : '')
        + (metas.meta_estoque ? Kpi('Meta Estoque', metas.meta_estoque, 'unidades', null, 'var(--b)') : '')
        + (metas.meta_impper ? Kpi('Meta Impper', fmt(metas.meta_impper), 'valor', null, '#8b5cf6') : '')
        + '</div>';
    }
  }

  var totalLanc = LANC.length;
  var mesesAtivos = Object.keys(byMonth).filter(function(k){ return byMonth[k].length > 0; }).length;
  var now = new Date();
  var mesAtual = now.getMonth();
  var lancPassados = LANC.filter(function(l){ return l.mes <= mesAtual + 1; }).length;
  var lancFuturos = totalLanc - lancPassados;

  var kpis = '<div class="kgrid mb2">'
    + Kpi('Total Lan\u00e7amentos', totalLanc, mesesAtivos+' meses com lan\u00e7amento', null, 'var(--navy)')
    + Kpi('J\u00e1 Lan\u00e7ados', lancPassados, 'at\u00e9 '+ MESES[mesAtual], null, 'var(--g)')
    + Kpi('A Lan\u00e7ar', lancFuturos, 'restante do ano', null, 'var(--b)')
    + '</div>';

  // Timeline visual
  var tl = '<div class="card mb2" style="overflow-x:auto"><div class="ctitle">\u{1F4C5} Timeline 2026</div>';
  tl += '<div style="position:relative;height:200px;margin:30px 20px 60px 20px">';
  tl += '<div style="position:absolute;top:50%;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--g));border-radius:2px"></div>';
  for (var m = 0; m < 12; m++) {
    var xPct = (m / 11) * 100;
    var hasLanc = byMonth[m+1] && byMonth[m+1].length > 0;
    var isPast = m < mesAtual;
    var isCurrentMonth = m === mesAtual;
    var diamondBg = isCurrentMonth ? 'var(--g)' : isPast ? 'var(--navy)' : hasLanc ? '#d4a843' : '#cbd5e1';
    tl += '<div style="position:absolute;left:'+xPct+'%;top:50%;transform:translate(-50%,-50%) rotate(45deg);width:28px;height:28px;background:'+diamondBg+';border:2px solid #fff;z-index:2"></div>';
    tl += '<div style="position:absolute;left:'+xPct+'%;top:50%;transform:translate(-50%,-50%);z-index:3;font-size:9px;font-weight:800;color:#fff;pointer-events:none">'+MESES[m]+'</div>';
    if (hasLanc) {
      var items = byMonth[m+1];
      var above = true;
      var itemsHtml = '';
      for (var j = 0; j < items.length; j++) {
        var fw = items[j].cor === '#0f9d58' ? '700' : '400';
        itemsHtml += '<div style="font-size:12px;font-weight:'+fw+';color:var(--navy);white-space:nowrap">'+items[j].nome+'</div>';
      }
      tl += '<div style="position:absolute;left:'+xPct+'%;top:55%;transform:translateX(-50%);text-align:center;min-width:80px"><div style="width:1px;height:20px;background:#ccc;margin:0 auto"></div><div style="margin-top:8px">'+itemsHtml+'</div></div>';
    }
  }
  tl += '</div></div>';

  // Lista mensal editavel
  var lista = '';
  for (var mi = 1; mi <= 12; mi++) {
    var litems = byMonth[mi] || [];
    var isPastMonth = mi <= mesAtual;
    var isNow = mi === mesAtual + 1;
    var statusTag = isPastMonth ? '<span style="font-size:9px;padding:2px 6px;border-radius:8px;background:var(--g);color:#fff;margin-left:8px">Lan\u00e7ado</span>' : isNow ? '<span style="font-size:9px;padding:2px 6px;border-radius:8px;background:#d4a843;color:#fff;margin-left:8px">Atual</span>' : '<span style="font-size:9px;padding:2px 6px;border-radius:8px;background:var(--b);color:#fff;margin-left:8px">Futuro</span>';
    lista += '<div class="card mb2" style="'+(isNow?'border-left:4px solid var(--g)':'')+'">';
    lista += '<div class="ctitle" style="display:flex;align-items:center">';
    lista += '<span style="font-size:14px;margin-right:6px">'+(isNow?'\u{1F3E2}':isPastMonth?'\u2705':'\u{1F4C6}')+'</span>';
    lista += MESES[mi-1] + ' 2026 ' + statusTag;
    lista += '<span style="margin-left:auto;font-size:11px;color:var(--muted)">' + litems.length + ' lan\u00e7amento' + (litems.length !== 1 ? 's' : '') + '</span>';
    lista += '</div>';

    for (var li = 0; li < litems.length; li++) {
      var it = litems[li];
      var idx = LANC.indexOf(it);
      lista += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--cream2)">';
      lista += '<div style="width:10px;height:10px;border-radius:50%;background:'+it.cor+';flex-shrink:0"></div>';
      lista += '<div style="flex:1;font-size:13px;font-weight:600;color:var(--navy)">'+it.nome+'</div>';
      if (isDiretor) {
        lista += '<div style="display:flex;gap:4px;align-items:center;flex-shrink:0">';
        lista += '<input class="finp" type="number" placeholder="Meta VGV" value="'+(it.meta_vgv||'')+'" style="width:90px;font-size:10px;padding:4px 6px" onchange="updLancMeta('+idx+',\'meta_vgv\',+this.value)">';
        lista += '<input class="finp" type="number" placeholder="Meta Pastas" value="'+(it.meta_pastas||'')+'" style="width:80px;font-size:10px;padding:4px 6px" onchange="updLancMeta('+idx+',\'meta_pastas\',+this.value)">';
        lista += '<button class="btn bout bsm" style="color:#ef4444;border-color:#ef4444;padding:2px 8px;font-size:11px" onclick="rmLanc('+idx+')">\u00d7</button>';
        lista += '</div>';
      } else {
        if (it.meta_vgv) lista += '<span style="font-size:10px;background:var(--cream2);padding:2px 8px;border-radius:8px;color:var(--navy)">VGV: '+fmt(it.meta_vgv)+'</span>';
        if (it.meta_pastas) lista += '<span style="font-size:10px;background:var(--cream2);padding:2px 8px;border-radius:8px;color:var(--navy)">Pastas: '+it.meta_pastas+'</span>';
      }
      lista += '</div>';
    }

    if (isDiretor) {
      lista += '<div style="margin-top:8px;text-align:center">';
      lista += '<button class="btn bout bsm" style="font-size:11px;padding:4px 16px" onclick="addLanc('+mi+')">+ Adicionar Lan\u00e7amento</button>';
      lista += '</div>';
    }

    lista += '</div>';
  }

  return header + metasCard + kpis + tl + lista;
}

function addLanc(mes) {
  var nome = prompt('Nome do lan\u00e7amento:');
  if (!nome || !nome.trim()) return;
  var corChoice = prompt('Tipo: 1=Destaque (verde) 2=Normal (escuro)', '2');
  var cor = corChoice === '1' ? '#0f9d58' : '#0f172a';
  if (!S.lancTimeline) S.lancTimeline = [];
  var maxId = 0;
  S.lancTimeline.forEach(function(l){ if (l.id > maxId) maxId = l.id; });
  S.lancTimeline.push({ id: maxId + 1, mes: mes, nome: nome.trim(), cor: cor, meta_vgv: 0, meta_pastas: 0 });
  saveLancData();
  render();
}

function rmLanc(idx) {
  if (!S.lancTimeline || idx < 0 || idx >= S.lancTimeline.length) return;
  var nome = S.lancTimeline[idx].nome;
  if (!confirm('Remover lan\u00e7amento "' + nome + '"?')) return;
  S.lancTimeline.splice(idx, 1);
  saveLancData();
  render();
}

function updLancMeta(idx, key, val) {
  if (!S.lancTimeline || idx < 0 || idx >= S.lancTimeline.length) return;
  S.lancTimeline[idx][key] = val;
  saveLancData();
}

function saveLancData() {
  saveState();
