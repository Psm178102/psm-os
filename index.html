async function doLogin() {
  const email = (document.getElementById('le')?.value||'').trim().toLowerCase();
  const senha = (document.getElementById('lp')?.value||'').trim();
  if (!email || !senha) { S.loginErr='Preencha e-mail e senha'; S.loginLoading = false; render(); return; }

  S.loginLoading = true; render();

  let uid = null;

  if (_IS_LOCAL) {
    // Fallback local para dev
    uid = _localLogin(email, senha);
    if (!uid) {
      S.loginErr = 'E-mail ou senha incorretos';
      S.loginLoading = false; render(); return;
    }
  } else {
    // Produção: autenticação server-side
    try {
      const resp = await fetch('/api/auth', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({action:'login', email, senha})
      });
      const data = await resp.json();

      if (!resp.ok || data.error) {
        S.loginErr = data.error || 'Erro ao fazer login';
        S.loginLoading = false; render(); return;
      }

      localStorage.setItem('psm_token', data.token);
      uid = data.uid;
    } catch(e) {
      // Se fetch falhar (ex: offline ou sem server), tenta fallback local
      uid = _localLogin(email, senha);
      if (!uid) {
        S.loginErr = 'Sem conexão e credenciais não reconhecidas';
        S.loginLoading = false; render(); return;
      }
    }
  }

  const user = USERS_BASE.find(u => u.id === uid);
  if (!user) { S.loginErr = 'Usuário não encontrado'; S.loginLoading = false; render(); return; }

  S.user = {...UM[user.id], ...user};
  const lvl = RLVL[S.user.role] || 0;
  S.page = lvl >= 5 ? 'dashboard' : 'meu';
  S.loginErr = null;
  S.loginLoading = false;
  toast('Bem-vindo, ' + S.user.name.split(' ')[0] + '! 👋', 'ok');
  render();
  // Faz sync do RD com tokens armazenados no navegador
  setTimeout(() => { RD.sync(true).then(() => RD.startAutoSync()); }, 200);
  if (!S.veraHist?.length) {
    S.veraHist = [{role:'assistant', content:'Olá, ' + S.user.name.split(' ')[0] + '! Sou o Sr. Performance, seu mentor de alta performance. Estou aqui para estratégia, objeções, cadências, feedbacks e o que mais precisar. Como posso te ajudar?'}];
  }
  scheduleVeraNotifs();
}

}

  const b = BROKERS.find(x => x.id===f.bid);
  if (!b) return;
  const v = {bid:f.bid, bn:b.name, fr:f.fr||b.frente||'lancamento', cl:f.cl,
    vgv:f.vgv, prod:f.prod||'', closedAt:f.date||new Date().toISOString().slice(0,10),
    updated_at:f.date, winStatus:'won', rdId:'manual_'+Date.now(), manual:true};
  VENDAS.push(v);
  try {
    const saved = JSON.parse(localStorage.getItem('psm_vendas_manual') || '[]');
    saved.push(v);
    localStorage.setItem('psm_vendas_manual', JSON.stringify(saved));
  } catch(e) {}
  b.vendas = (b.vendas||0) + 1;
  b.vgv_real = (b.vgv_real||0) + f.vgv;
  b.ticketMedio = b.vendas > 0 ? Math.round(b.vgv_real / b.vendas) : 0;
  S.vgvReal = (S.vgvReal||0) + f.vgv;
  S.wonTotal = (S.wonTotal||0) + 1;
  S.vendaMsg = '✅ ' + fmt(f.vgv) + ' registrado para ' + b.name + '!';
  S.vendaForm = {};
  toast('Venda registrada! Ranking atualizado.', 'ok');
  render();
}

function FunnelChart(steps) {
  const mx = Math.max(...steps.map(s=>s.val),1);
  return steps.map((s,i)=>{
    const pct=Math.round(s.val/mx*100);
    const prev=i>0?steps[i-1].val:s.val;
    const conv=prev>0?Math.round(s.val/prev*100):100;
    return '<div style="margin-bottom:10px">'      +'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">'      +'<span style="font-weight:700;color:var(--navy)">'+s.lbl+'</span>'      +'<span style="font-weight:800;color:'+s.c+'">'+s.val+(i>0?' ('+conv+'% conv.)':'')+' </span>'      +'</div>'      +'<div style="background:var(--cream3);border-radius:6px;overflow:hidden;height:30px">'      +'<div style="width:'+pct+'%;min-width:30px;background:'+s.c+';height:100%;display:flex;align-items:center;padding:0 8px;transition:width .5s">'      +'<span style="color:#fff;font-size:10px;font-weight:700">'+s.val+'</span></div></div>';  }).join('');}

    content = '<div class="kgrid mb2">'      + equipData.map(e=>Kpi(e.nome,e.conv+'%','conversão leads→venda',{up:e.conv>=5,txt:e.won+' vendas de '+e.leads+' leads'},e.c)).join('')      + '</div>'      + equipData.map(e=>'<div class="card mb2" style="border-left:4px solid '+e.c+'"><div class="ctitle">'+e.nome+' — Funil</div>'          + FunnelChart([{lbl:'Leads',val:e.leads,c:e.c},{lbl:'Visitas',val:e.vis,c:'#d4a843'},{lbl:'Vendas',val:e.won,c:'#15803d'}])          + '</div>').join('')      + '<div class="card"><div class="ctitle">Conversão por Corretor</div>'      + '<div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">'      + (selB?[selB]:brokers).map(b=>{          const tot=(b.volumeLeads||0)+(b.vendas||0)+(b.descartados||0);          const cv=tot>0?Math.round((b.vendas||0)/tot*100):0;          return '<div style="display:flex;align-items:center;gap:10px">'+Av(b,'xs')+'<div style="flex:1">'            +'<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">'            +'<span style="font-weight:600">'+b.name.split(' ')[0]+'</span>'            +'<span style="font-weight:700;color:var(--navy)">'+cv+'% ('+b.vendas+' vendas)</span></div>'            +PB(b.vendas||0,tot||1,cv>=10?'#16a34a':cv>=5?'#d97706':'#dc2626')            +'</div></div>';        }).join('')      +'</div></div>';  }

  else if (tab === 'metavreal') {
    const hoje=new Date(), diasMes=new Date(hoje.getFullYear(),hoje.getMonth()+1,0).getDate(), diaAtual=hoje.getDate();
    const percMes=diaAtual/diasMes;
    const vgvMeta=METRICS.vgv_meta||8000000, vgvReal=S.vgvReal||0;
    const vgvProj=percMes>0?Math.round(vgvReal/percMes):0;
    const pctVGV=vgvMeta>0?Math.round(vgvReal/vgvMeta*100):0;
    const pctProj=vgvMeta>0?Math.round(vgvProj/vgvMeta*100):0;
    const bMVR=(selB?[selB]:brokers).map(b=>{
      const mc=METAS_CONFIG[b.id]||{}, bM=mc.vgv_meta||1200000;
      const bR=b.vgv_real||0, bP=percMes>0?Math.round(bR/percMes):0;
      return {b,bM,bR,bP,pct:bM>0?Math.round(bR/bM*100):0};
    });
    content='<div class="kgrid mb2">'      +Kpi('🎯 Meta VGV',fmt(vgvMeta),'meta do período',null,'var(--navy)')      +Kpi('✅ Realizado',fmt(vgvReal),pctVGV+'% da meta',{up:pctVGV>=100,txt:pctVGV+'%'},pctVGV>=100?'var(--g)':pctVGV>=70?'var(--a)':'var(--r)')      +Kpi('📈 Projetado',fmt(vgvProj),'se manter ritmo',{up:pctProj>=100,txt:pctProj+'% da meta'},pctProj>=100?'var(--g)':'var(--a)')      +Kpi('📅 Mês',diaAtual+'/'+diasMes+' dias',Math.round(percMes*100)+'%',null,'var(--b)')      +'</div>'      +'<div class="card mb2" style="padding:18px"><div class="ctitle" style="margin-bottom:14px">VGV — Meta × Realizado × Projetado</div>'      +FunnelChart([{lbl:'Meta',val:vgvMeta,c:'#0f172a'},{lbl:'Projetado',val:vgvProj,c:'#d97706'},{lbl:'Realizado',val:vgvReal,c:'#15803d'}])      +'</div>'      +'<div class="card"><div class="ctitle">Por Corretor</div>'      +'<div style="display:flex;flex-direction:column;gap:10px;margin-top:10px">'      +bMVR.map(({b,bM,bR,bP,pct})=>        '<div style="background:var(--cream2);border-radius:8px;padding:10px">'        +'<div style="display:flex;justify-content:space-between;margin-bottom:6px">'        +'<span style="font-size:12px;font-weight:700">'+b.name.split(' ')[0]+'</span>'        +'<span style="font-size:12px;font-weight:800;color:'+(pct>=100?'var(--g-tx)':pct>=70?'var(--a-tx)':'var(--r-tx)')+'">'+pct+'%</span></div>'        +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:10px;margin-bottom:6px">'        +'<div><div style="color:var(--muted)">Meta</div><div style="font-weight:700">'+fmt(bM)+'</div></div>'        +'<div><div style="color:var(--muted)">Realizado</div><div style="font-weight:700;color:var(--g-tx)">'+fmt(bR)+'</div></div>'        +'<div><div style="color:var(--muted)">Projetado</div><div style="font-weight:700;color:'+(bP>=bM?'var(--g-tx)':'var(--a-tx)')+'">'+fmt(bP)+'</div></div>'        +'</div>'        +PB(bR,bM||1,pct>=100?'#16a34a':pct>=70?'#d97706':'#dc2626')        +'</div>')        .join('')      +'</div></div>';  }

    return '<div class="phd"><h1>Métricas Avançadas</h1><p>Dados em tempo real do RD Station CRM</p></div>'
    + (canFilter ? '<div style="margin-bottom:14px"><select class="sel-f" onchange="S.metBroker=this.value;render()">'
      + '<option value="all">Todos Corretores</option>'
      + brokers.map(b => '<option value="'+b.id+'"'+(cb===b.id?' selected':'')+'>'+b.name+'</option>').join('')
      + '</select></div>' : '')
    + tabBar + content;
}

// ─── KANBAN HELPER ────────────────────────────────────────────────────────────
function renderKanban(bid, frente) {
  const opps  = bid ? OPPS.filter(o => o.bid===bid) : OPPS.filter(o => o.fr===frente);
  const stages = FUNIS[frente] || FUNIS.lancamento;
  if (opps.length === 0) {
    return '<div class="card"><div style="text-align:center;padding:30px;color:var(--muted);font-size:12px">'
      + 'Nenhuma negociação ativa. Aguarde o sync do RD Station.<br><small style="font-size:10px">Status: '+(S.rdSyncStatus||'aguardando')+'</small></div></div>';
  }
  return '<div class="card"><div class="ctitle">Funil — ' + opps.length + ' negociações</div>'
    + '<div style="overflow-x:auto"><div style="display:flex;gap:8px;min-width:max-content;padding:4px 2px">'
    + stages.map(s => {
        const co = opps.filter(o => s.rdIds && s.rdIds.length ? s.rdIds.includes(o.st) : o.st_psm===s.id);
        return '<div style="width:160px;flex-shrink:0">'
          + '<div style="background:'+s.color+'18;border-top:3px solid '+s.color+';border-radius:8px 8px 0 0;padding:7px 9px">'
          + '<div style="font-size:9.5px;font-weight:800;color:'+s.color+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+s.label+'</div>'
          + '<span style="background:'+s.color+';color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:8px">'+co.length+'</span>'
          + '</div>'
          + '<div style="background:var(--cream2);border:1px solid var(--cream3);border-top:none;border-radius:0 0 8px 8px;min-height:60px;padding:4px;display:flex;flex-direction:column;gap:3px">'
          + (co.length===0 ? '<div style="text-align:center;padding:12px 0;font-size:10px;color:var(--muted)">—</div>'
            : co.slice(0,8).map(o => '<div style="background:#fff;border:1px solid var(--cream3);border-radius:6px;padding:6px 8px;">'
              + '<div style="font-size:10.5px;font-weight:600;color:var(--navy)">'+o.cl.slice(0,18)+'</div>'
              + (o.vgv ? '<div style="font-size:10px;color:var(--muted)">'+fmt(o.vgv)+'</div>' : '')
              + '</div>').join('')
            + (co.length>8 ? '<div style="text-align:center;font-size:9px;color:var(--muted)">+'+(co.length-8)+' mais</div>' : ''))
          + '</div></div>';
      }).join('')
    + '</div></div></div>';
}

// ─── OKRs & METAS ─────────────────────────────────────────────────────────────
function pgOKRs() {
  const u = S.user; const lvl = RLVL[u?.role]||0;
  const df = DateFilter('okrs','Período');
  const tab = S.okrTab || 'okrs';
  const tabs = [{id:'okrs',lbl:'OKRs'},{id:'metas',lbl:'Metas vs Realizado'},{id:'proj',lbl:'Projeções'}];
  const stC = {on_track:'var(--g)',at_risk:'var(--a)',off_track:'var(--r)',completed:'var(--b)'};
  const stL = {on_track:'No Caminho',at_risk:'Em Risco',off_track:'Fora da Meta',completed:'Concluído'};

  const tabBar = '<div style="display:flex;gap:4px;margin-bottom:16px">'
    + tabs.map(t => '<button class="btn bsm'+(tab===t.id?' bp1':' bout')+'" onclick="S.okrTab=\''+t.id+'\';render()">'+t.lbl+'</button>').join('')
    + '</div>';

  const metaVGV = METRICS.vgv_meta || 8000000;
  const realVGV = S.vgvReal || 0;
  const pctG    = metaVGV > 0 ? Math.round(realVGV/metaVGV*100) : 0;

  let content = '';

  if (tab === 'okrs') {
    content = '<div class="kgrid mb2">'
      + Kpi('Objectives', OKRS.length,'ativos',null,'var(--navy)')
      + Kpi('No Caminho', OKRS.flatMap(o=>o.krs).filter(k=>k.status==='on_track').length,'KRs',null,'var(--g)')
      + Kpi('Em Risco',   OKRS.flatMap(o=>o.krs).filter(k=>k.status==='at_risk').length,'KRs',null,'var(--a)')
      + Kpi('VGV Realizado', fmt(realVGV), pctG+'% da meta',null, pctG>=100?'var(--g)':pctG>=70?'var(--a)':'var(--r)')
      + '</div>'
      + OKRS.map(okr => '<div class="card mb2">'
        + '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px">'
        + '<div><div style="font-size:14px;font-weight:800;color:var(--navy)">'+okr.obj+'</div>'
        + '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+okr.ciclo+'</div></div>'
        + '<span style="flex-shrink:0;font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;background:'+stC[okr.status]+'18;color:'+stC[okr.status]+'">'+stL[okr.status]+'</span>'
        + '</div>'
        + okr.krs.map(kr => '<div style="margin-bottom:10px;padding:10px;background:var(--cream2);border-radius:8px">'
          + '<div style="display:flex;justify-content:space-between;margin-bottom:5px">'
          + '<span style="font-size:12px;font-weight:600;color:var(--navy)">'+kr.label+'</span>'
          + '<span style="font-size:11px;font-weight:700;color:'+stC[kr.status]+'">'+kr.pct+'%</span>'
          + '</div>'
          + PB(kr.curr, kr.target, '#3b82f6')
          + '<div style="display:flex;justify-content:space-between;margin-top:3px">'
          + '<span style="font-size:10px;color:var(--muted)">'+kr.curr+' '+kr.unit+'</span>'
          + '<span style="font-size:10px;color:var(--muted)">meta: '+kr.target+' '+kr.unit+'</span>'
          + '</div></div>').join('')
        + '</div>').join('');
  }

  else if (tab === 'metas') {
    // Metas vs Realizado por corretor + equipe + geral
    const periods = [{id:'mes',lbl:'Mês Atual'},{id:'tri',lbl:'Trimestre'},{id:'sem',lbl:'Semestre'},{id:'ano',lbl:'Anual'}];
    const pp = S.metasPeriod || 'mes';
    const periodBar = '<div style="display:flex;gap:4px;margin-bottom:14px">'
      + periods.map(p => '<button class="btn bsm'+(pp===p.id?' bp1':' bout')+'" onclick="S.metasPeriod=\''+p.id+'\';render()">'+p.lbl+'</button>').join('')
      + '</div>';

    const factor = {mes:1, tri:3, sem:6, ano:12}[pp] || 1;

    // Edição de metas (somente sócios/gestores)
    const canEdit = lvl >= 5;

    content = periodBar
      + '<div class="card mb2"><div class="ctitle">Meta Global — '+METRICS.mes+'</div>'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
      + '<div><div style="font-size:24px;font-weight:900;color:var(--navy)">'+fmt(realVGV)+'</div>'
      + '<div style="font-size:11px;color:var(--muted)">realizado</div></div>'
      + '<div style="text-align:right"><div style="font-size:24px;font-weight:900;color:'+(pctG>=100?'var(--g-tx)':pctG>=70?'var(--a-tx)':'var(--r-tx)')+'">'+pctG+'%</div>'
      + '<div style="font-size:11px;color:var(--muted)">meta: '+fmt(metaVGV*factor)+'</div></div>'
      + '</div>'
      + PB(realVGV, metaVGV*factor, pctG>=100?'#16a34a':pctG>=70?'#d97706':'#dc2626')
      + '</div>'
      + '<div class="card"><div class="ctitle">Metas Individuais vs Realizado'+(canEdit?' &nbsp;<button class="btn bout bsm" onclick="S.editingMetas=!S.editingMetas;render()">✏️ Editar</button>':'')+'</div>'
      + '<div style="display:flex;flex-direction:column;gap:10px">'
      + BROKERS.map(b => {
          const mc = METAS_CONFIG[b.id] || {};
          const metaB = (mc.vgv_meta || b.meta || 0) * factor;
          const realB = b.vgv_real || 0;
          const pctB  = metaB > 0 ? Math.round(realB/metaB*100) : 0;
          const disc  = DISC_PROFILES[b.id];
          return '<div style="background:var(--cream2);border-radius:10px;padding:12px">'
            + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
            + '<div style="display:flex;align-items:center;gap:8px">'+Av(b,'xs')
            + '<span style="font-size:12px;font-weight:700">'+b.name.split(' ')[0]+'</span>'
            + (disc ? '<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:'+disc.cor+'22;color:'+disc.cor+'">'+disc.perfil+'</span>' : '')
            + '</div>'
            + '<span style="font-size:12px;font-weight:800;color:'+(pctB>=100?'var(--g-tx)':pctB>=70?'var(--a-tx)':'var(--r-tx)')+'">'+pctB+'%</span>'
            + '</div>'
            + (S.editingMetas && canEdit ? '<div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">'
              + '<div><label style="font-size:9px;color:var(--muted)">VGV Mín</label><input class="finp" type="number" style="width:90px;padding:5px" placeholder="0" value="'+(mc.vgv_min||0)+'" oninput="METAS_CONFIG[\''+b.id+'\']=METAS_CONFIG[\''+b.id+'\'||{};METAS_CONFIG[\''+b.id+'\'].vgv_min=+this.value"></div>'
              + '<div><label style="font-size:9px;color:var(--muted)">VGV Meta</label><input class="finp" type="number" style="width:100px;padding:5px" placeholder="0" value="'+(mc.vgv_meta||b.meta||0)+'" oninput="METAS_CONFIG[\''+b.id+'\']=METAS_CONFIG[\''+b.id+'\'||{};METAS_CONFIG[\''+b.id+'\'].vgv_meta=+this.value;render()"></div>'
              + '<div><label style="font-size:9px;color:var(--muted)">Visitas</label><input class="finp" type="number" style="width:70px;padding:5px" placeholder="0" value="'+(mc.visitas||0)+'" oninput="METAS_CONFIG[\''+b.id+'\']=METAS_CONFIG[\''+b.id+'\'||{};METAS_CONFIG[\''+b.id+'\'].visitas=+this.value"></div>'
              + '<div><label style="font-size:9px;color:var(--muted)">Captações</label><input class="finp" type="number" style="width:80px;padding:5px" placeholder="0" value="'+(mc.captacoes||0)+'" oninput="METAS_CONFIG[\''+b.id+'\']=METAS_CONFIG[\''+b.id+'\'||{};METAS_CONFIG[\''+b.id+'\'].captacoes=+this.value"></div>'
              + '</div>' : '')
            + PB(realB, metaB||1, pctB>=100?'#16a34a':pctB>=70?'#d97706':'#dc2626')
            + '<div style="display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--muted)">'
            + '<span>'+fmt(realB)+' realizado</span><span>meta: '+fmt(metaB)+'</span></div>'
            + '</div>';
        }).join('')
      + '</div></div>';
  }

  else if (tab === 'proj') {
    // Projeção anual
    const du_pass = METRICS.du_pass || 1;
    const du_tot  = METRICS.du_tot  || 22;
    const projecaoMes    = du_pass > 0 ? Math.round(realVGV / du_pass * du_tot) : 0;
    const projecaoAno    = du_pass > 0 ? Math.round(realVGV / du_pass * (du_tot * 12)) : 0;
    const projecaoTri    = du_pass > 0 ? Math.round(realVGV / du_pass * (du_tot * 3)) : 0;

    content = '<div class="kgrid mb2">'
      + Kpi('Projeção do Mês',fmt(projecaoMes),'baseado no ritmo atual',null,projecaoMes>=metaVGV?'var(--g)':'var(--a)')
      + Kpi('Projeção Trimestral',fmt(projecaoTri),'extrapolação 3 meses',null,'var(--b)')
      + Kpi('Projeção Anual',fmt(projecaoAno),'extrapolação 12 meses',null,'var(--navy)')
      + Kpi('Ritmo Diário',fmt(Math.round(realVGV/du_pass)),'VGV/dia útil',null,'var(--gold)')
      + '</div>'
      + '<div class="card mb2"><div class="ctitle">Projeção por Corretor (mês)</div>'
      + '<div style="display:flex;flex-direction:column;gap:8px">'
      + BROKERS.map(b => {
          const metaB = (METAS_CONFIG[b.id]?.vgv_meta || b.meta || 0);
          const realB = b.vgv_real || 0;
          const proj  = du_pass > 0 ? Math.round(realB / du_pass * du_tot) : 0;
          const pctP  = metaB > 0 ? Math.round(proj/metaB*100) : 0;
          return '<div style="display:flex;align-items:center;gap:10px">'
            + Av(b,'xs') + '<div style="flex:1">'
            + '<div style="display:flex;justify-content:space-between;margin-bottom:3px">'
            + '<span style="font-size:11px;font-weight:600">'+b.name.split(' ')[0]+'</span>'
            + '<span style="font-size:11px;font-weight:800;color:'+(pctP>=100?'var(--g-tx)':pctP>=70?'var(--a-tx)':'var(--r-tx)')+'">'+fmt(proj)+' ('+pctP+'%)</span>'
            + '</div>' + PB(proj, metaB||1, pctP>=100?'#16a34a':pctP>=70?'#d97706':'#dc2626')
            + '</div></div>';
        }).join('')
      + '</div></div>';
  }

  return df + '<div class="phd"><h1>OKRs & Metas</h1><p>'+METRICS.mes+'</p></div>'
    + tabBar + content;
}

function ooEditSheet(bid, name) {
  const current = (S.ooSheetLinks || {})[bid] || '';
  const url = prompt('Cole o link da planilha Google Sheets para ' + name + ':', current);
  if (url === null) return; // cancelled
  if (!S.ooSheetLinks) S.ooSheetLinks = {};
  S.ooSheetLinks[bid] = url.trim();
  saveState();
  toast(url.trim() ? 'Planilha vinculada para ' + name + '!' : 'Link removido para ' + name, 'ok');
  render();
}

function ooInc(bid, key) {
  S['ooEdit_'+bid] = S['ooEdit_'+bid] || {data: new Date().toISOString().slice(0,10)};
  S['ooEdit_'+bid][key] = (+(S['ooEdit_'+bid][key]||0)) + 1;
  render();
}
function ooDec(bid, key) {
  S['ooEdit_'+bid] = S['ooEdit_'+bid] || {data: new Date().toISOString().slice(0,10)};
  S['ooEdit_'+bid][key] = Math.max(0, (+(S['ooEdit_'+bid][key]||0)) - 1);
  render();
}

function saveDayOO(bid) {
  const key = 'ooEdit_' + bid;
  const hkey = 'ooHistory_' + bid;
  const day = S[key] || {};
  if (!day.data) day.data = new Date().toISOString().slice(0,10);
  S[hkey] = S[hkey] || [];
  const idx = S[hkey].findIndex(d => d.data === day.data);
  if (idx >= 0) S[hkey][idx] = {...S[hkey][idx], ...day};
  else S[hkey].push({...day});
  S.ooLogs = S.ooLogs || {};
  S.ooLogs[bid] = S[hkey];
  toast('Dia salvo! ✅ Visitas sincronizadas nas métricas', 'ok');
  S[key] = {data: new Date().toISOString().slice(0,10)};
  render();
}

async function sendVera(skipInput = false) {

  S.veraLoading = true; render();
  setTimeout(() => { const el=document.getElementById('vera-msgs'); if(el) el.scrollTop=el.scrollHeight; }, 50);

  try {
    const u = S.user;

    const disc = DISC_PROFILES[u?.id];
    const rankList = [...BROKERS].sort((a,c)=>(c.vgv_real||0)-(a.vgv_real||0)).slice(0,5).map((b,i)=>'#'+(i+1)+' '+b.name.split(' ')[0]+': '+fmt(b.vgv_real||0)).join('\n');
    const system = `Você é o Sr. Performance, mentora de alta performance da PSM Assessoria Imobiliária em São José do Rio Preto - SP.

PERFIL DO USUÁRIO:
- Nome: ${u?.name||'Corretor'}

- Ticket médio: ${fmt(b?.ticketMedio||0)}
- Ciclo de venda: ${b?.cicloVenda||0} dias
- Taxa conversão: ${b?.conversionRate||0}%
- Principal perda: ${Object.entries(b?.motivosPerda||{}).sort((a,c)=>c[1]-a[1])[0]?.[0]||'—'}

${rankList}

METODOLOGIA PSM: Funil → Carteira → Tentativa → Contato 4Ps → Agendamento → Visita → Quente → Proposta → Contrato
FRENTES: MAP/Lançamento, Conquista (revenda), Terceiros (captação), Locação

INSTRUÇÕES: Seja direta, prática e motivadora. Use os dados reais. Máximo 280 palavras. Formato com **negrito** nos pontos-chave.`;

    // Send Gemini API key via header + query param (from Configurações > IA)
    const geminiKey = (S.connectors || {}).gemini_api_key || '';
    const srUrl = '/api/sr' + (geminiKey ? '?gemini_key=' + encodeURIComponent(geminiKey) : '');
    const resp = await fetch(srUrl, {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'X-Gemini-Key': geminiKey},
      body: JSON.stringify({
        max_tokens: 1024,
        system,
        messages: S.veraHist.slice(-10).map(m => ({role:m.role, content:m.content}))

    const txt = data.content?.[0]?.text || 'Não consegui responder agora.';

  } catch(e) {
    const errMsg = e.message.includes('Failed to fetch')

function scheduleVeraNotifs() {
  const check = () => {
    const h=new Date().getHours(), m=new Date().getMinutes();
    if ((h===9&&m===0)||(h===17&&m===0)) {
      S.veraHist = S.veraHist || [];
      S.veraHist.push({role:'user', content: h===9
        ? '[9h] Me dê o briefing matinal: top 3 prioridades do dia, quem está mais quente no pipeline, e minha meta de atividades.'
        : '[17h] Final do dia: analise o pipeline atualizado, forecast para o mês e o que precisa de atenção urgente amanhã.'});
      sendVera(true);
    }
  };
  setInterval(check, 60000);
}

// ─── PERIOD FILTER HELPER ─────────────────────────────────────────────────────
function filterByPeriod(deals, period) {
  if (!period || period === 'all') return deals;
  const now = new Date();
  const start = new Date();
  if (period === 'week') start.setDate(now.getDate() - 7);
  else if (period === 'month') { start.setDate(1); }
  else if (period === 'quarter') { start.setMonth(Math.floor(now.getMonth()/3)*3, 1); }
  else if (period === 'semester') { start.setMonth(now.getMonth() < 6 ? 0 : 6, 1); }
  return deals.filter(d => {
    const dt = new Date(d.createdAt || d.updated_at || '');
    return dt >= start;
  });
}

// Teste de conexão com RD
async function rdDebugTest() {
  toast('Testando conexão com RD Station...', '');
  const c = S.connectors || {};
  const token = c.rd_crm_token;

  if (!token) {
    toast('❌ Token RD CRM não configurado', 'err');
    return;
  }

  try {
    console.log('[RD Debug Test] Testando chamada direta...');
    const t0 = Date.now();

    // Try direct API call first
    const directUrl = 'https://crm.rdstation.com/api/v1/deals?token=' + token + '&limit=1';
    const resp = await fetch(directUrl, { headers: { 'Accept': 'application/json' } });
    const elapsed = Date.now() - t0;
    let data;
    try { data = await resp.json(); } catch(e) { data = null; }

    if (!resp.ok) {
      console.warn('[RD Debug Test] Direto falhou, tentando proxy...');
      // Try proxy
      const hdrs = { 'X-RD-Token': token };
      const respProxy = await fetch('/api/rd?path=/deals&limit=1&service=crm', {headers: hdrs});
      const elapsedProxy = Date.now() - t0;
      let dataProxy;
      try { dataProxy = await respProxy.json(); } catch(e) { dataProxy = null; }

      if (!respProxy.ok) {
        toast('❌ RD HTTP ' + respProxy.status + ': ' + (dataProxy?.error || dataProxy?.errors?.[0]?.message || 'desconhecido'), 'err');
        console.error('[RD Debug Test] Proxy falhou', respProxy.status, dataProxy);
        return;
      }
      data = dataProxy;
      const count = data?.deals?.length || 0;
      toast('✅ RD CRM OK (via proxy) - ' + count + ' deal(s) em ' + elapsedProxy + 'ms', 'ok');
      console.log('[RD Debug Test] ✅ Proxy Response:', data);
      return;
    }

    if (data && data.error) {
      toast('❌ Erro RD: ' + data.error, 'err');
      return;
    }

    const count = data?.deals?.length || 0;
    const hasMore = data?.has_more || false;
    toast('✅ RD CRM OK (direto) - ' + count + ' deal(s) em ' + elapsed + 'ms. has_more=' + hasMore, 'ok');
    console.log('[RD Debug Test] ✅ Direto Response:', data);
  } catch(e) {
    toast('❌ Falha na conexão: ' + e.message, 'err');
    console.error('[RD Debug Test]', e);
  }
}

function connectorSection(title, prefix, color, fields) {
  const c = S.connectors || {};
  const hasValue = fields.some(f => c[f.key]);
  const dot = hasValue
    ? '<span style="width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block"></span>'
    : '<span style="width:7px;height:7px;border-radius:50%;background:var(--cream4);display:inline-block"></span>';
  return '<div style="border:1px solid var(--cream3);border-radius:10px;padding:14px 16px;margin-bottom:10px">'
    + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
    + '<div style="width:28px;height:28px;border-radius:7px;background:'+color+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff">'+title[0]+'</div>'
    + '<span style="font-size:13px;font-weight:700;color:var(--navy);flex:1">'+title+'</span>'
    + dot
    + '</div>'
    + fields.map(f => {
      const val = c[f.key] || '';
      const masked = f.type === 'password' && val ? val.slice(0,6) + '••••••' : val;
      const inputId = 'conn_' + f.key;
      return '<div style="margin-bottom:8px">'
        + '<label style="font-size:10px;font-weight:600;color:var(--muted);display:block;margin-bottom:3px">'+f.label+'</label>'
        + '<div style="display:flex;gap:6px">'
        + '<input id="'+inputId+'" class="finp" type="'+(f.type==='password'?'password':'text')+'" style="flex:1;padding:7px 10px;font-size:12px;font-family:\'Fira Code\',monospace" placeholder="'+f.placeholder+'" value="'+val+'"'
        + ' oninput="S.connectors.'+f.key+'=this.value;saveState()">'
        + (f.type === 'password' ? '<button class="btn bout bsm" onclick="toggleConnVis(\''+inputId+'\')" title="Mostrar/ocultar" style="font-size:14px;padding:4px 8px">👁</button>' : '')
        + '</div></div>';
    }).join('')
    + '</div>';
}

function toggleConnVis(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.type = el.type === 'password' ? 'text' : 'password';
}

async function testConnectors() {
  const st = document.getElementById('conn-status');
  if (st) st.innerHTML = '<span style="color:var(--a-tx)">⏳ Testando conexões...</span>';
  const results = [];
  const c = S.connectors || {};

  // ── Test RD CRM (via proxy — direto não funciona por CORS) ──
  if (c.rd_crm_token) {
    try {
      const r = await fetch('/api/rd?path=/deals&limit=1&service=crm', {
        headers: { 'X-RD-Token': c.rd_crm_token }
      });
      if (r.ok) {
        const d = await r.json();
        results.push('✅ RD CRM (' + (d.total||'ok') + ' deals)');
      } else {
        const err = await r.json().catch(()=>({}));
        results.push('❌ RD CRM (' + (err.error||r.status) + ')');
      }
    } catch(e) { results.push('❌ RD CRM (' + e.message.slice(0,40) + ')'); }
  } else {
    results.push('⬜ RD CRM (sem token)');
  }

  // ── Test RD MKT ──
  if (c.rd_mkt_token) {
    try {
      const r = await fetch('/api/rd?path=/platform/contacts&limit=1&service=mkt', {
        headers: { 'X-RD-Token': c.rd_mkt_token }
      });
      results.push(r.ok ? '✅ RD MKT' : '❌ RD MKT (' + r.status + ')');
    } catch(e) { results.push('❌ RD MKT (' + e.message.slice(0,40) + ')'); }
  } else {
    results.push('⬜ RD MKT (sem token)');
  }

  // ── Test Google Gemini ──
  if (c.gemini_api_key) {
    try {
      const r = await fetch('/api/sr?gemini_key=' + encodeURIComponent(c.gemini_api_key), {
        method: 'POST',
        headers: {'Content-Type':'application/json', 'X-Gemini-Key': c.gemini_api_key},
        body: JSON.stringify({system:'Responda apenas: OK', messages:[{role:'user',content:'teste'}], max_tokens:10})
      });
      const d = await r.json();
      const txt = d.content?.[0]?.text || '';
      results.push(txt && !txt.includes('⚠️') ? '✅ Gemini AI (ativo)' : '❌ Gemini (' + txt.slice(0,30) + ')');
    } catch(e) { results.push('❌ Gemini (' + e.message.slice(0,30) + ')'); }
  } else {
    results.push('⬜ Gemini (sem chave)');
  }

  // ── Test OpenAI ──
  if (c.openai_api_key) {
    results.push('💾 OpenAI (chave salva)');
  }

  // ── Vera NotebookLM ──
  if (c.vera_notebook_url) {
    results.push('✅ Vera 5.0 (link salvo)');
  }

  // ── Outros ──
  if (c.notion_key) results.push('💾 Notion');
  if (c.google_api_key || c.google_client_id) results.push('💾 Google');
  if (c.excel_url) results.push('💾 Excel');

  if (st) st.innerHTML = '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">'
    + results.map(r => '<span style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;background:'
      + (r.startsWith('✅') ? 'var(--g-bg);color:var(--g-tx)' : r.startsWith('❌') ? 'var(--r-bg);color:var(--r-tx)' : 'var(--cream2);color:var(--muted)')
      + '">'+r+'</span>').join('')
    + '</div>';
}

// ─── ROUTER ───────────────────────────────────────────────────────────────────
function safeRoute() {
  try { return route(); }
  catch(e) {
    console.error('[PSM] Render error:', e);
    return '<div class="empty-card"><div class="empty-ico">⚠️</div>'
      + '<div class="empty-title">Erro ao carregar página</div>'
      + '<div class="empty-sub">'+e.message+'<br><button class="btn bp1 bsm" style="margin-top:10px" onclick="S.page=\'dashboard\';render()">Voltar ao Dashboard</button></div></div>';
  }
}

function route() {
  if (!S.user) return renderLogin();
  switch(S.page) {
    case 'dashboard':  return pgDashboard();
    case 'meu':        return pgMeu();
    case 'ranking':    return pgRanking();
    case 'equipe':     return pgEquipe();
    case 'lancamento':
    case 'conquista':
    case 'terceiros':
    case 'locacao':    return pgFrente(S.page);
    case 'crm':        return pgCRM();
    case 'metricas':   return pgMetricas();
    case 'oneonone':   return pgOO();
    case 'governance': return pgGovernance();
    case 'warroom':    return pgWarRoom();
    case 'forecast':   return pgForecast();
    case 'okrs':       return pgOKRs();
    case 'vera':       return pgVera();
    case 'drive':      return pgDrive();
    case 'mapa':       return pgMapa();
    case 'tabela':     return pgTabela();
    case 'rdconfig':   return pgRDConfig();
    case 'vendas':     return pgLancarVenda();
    case 'config':     return pgConfig();
    default:           return pgMeu();
  }
}

function render() {
  const app = document.getElementById('app'); if (!app) return;
  if (!S.user) { app.innerHTML = renderLogin(); return; }
  app.innerHTML = (S.rdSyncing ? '<div class="sync-bar active"></div>' : '') + '<div id="mob-ham" onclick="toggleMobSB()">☰</div>'
    + '<button id="cap-fab" onclick="nav(\'vera\')" title="Sr. Performance" style="position:fixed;bottom:72px;right:18px;z-index:500;width:54px;height:54px;border-radius:50%;background:var(--navy);color:#fff;font-size:22px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.35);transition:transform .2s" onmouseover="this.style.transform=\'scale(1.1)\'" onmouseout="this.style.transform=\'scale(1)\'">⚓</button>'
    + '<div id="sb-overlay" onclick="toggleMobSB()"></div>'
    + '<button id="notif-btn" onclick="requestNotifPerm()" title="Ativar Notificações">🔔<span class="notif-badge" id="notif-badge" style="display:none">0</span></button>'
    + renderMobNav()
    + '<div class="layout">'
    + '<div id="sb-wrap">'+renderSB()+'</div>'
    + '<div class="main"><div id="hdr-wrap" style="position:sticky;top:0;z-index:100">'+renderHDR()+'</div>'
    + '<div id="pc" class="page-content">'+safeRoute()+'</div></div></div>';
  saveState();
}



function renderMobNav() {
  const u = S.user; if(!u) return '';
  const p = S.page;
  const items = [
    {id:'meu',      ico:'👤', lbl:'Meu'},
    {id:'crm',      ico:'🔀', lbl:'Funil'},
    {id:'metricas', ico:'📈', lbl:'Métricas'},
    {id:'oneonone', ico:'🎯', lbl:'1:1'},
    {id:'vera',     ico:'🤖', lbl:'Vera'},
  ];
  return '<div id="mob-nav">'
    + items.map(i => '<button onclick="nav(\'' + i.id + '\')" class="' + (p===i.id?'on':'') + '">'
      + '<span class="mn-ico">' + i.ico + '</span>'
      + '<span class="mn-lbl">' + i.lbl + '</span>'
      + '</button>').join('')
    + '</div>';
}

function toggleMobSB() {
  const sb = document.getElementById('sb-wrap');
  const ov = document.getElementById('sb-overlay');
  if(!sb) return;
  sb.classList.toggle('open');
  if(ov) ov.classList.toggle('open');
}

function nav(page) {
  S.page = page; S.notifOpen = false; render();
  const pc = document.getElementById('pc'); if (pc) pc.scrollTop = 0;
  // Close mobile sidebar
  const sb = document.getElementById('sb-wrap');
  const ov = document.getElementById('sb-overlay');
  if(sb) sb.classList.remove('open');
  if(ov) ov.classList.remove('open');
  // Update mobile bottom nav
  ['meu','crm','metricas','oneonone','vera'].forEach(id => {
    const btn = document.getElementById('mbn-'+id);
    if(btn) btn.classList.toggle('on', page === id);
  });
}

document.addEventListener('click', e => {
  if (S.notifOpen && !e.target.closest('[onclick*="notifOpen"]')) {
    S.notifOpen = false; render();
  }
});


// ─── NOTIFICATION SYSTEM (item 11) ───────────────────────────────────────────
const NOTIF_QUEUE = [];
function requestNotifPerm() {
  if (!('Notification' in window)) { toast('Notificações não suportadas neste browser', 'warn'); return; }
  Notification.requestPermission().then(p => {
    if (p === 'granted') { toast('✅ Notificações ativadas!', 'ok'); scheduleNotifs(); }
    else toast('Notificações bloqueadas', 'warn');
  });
}
function sendNotif(title, body, icon='⚓') {
  if (Notification.permission === 'granted') {
    try { new Notification(title, {body, icon: '/favicon.ico', badge: '/favicon.ico'}); } catch(e){}
  }
  toast(icon + ' ' + title + ': ' + body, 'ok');
}
function scheduleNotifs() {
  // Check SLA overdue
  const overdue = OPPS.filter(o => o.sla === 'overdue');
  if (overdue.length > 0) sendNotif('⚠️ SLA Vencido', overdue.length + ' oportunidades precisam de atenção', '⚓');
  // Check no update
  const stale = OPPS.filter(o => o.dnu >= 3);
  if (stale.length > 0) sendNotif('📋 Atualização Pendente', stale.length + ' oportunidades sem update há 3+ dias', '⚓');
}
// Schedule checks every 30 min
setInterval(() => { if(S.user) scheduleNotifs(); }, 30 * 60 * 1000);
// Check on login
window.addEventListener('psm-login', scheduleNotifs);

// ─── OFFLINE DETECTION ───────────────────────────────────────────────────────
window.addEventListener('online', () => { toast('✅ Conexão restaurada', 'ok'); if(S.user) RD.sync(false); });
window.addEventListener('offline', () => { toast('⚠️ Sem conexão com a internet', 'warn'); });

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildUsers();
  fillDemo();
  loadState();

  // Auto-login from saved token
  const savedToken = localStorage.getItem('psm_token');
  if (savedToken) {
    fetch('/api/auth', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action:'verify', token:savedToken})
    }).then(r => r.json()).then(data => {
      if (data.valid && data.uid) {
        const user = USERS_BASE.find(u => u.id === data.uid);
        if (user) {
          S.user = {...UM[user.id], ...user};
          S.page = RLVL[S.user.role] >= 5 ? 'dashboard' : 'meu';
          render();
          setTimeout(() => { RD.sync(true).then(() => RD.startAutoSync()); }, 200);
          if (!S.veraHist?.length) {
            S.veraHist = [{role:'assistant', content:'Olá, ' + S.user.name.split(' ')[0] + '! Sou o Sr. Performance. Como posso te ajudar?'}];
          }
          scheduleVeraNotifs();
        }
      }
    }).catch(() => {});
  }

  render();
});

</script>
